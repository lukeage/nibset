<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cron — NibSet</title>
    <link rel="icon" type="image/png" href="../assets/logo.png">
    <meta name="description" content="Convert cron expressions to plain English and back — with next run times. All client-side.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
    (function(){
        var t = localStorage.getItem('nibset-theme');
        if (!t) { t = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'; localStorage.setItem('nibset-theme', t); }
        document.documentElement.setAttribute('data-theme', t);
    })();
    </script>

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #060608;
            --bg-secondary: #111115;
            --bg-tertiary: #1c1c24;
            --bg-hover: #16161c;
            --text-primary: #e8e8ec;
            --text-secondary: #8b8b95;
            --text-muted: #55555e;
            --accent: #c9f270;
            --accent-hover: #b8e35f;
            --accent-text: #060608;
            --border: rgba(255,255,255,0.06);
            --header-bg: rgba(6,6,8,0.85);
            --header-border: rgba(255,255,255,0.05);
            --success: #c9f270;
            --danger: #ef4444;
            --font-ui: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
            --header-height: 56px;
            --toolbar-height: 44px;
            --statusbar-height: 28px;
            --radius: 8px;
            --radius-sm: 4px;
        }

        [data-theme="light"] {
            --bg-primary: #f5f5f7;
            --bg-secondary: #eaeaee;
            --bg-tertiary: #dcdce0;
            --bg-hover: #f0f0f4;
            --text-primary: #1a1a1e;
            --text-secondary: #5a5a64;
            --text-muted: #8b8b95;
            --accent: #5a8a1a;
            --accent-hover: #4a7515;
            --accent-text: #ffffff;
            --border: rgba(0,0,0,0.08);
            --header-bg: rgba(245,245,247,0.85);
            --header-border: rgba(0,0,0,0.08);
            --success: #5a8a1a;
            --danger: #c0392b;
        }

        html, body { height: 100dvh; overflow: hidden; font-family: var(--font-ui); background: var(--bg-primary); color: var(--text-primary); }
        .app { display: flex; flex-direction: column; height: 100dvh; }

        /* ===== Header ===== */
        .header {
            display: flex; align-items: center; justify-content: space-between;
            height: var(--header-height); padding: 0 16px;
            background: var(--header-bg); backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--header-border); flex-shrink: 0;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header-home { display: flex; align-items: center; opacity: 0.7; transition: opacity 0.2s; flex-shrink: 0; }
        .header-home:hover { opacity: 1; }
        .header-title { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 600; color: var(--text-primary); }
        .header-title i { color: var(--accent); }
        .header-actions { display: flex; gap: 8px; }

        /* ===== Theme Toggle ===== */
        .theme-toggle { display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-tertiary); color: var(--text-secondary); cursor: pointer; transition: all 0.15s; }
        .theme-toggle:hover { background: var(--bg-hover); color: var(--text-primary); }
        .theme-toggle svg { width: 18px; height: 18px; }
        [data-theme="dark"] .theme-toggle .icon-sun { display: none; }
        [data-theme="light"] .theme-toggle .icon-moon { display: none; }

        /* ===== Toolbar ===== */
        .toolbar { display: flex; align-items: center; gap: 4px; padding: 0 16px; height: var(--toolbar-height); border-bottom: 1px solid var(--border); background: var(--bg-secondary); flex-shrink: 0; overflow-x: auto; }
        .toolbar-btn { display: flex; align-items: center; gap: 5px; padding: 5px 10px; border: none; border-radius: var(--radius-sm); background: transparent; color: var(--text-secondary); font-family: var(--font-ui); font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
        .toolbar-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .toolbar-btn i { font-size: 11px; }
        .toolbar-btn.mode-btn.active { background: var(--accent); color: var(--accent-text); }
        .toolbar-btn.mode-btn.active:hover { background: var(--accent-hover); }
        .toolbar-spacer { flex: 1; }
        .tb-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }

        /* ===== TZ segmented ===== */
        .tz-seg { display: flex; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; flex-shrink: 0; }
        .tz-seg button { border: none; background: var(--bg-tertiary); color: var(--text-secondary); font-family: var(--font-ui); font-size: 11px; font-weight: 600; padding: 4px 10px; cursor: pointer; transition: all 0.15s; }
        .tz-seg button:hover { color: var(--text-primary); }
        .tz-seg button.active { background: var(--accent); color: var(--accent-text); }

        /* ===== Content ===== */
        .content { flex: 1; overflow-y: auto; min-height: 0; }
        .tool-wrap { max-width: 880px; margin: 0 auto; padding: 28px 20px 56px; display: flex; flex-direction: column; gap: 20px; }
        .tool-wrap.hidden { display: none; }

        .field-label { font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: var(--text-muted); }

        /* ===== Expression input ===== */
        .expr-input {
            width: 100%; padding: 14px 16px;
            border: 1px solid var(--border); border-radius: var(--radius);
            background: var(--bg-secondary); color: var(--text-primary);
            font-family: var(--font-mono); font-size: 20px; font-weight: 500; letter-spacing: 0.08em;
            outline: none; caret-color: var(--accent); transition: border-color 0.15s;
        }
        .expr-input:focus { border-color: var(--accent); }
        .expr-input::placeholder { color: var(--text-muted); letter-spacing: normal; font-size: 16px; }
        .expr-input.invalid { border-color: var(--danger); }

        /* ===== Token strip ===== */
        .cron-tokens { display: flex; gap: 8px; }
        .tok { flex: 1; min-width: 0; display: flex; flex-direction: column; align-items: center; gap: 5px; padding: 10px 6px 8px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-secondary); }
        .tok-val { font-family: var(--font-mono); font-size: 16px; font-weight: 700; color: var(--text-muted); max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .tok.restricted .tok-val { color: var(--accent); }
        .tok-name { font-size: 9px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); }

        /* ===== Description card ===== */
        .desc-card {
            padding: 22px 24px;
            border: 1px solid var(--border); border-radius: var(--radius);
            background: var(--bg-secondary);
            display: flex; flex-direction: column; gap: 10px;
        }
        .desc-card-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        .desc-text { font-size: clamp(19px, 3.2vw, 26px); font-weight: 600; line-height: 1.4; color: var(--text-primary); }
        .desc-text .hl { color: var(--accent); }
        .desc-text.error { color: var(--danger); font-size: 15px; font-weight: 500; font-family: var(--font-mono); }
        .desc-text.hint { color: var(--text-secondary); font-size: 14px; font-weight: 400; line-height: 1.7; }

        /* ===== Output expression (build mode) ===== */
        .out-expr {
            display: flex; align-items: center; justify-content: space-between; gap: 12px;
            padding: 14px 16px;
            border: 1px solid var(--border); border-radius: var(--radius);
            background: var(--bg-tertiary);
        }
        .out-expr code { font-family: var(--font-mono); font-size: 20px; font-weight: 700; letter-spacing: 0.08em; color: var(--accent); word-break: break-all; }

        /* ===== Copy button ===== */
        .copy-btn {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 3px 8px;
            border: 1px solid var(--border); border-radius: var(--radius-sm);
            background: var(--bg-tertiary); color: var(--text-secondary);
            font-family: var(--font-ui); font-size: 11px; font-weight: 500;
            cursor: pointer; transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
        }
        .copy-btn:hover { background: var(--bg-hover); color: var(--text-primary); border-color: rgba(255,255,255,0.12); }
        [data-theme="light"] .copy-btn:hover { border-color: rgba(0,0,0,0.15); }

        /* ===== Next runs ===== */
        .runs-panel { border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-secondary); overflow: hidden; }
        .runs-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 10px 16px; border-bottom: 1px solid var(--border); }
        .runs-list { display: flex; flex-direction: column; }
        .run-row { display: flex; align-items: baseline; gap: 14px; padding: 9px 16px; border-bottom: 1px solid var(--border); font-size: 13px; }
        .run-row:last-child { border-bottom: none; }
        .run-idx { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); width: 20px; flex-shrink: 0; text-align: right; }
        .run-date { color: var(--text-secondary); }
        .run-time { font-family: var(--font-mono); font-weight: 700; color: var(--text-primary); }
        .run-rel { margin-left: auto; font-size: 11px; font-weight: 600; color: var(--accent); white-space: nowrap; }
        .runs-empty { padding: 16px; font-size: 13px; color: var(--text-muted); font-style: italic; }

        /* ===== NL input ===== */
        .nl-input {
            width: 100%; padding: 14px 16px;
            border: 1px solid var(--border); border-radius: var(--radius);
            background: var(--bg-secondary); color: var(--text-primary);
            font-family: var(--font-ui); font-size: 16px;
            outline: none; caret-color: var(--accent); transition: border-color 0.15s;
        }
        .nl-input:focus { border-color: var(--accent); }
        .nl-input::placeholder { color: var(--text-muted); }
        .nl-hint { font-size: 12px; color: var(--text-muted); line-height: 1.6; min-height: 18px; }
        .nl-hint.ok { color: var(--success); font-weight: 600; }
        .nl-hint code { font-family: var(--font-mono); background: var(--bg-tertiary); padding: 1px 5px; border-radius: 3px; cursor: pointer; }
        .nl-hint code:hover { color: var(--text-primary); }

        /* ===== Builder ===== */
        .builder { display: flex; flex-direction: column; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-secondary); overflow: hidden; }
        .b-row { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
        .b-row:last-child { border-bottom: none; }
        .b-label { width: 110px; flex-shrink: 0; font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: var(--text-muted); }
        .b-inputs { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

        .ctl-input, .ctl-select {
            border: 1px solid var(--border); border-radius: var(--radius-sm);
            background: var(--bg-tertiary); color: var(--text-primary);
            font-family: var(--font-ui); font-size: 12px; padding: 5px 8px; outline: none;
        }
        .ctl-input:focus, .ctl-select:focus { border-color: var(--accent); }
        .ctl-input.mono { font-family: var(--font-mono); }
        .ctl-number { width: 60px; }
        .ctl-list { width: 130px; }
        .b-sub { font-size: 11px; color: var(--text-muted); }
        .b-hide { display: none !important; }

        .chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
        .fmt-chip {
            display: inline-flex; align-items: center;
            padding: 4px 9px; border: 1px solid var(--border); border-radius: var(--radius-sm);
            background: var(--bg-tertiary); color: var(--text-secondary);
            font-size: 11px; font-weight: 500; cursor: pointer; transition: all 0.15s; user-select: none;
        }
        .fmt-chip:hover { color: var(--text-primary); }
        .fmt-chip.active { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }

        /* ===== Status Bar ===== */
        .statusbar { display: flex; align-items: center; justify-content: space-between; height: var(--statusbar-height); padding: 0 16px; background: var(--bg-secondary); border-top: 1px solid var(--border); font-size: 11px; color: var(--text-muted); flex-shrink: 0; gap: 12px; }
        .statusbar-left, .statusbar-right { display: flex; align-items: center; gap: 12px; min-width: 0; }
        .statusbar-left span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .statusbar .next-run { color: var(--accent); font-weight: 600; white-space: nowrap; }

        /* ===== Toast ===== */
        .toast-container { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 8px; z-index: 1000; pointer-events: none; }
        .toast { padding: 8px 16px; background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; box-shadow: 0 4px 20px rgba(0,0,0,0.3); opacity: 0; transform: translateY(8px); transition: opacity 0.2s, transform 0.2s; white-space: nowrap; }
        .toast.show { opacity: 1; transform: translateY(0); }

        @media (max-width: 560px) {
            .b-label { width: 100%; }
            .tok-val { font-size: 13px; }
            .run-date { font-size: 12px; }
        }
    </style>
</head>
<body>
<div class="app">

    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <a href="../index.html" class="header-home" title="Back to NibSet">
                <svg viewBox="0 0 32 38" fill="none" xmlns="http://www.w3.org/2000/svg" width="18" height="22">
                    <path d="M16 0L20 12L16 10L12 12L16 0Z" fill="var(--accent)" />
                    <path d="M10 12L16 10L22 12L24 22L20 26H12L8 22L10 12Z" fill="url(#nhg)" stroke="var(--border)" stroke-width="0.5"/>
                    <rect x="12" y="26" width="8" height="4" rx="1" fill="url(#nhg)" />
                    <line x1="16" y1="0" x2="16" y2="10" stroke="var(--accent)" stroke-opacity="0.3" stroke-width="0.5"/>
                    <circle cx="16" cy="14" r="1.5" fill="var(--accent)" opacity="0.9"/>
                    <path d="M4 8C1 8 0 10 0 13V25C0 28 1 30 4 30" stroke="url(#nhg)" stroke-width="2" fill="none" stroke-linecap="round"/>
                    <path d="M28 8C31 8 32 10 32 13V25C32 28 31 30 28 30" stroke="url(#nhg)" stroke-width="2" fill="none" stroke-linecap="round"/>
                    <line x1="10" y1="33" x2="22" y2="33" stroke="url(#nhg)" stroke-width="1.5" stroke-linecap="round"/>
                    <line x1="11" y1="35.5" x2="21" y2="35.5" stroke="url(#nhg)" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
                    <defs><linearGradient id="nhg" x1="0" y1="0" x2="32" y2="38" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="var(--text-primary)"/><stop offset="100%" stop-color="var(--text-muted)"/></linearGradient></defs>
                </svg>
            </a>
            <div class="header-title">
                <i class="fa-solid fa-clock-rotate-left"></i>
                Cron
            </div>
        </div>
        <div class="header-actions">
            <button class="theme-toggle" id="themeToggle" title="Toggle theme">
                <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
            </button>
        </div>
    </header>

    <!-- Toolbar -->
    <div class="toolbar">
        <button class="toolbar-btn mode-btn active" data-mode="explain"><i class="fa-solid fa-lightbulb"></i> Explain</button>
        <button class="toolbar-btn mode-btn" data-mode="build"><i class="fa-solid fa-sliders"></i> Build</button>
        <div class="toolbar-spacer"></div>
        <div class="tz-seg" title="Timezone the schedule is evaluated in">
            <button id="tzLocal" class="active">Local</button>
            <button id="tzUtc">UTC</button>
        </div>
        <div class="tb-sep" style="margin: 0 8px;"></div>
        <button class="toolbar-btn" id="clearBtn"><i class="fas fa-eraser"></i> Clear</button>
    </div>

    <div class="content">

        <!-- ===== Explain mode ===== -->
        <div class="tool-wrap" id="explainWrap">
            <div>
                <div class="field-label" style="margin-bottom: 8px;">Cron expression</div>
                <input type="text" class="expr-input" id="exprInput" spellcheck="false" autocomplete="off"
                       placeholder="* * * * *  or  @daily" value="*/5 * * * *">
            </div>

            <div class="cron-tokens" id="tokenStrip"></div>

            <div class="desc-card">
                <div class="desc-card-header">
                    <span class="field-label">In plain English</span>
                    <button class="copy-btn" id="copyDescBtn"><i class="fas fa-copy"></i> Copy</button>
                </div>
                <div class="desc-text" id="descText"></div>
            </div>

            <div class="runs-panel">
                <div class="runs-header">
                    <span class="field-label">Next runs</span>
                    <span class="field-label" id="runsTzLabelE"></span>
                </div>
                <div class="runs-list" id="runsExplain"></div>
            </div>
        </div>

        <!-- ===== Build mode ===== -->
        <div class="tool-wrap hidden" id="buildWrap">
            <div>
                <div class="field-label" style="margin-bottom: 8px;">Describe the schedule</div>
                <input type="text" class="nl-input" id="nlInput" spellcheck="false" autocomplete="off"
                       placeholder="e.g. every weekday at 9am">
                <div class="nl-hint" id="nlHint" style="margin-top: 6px;"></div>
            </div>

            <div class="builder" id="builder">
                <div class="b-row" data-f="min">
                    <div class="b-label">Minute</div>
                    <div class="b-inputs">
                        <select class="ctl-select b-mode" id="bMinMode">
                            <option value="every">Every minute</option>
                            <option value="step">Every N minutes</option>
                            <option value="list">Specific minutes</option>
                            <option value="range">Range</option>
                        </select>
                        <input type="number" class="ctl-input ctl-number b-hide" id="bMinStep" value="5" min="1" max="59">
                        <input type="text" class="ctl-input mono ctl-list b-hide" id="bMinList" value="0" placeholder="0,15,30">
                        <span class="b-hide" id="bMinRangeGrp">
                            <input type="number" class="ctl-input ctl-number" id="bMinFrom" value="0" min="0" max="59">
                            <span class="b-sub">to</span>
                            <input type="number" class="ctl-input ctl-number" id="bMinTo" value="30" min="0" max="59">
                        </span>
                        <span class="b-sub">0–59</span>
                    </div>
                </div>
                <div class="b-row" data-f="hr">
                    <div class="b-label">Hour</div>
                    <div class="b-inputs">
                        <select class="ctl-select b-mode" id="bHrMode">
                            <option value="every">Every hour</option>
                            <option value="step">Every N hours</option>
                            <option value="list">Specific hours</option>
                            <option value="range">Range</option>
                        </select>
                        <input type="number" class="ctl-input ctl-number b-hide" id="bHrStep" value="2" min="1" max="23">
                        <input type="text" class="ctl-input mono ctl-list b-hide" id="bHrList" value="9" placeholder="9,17">
                        <span class="b-hide" id="bHrRangeGrp">
                            <input type="number" class="ctl-input ctl-number" id="bHrFrom" value="9" min="0" max="23">
                            <span class="b-sub">to</span>
                            <input type="number" class="ctl-input ctl-number" id="bHrTo" value="17" min="0" max="23">
                        </span>
                        <span class="b-sub">0–23</span>
                    </div>
                </div>
                <div class="b-row" data-f="dom">
                    <div class="b-label">Day of month</div>
                    <div class="b-inputs">
                        <select class="ctl-select b-mode" id="bDomMode">
                            <option value="every">Every day</option>
                            <option value="step">Every N days</option>
                            <option value="list">Specific days</option>
                            <option value="range">Range</option>
                        </select>
                        <input type="number" class="ctl-input ctl-number b-hide" id="bDomStep" value="2" min="1" max="31">
                        <input type="text" class="ctl-input mono ctl-list b-hide" id="bDomList" value="1" placeholder="1,15">
                        <span class="b-hide" id="bDomRangeGrp">
                            <input type="number" class="ctl-input ctl-number" id="bDomFrom" value="1" min="1" max="31">
                            <span class="b-sub">to</span>
                            <input type="number" class="ctl-input ctl-number" id="bDomTo" value="5" min="1" max="31">
                        </span>
                        <span class="b-sub">1–31</span>
                    </div>
                </div>
                <div class="b-row" data-f="mon">
                    <div class="b-label">Month</div>
                    <div class="chip-row" id="monChips"></div>
                </div>
                <div class="b-row" data-f="dow">
                    <div class="b-label">Day of week</div>
                    <div class="chip-row" id="dowChips"></div>
                </div>
            </div>

            <div class="out-expr">
                <code id="outExpr">* * * * *</code>
                <button class="copy-btn" id="copyExprBtn"><i class="fas fa-copy"></i> Copy</button>
            </div>

            <div class="desc-card">
                <div class="desc-card-header">
                    <span class="field-label">In plain English</span>
                </div>
                <div class="desc-text" id="buildDescText"></div>
            </div>

            <div class="runs-panel">
                <div class="runs-header">
                    <span class="field-label">Next runs</span>
                    <span class="field-label" id="runsTzLabelB"></span>
                </div>
                <div class="runs-list" id="runsBuild"></div>
            </div>
        </div>

    </div>

    <!-- Status Bar -->
    <div class="statusbar">
        <div class="statusbar-left">
            <span id="statusMsg">Type a cron expression</span>
        </div>
        <div class="statusbar-right">
            <span class="next-run" id="nextRunMsg"></span>
        </div>
    </div>

</div>

<div class="toast-container" id="toastContainer"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const $ = id => document.getElementById(id);

    const toastContainer = $('toastContainer');
    const statusMsg = $('statusMsg');
    const nextRunMsg = $('nextRunMsg');

    let currentMode = 'explain';
    let useUtc = false;

    // ===== Toast / clipboard =====
    function toast(msg) {
        const el = document.createElement('div');
        el.className = 'toast';
        el.textContent = msg;
        toastContainer.appendChild(el);
        requestAnimationFrame(() => el.classList.add('show'));
        setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300); }, 2000);
    }
    function copyText(text, label) {
        if (!text) { toast('Nothing to copy'); return; }
        navigator.clipboard.writeText(text)
            .then(() => toast(label ? `${label} copied!` : 'Copied!'))
            .catch(() => toast('Copy failed'));
    }
    const esc = s => s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const pad = n => String(n).padStart(2, '0');

    // ============================================================
    // Cron parsing
    // ============================================================
    const MONTH_NAMES = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
    const DAY_NAMES = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
    const MONTH_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const DOW_FULL = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

    const FIELDS = [
        { key: 'min', label: 'minute',       min: 0, max: 59 },
        { key: 'hr',  label: 'hour',         min: 0, max: 23 },
        { key: 'dom', label: 'day of month', min: 1, max: 31 },
        { key: 'mon', label: 'month',        min: 1, max: 12, names: MONTH_NAMES, nameBase: 1 },
        { key: 'dow', label: 'day of week',  min: 0, max: 7,  names: DAY_NAMES,   nameBase: 0, norm: v => v === 7 ? 0 : v },
    ];

    const MACROS = {
        '@yearly':   '0 0 1 1 *', '@annually': '0 0 1 1 *',
        '@monthly':  '0 0 1 * *', '@weekly':   '0 0 * * 0',
        '@daily':    '0 0 * * *', '@midnight': '0 0 * * *',
        '@hourly':   '0 * * * *',
    };

    function fieldErr(f, msg) {
        const e = new Error(`${f.label} field: ${msg}`);
        e.cron = true;
        return e;
    }

    function parseValue(str, f) {
        if (f.names) {
            const up = str.toUpperCase();
            const idx = f.names.findIndex(n => up === n || up.slice(0, 3) === n);
            if (idx >= 0) return idx + (f.nameBase || 0);
        }
        if (!/^\d+$/.test(str)) throw fieldErr(f, `"${str}" is not a valid value`);
        return parseInt(str, 10);
    }

    // Parse one field into { values:Set, restricted:bool, terms:[], text }
    function parseCronField(text, f) {
        const values = new Set();
        const terms = [];
        let restricted = false;
        for (const part of text.split(',')) {
            if (!part) throw fieldErr(f, 'empty list item');
            let body = part, step = 1;
            const stepM = part.match(/^(.+)\/(\d+)$/);
            if (stepM) {
                body = stepM[1];
                step = parseInt(stepM[2], 10);
                if (step < 1) throw fieldErr(f, 'step must be at least 1');
            }
            let from, to, type;
            if (body === '*') {
                from = f.min; to = f.max;
                type = stepM ? 'step' : 'all';
            } else {
                const rangeM = body.match(/^([^-]+)-([^-]+)$/);
                if (rangeM) {
                    from = parseValue(rangeM[1], f);
                    to = parseValue(rangeM[2], f);
                    type = stepM ? 'step' : 'range';
                } else {
                    from = parseValue(body, f);
                    to = stepM ? f.max : from;  // "5/10" = "5-max/10" (vixie)
                    type = stepM ? 'step' : 'value';
                }
            }
            if (from < f.min || from > f.max) throw fieldErr(f, `${from} out of range (${f.min}–${f.max})`);
            if (to < f.min || to > f.max) throw fieldErr(f, `${to} out of range (${f.min}–${f.max})`);
            if (from > to) throw fieldErr(f, `range ${from}-${to} is inverted`);
            if (!(type === 'all' && step === 1)) restricted = true;
            for (let v = from; v <= to; v += step) values.add(f.norm ? f.norm(v) : v);
            terms.push({ type, from, to, step });
        }
        if (values.size === 0) throw fieldErr(f, 'matches no values');
        return { values, restricted, terms, text };
    }

    function parseCron(input) {
        const raw = input.trim().replace(/\s+/g, ' ');
        if (!raw) return { error: 'Type a cron expression — five fields: minute hour day-of-month month day-of-week' };
        let expr = raw;
        let macro = null;
        if (raw.startsWith('@')) {
            const low = raw.toLowerCase();
            if (low === '@reboot') return { reboot: true, raw };
            if (!MACROS[low]) return { error: `Unknown macro "${raw}" — try @hourly, @daily, @weekly, @monthly, @yearly, or @reboot` };
            macro = low;
            expr = MACROS[low];
        }
        const parts = expr.split(' ');
        if (parts.length !== 5) return { error: `Expected 5 fields (minute hour day-of-month month day-of-week), got ${parts.length}` };
        try {
            const fields = parts.map((p, i) => parseCronField(p, FIELDS[i]));
            return { fields, raw, macro, expr };
        } catch (e) {
            if (e.cron) return { error: e.message };
            throw e;
        }
    }

    // ============================================================
    // Describe: parsed cron -> English
    // ============================================================
    function listJoin(arr, conj) {
        conj = conj || 'and';
        if (arr.length <= 1) return arr.join('');
        return arr.slice(0, -1).join(', ') + ' ' + conj + ' ' + arr[arr.length - 1];
    }
    const fmtTime = (h, m) => pad(h) + ':' + pad(m);
    const isAll = terms => terms.length === 1 && terms[0].type === 'all' && terms[0].step === 1;
    const allSingle = terms => terms.every(t => t.type === 'value');
    const singleVals = terms => terms.map(t => t.from);
    const fullStep = (terms, f) => terms.length === 1 && terms[0].type === 'step'
        && terms[0].from === f.min && terms[0].to === f.max ? terms[0].step : null;

    function unitName(v, singular, plural) {
        return v === 1 ? singular : `${v} ${plural}`;
    }

    // Generic per-term description, e.g. "5", "10 through 20", "every 3 from 10 through 40"
    function termDesc(t, nameOf) {
        const n = nameOf || String;
        if (t.type === 'value') return n(t.from);
        if (t.type === 'range') return `${n(t.from)} through ${n(t.to)}`;
        return `every ${t.step} from ${n(t.from)} through ${n(t.to)}`;
    }

    function timePhrase(minP, hrP) {
        const minT = minP.terms, hrT = hrP.terms;
        if (isAll(minT) && isAll(hrT)) return 'every minute';

        // Cross product of plain values -> exact clock times
        if (allSingle(minT) && allSingle(hrT)) {
            const mins = singleVals(minT), hrs = singleVals(hrT);
            if (mins.length * hrs.length <= 6) {
                const times = [];
                hrs.slice().sort((a, b) => a - b).forEach(h =>
                    mins.slice().sort((a, b) => a - b).forEach(m => times.push(fmtTime(h, m))));
                return 'at ' + listJoin(times);
            }
        }

        let mp;
        const mStep = fullStep(minT, FIELDS[0]);
        if (isAll(minT)) mp = 'every minute';
        else if (mStep) mp = mStep === 1 ? 'every minute' : `every ${mStep} minutes`;
        else if (allSingle(minT)) mp = 'at minute ' + listJoin(singleVals(minT).map(String));
        else mp = 'at minute ' + listJoin(minT.map(t => termDesc(t)));

        let hp = '';
        const hStep = fullStep(hrT, FIELDS[1]);
        if (isAll(hrT)) hp = '';
        else if (hStep) hp = hStep === 1 ? '' : `every ${hStep} hours`;
        else if (hrT.length === 1 && hrT[0].type === 'range')
            hp = `between ${fmtTime(hrT[0].from, 0)} and ${fmtTime(hrT[0].to, 59)}`;
        else if (allSingle(hrT))
            hp = 'past hour ' + listJoin(singleVals(hrT).map(String));
        else hp = 'during hours ' + listJoin(hrT.map(t => termDesc(t)));

        return hp ? `${mp}, ${hp}` : mp;
    }

    function domPhrase(p) {
        const t = p.terms;
        if (!p.restricted) return null;
        const step = fullStep(t, FIELDS[2]);
        if (step) return `every ${unitName(step, 'day', 'days')} of the month`;
        if (allSingle(t)) return `on day ${listJoin(singleVals(t).map(String))} of the month`;
        if (t.length === 1 && t[0].type === 'range') return `on days ${t[0].from} through ${t[0].to} of the month`;
        return 'on day ' + listJoin(t.map(x => termDesc(x))) + ' of the month';
    }

    function monPhrase(p) {
        const t = p.terms;
        if (!p.restricted) return null;
        const name = v => MONTH_FULL[v - 1];
        const step = fullStep(t, FIELDS[3]);
        if (step) return `every ${unitName(step, 'month', 'months')}`;
        if (allSingle(t)) return 'in ' + listJoin(singleVals(t).map(name));
        if (t.length === 1 && t[0].type === 'range') return `${name(t[0].from)} through ${name(t[0].to)}`;
        return 'in ' + listJoin(t.map(x => termDesc(x, name)));
    }

    function dowPhrase(p) {
        const t = p.terms;
        if (!p.restricted) return null;
        const name = v => DOW_FULL[v === 7 ? 0 : v];
        const step = fullStep(t, FIELDS[4]);
        if (step) return `every ${unitName(step, 'day', 'days')} of the week`;
        if (allSingle(t)) return 'on ' + listJoin(singleVals(t).map(name));
        if (t.length === 1 && t[0].type === 'range') return `on ${name(t[0].from)} through ${name(t[0].to)}`;
        return 'on ' + listJoin(t.map(x => termDesc(x, name)));
    }

    function describeCron(parsed) {
        if (parsed.reboot) return 'At system startup (once, after each reboot)';
        const [minP, hrP, domP_, monP_, dowP_] = parsed.fields;
        const parts = [timePhrase(minP, hrP)];
        const dom = domPhrase(domP_), dow = dowPhrase(dowP_), mon = monPhrase(monP_);
        if (dom && dow) { parts.push(dom); parts.push('or ' + dow); }   // standard cron OR rule
        else if (dom) parts.push(dom);
        else if (dow) parts.push(dow);
        if (mon) parts.push(mon);
        const s = parts.join(', ');
        return s.charAt(0).toUpperCase() + s.slice(1);
    }

    // Accent-highlight times, numbers, and day/month names for display
    const HL_RE = new RegExp('\\d{1,2}:\\d{2}|\\b\\d+\\b|\\b(?:' + DOW_FULL.concat(MONTH_FULL).join('|') + ')\\b', 'g');
    const highlight = text => esc(text).replace(HL_RE, m => `<span class="hl">${m}</span>`);

    // ============================================================
    // Next runs
    // ============================================================
    function nextRuns(parsed, count) {
        if (parsed.reboot) return [];
        const [minS, hrS, domS, monS, dowS] = parsed.fields.map(f => f.values);
        const domR = parsed.fields[2].restricted, dowR = parsed.fields[4].restricted;
        const mins = [...minS].sort((a, b) => a - b);
        const hrs = [...hrS].sort((a, b) => a - b);
        const now = new Date();
        const out = [];

        let cursor = useUtc
            ? new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()))
            : new Date(now.getFullYear(), now.getMonth(), now.getDate());

        const G = useUtc
            ? { y: d => d.getUTCFullYear(), m: d => d.getUTCMonth(), d: d => d.getUTCDate(), wd: d => d.getUTCDay(),
                make: (y, m, d, h, mi) => new Date(Date.UTC(y, m, d, h, mi)) }
            : { y: d => d.getFullYear(), m: d => d.getMonth(), d: d => d.getDate(), wd: d => d.getDay(),
                make: (y, m, d, h, mi) => new Date(y, m, d, h, mi) };

        for (let i = 0; i < 366 * 5 && out.length < count; i++) {
            const y = G.y(cursor), mo = G.m(cursor), da = G.d(cursor);
            if (monS.has(mo + 1)) {
                const inDom = domS.has(da), inDow = dowS.has(G.wd(cursor));
                const dayOk = (domR && dowR) ? (inDom || inDow) : domR ? inDom : dowR ? inDow : true;
                if (dayOk) {
                    outer:
                    for (const h of hrs) {
                        for (const mi of mins) {
                            const t = G.make(y, mo, da, h, mi);
                            if (t > now) {
                                out.push(t);
                                if (out.length >= count) break outer;
                            }
                        }
                    }
                }
            }
            cursor = G.make(y, mo, da + 1, 0, 0);
        }
        return out;
    }

    function relTime(t) {
        const s = Math.round((t - Date.now()) / 1000);
        if (s < 60) return 'in under a minute';
        const m = Math.round(s / 60);
        if (m < 60) return `in ${m} min`;
        const h = Math.floor(m / 60), rm = m % 60;
        if (h < 24) return rm ? `in ${h} h ${rm} min` : `in ${h} h`;
        const d = Math.round(h / 24);
        return `in ${d} day${d !== 1 ? 's' : ''}`;
    }

    function renderRuns(parsed, listEl, tzLabelEl) {
        const tz = useUtc ? { timeZone: 'UTC' } : {};
        tzLabelEl.textContent = useUtc ? 'UTC' : (Intl.DateTimeFormat().resolvedOptions().timeZone || 'Local');
        if (parsed.error) {
            listEl.innerHTML = '<div class="runs-empty">Fix the expression to see upcoming runs</div>';
            nextRunMsg.textContent = '';
            return;
        }
        if (parsed.reboot) {
            listEl.innerHTML = '<div class="runs-empty">@reboot runs once at system startup — no schedule to preview</div>';
            nextRunMsg.textContent = '';
            return;
        }
        const runs = nextRuns(parsed, 10);
        if (runs.length === 0) {
            listEl.innerHTML = '<div class="runs-empty">No occurrence found in the next 5 years (impossible date combination?)</div>';
            nextRunMsg.textContent = '';
            return;
        }
        const dateFmt = new Intl.DateTimeFormat(undefined, { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric', ...tz });
        const timeFmt = new Intl.DateTimeFormat(undefined, { hour: '2-digit', minute: '2-digit', hour12: false, ...tz });
        listEl.innerHTML = runs.map((t, i) => `
            <div class="run-row">
                <span class="run-idx">${i + 1}</span>
                <span class="run-date">${dateFmt.format(t)}</span>
                <span class="run-time">${timeFmt.format(t)}</span>
                <span class="run-rel">${relTime(t)}</span>
            </div>`).join('');
        nextRunMsg.textContent = `Next: ${relTime(runs[0])}`;
    }

    // ============================================================
    // Explain mode
    // ============================================================
    let lastDesc = '';

    function renderTokens(parsed) {
        const strip = $('tokenStrip');
        const labels = ['minute', 'hour', 'day (month)', 'month', 'day (week)'];
        let texts, restricted;
        if (parsed.fields) {
            texts = parsed.expr.split(' ');
            restricted = parsed.fields.map(f => f.restricted);
        } else {
            texts = ['·', '·', '·', '·', '·'];
            restricted = [false, false, false, false, false];
        }
        strip.innerHTML = labels.map((l, i) => `
            <div class="tok${restricted[i] ? ' restricted' : ''}">
                <span class="tok-val">${esc(texts[i])}</span>
                <span class="tok-name">${l}</span>
            </div>`).join('');
    }

    function renderExplain() {
        const input = $('exprInput').value;
        const parsed = parseCron(input);
        const descEl = $('descText');
        $('exprInput').classList.toggle('invalid', !!parsed.error);
        renderTokens(parsed);
        if (parsed.error) {
            descEl.className = 'desc-text error';
            descEl.textContent = parsed.error;
            lastDesc = '';
            statusMsg.textContent = 'Invalid expression';
        } else {
            lastDesc = describeCron(parsed);
            descEl.className = 'desc-text';
            descEl.innerHTML = highlight(lastDesc);
            statusMsg.textContent = (parsed.macro ? `${parsed.macro} = ${parsed.expr} — ` : 'Valid — ') + lastDesc;
        }
        renderRuns(parsed, $('runsExplain'), $('runsTzLabelE'));
    }

    // ============================================================
    // Builder
    // ============================================================
    const B = {
        min: { mode: 'bMinMode', step: 'bMinStep', list: 'bMinList', rangeGrp: 'bMinRangeGrp', from: 'bMinFrom', to: 'bMinTo' },
        hr:  { mode: 'bHrMode',  step: 'bHrStep',  list: 'bHrList',  rangeGrp: 'bHrRangeGrp',  from: 'bHrFrom',  to: 'bHrTo' },
        dom: { mode: 'bDomMode', step: 'bDomStep', list: 'bDomList', rangeGrp: 'bDomRangeGrp', from: 'bDomFrom', to: 'bDomTo' },
    };

    function buildChips(containerId, names, dataBase) {
        $(containerId).innerHTML = names.map((n, i) =>
            `<span class="fmt-chip" data-v="${i + dataBase}">${n}</span>`).join('');
        $(containerId).querySelectorAll('.fmt-chip').forEach(chip =>
            chip.addEventListener('click', () => { chip.classList.toggle('active'); renderBuild(); }));
    }
    buildChips('monChips', ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'], 1);
    buildChips('dowChips', ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'], 0);

    function chipValues(containerId) {
        return Array.from($(containerId).querySelectorAll('.fmt-chip.active')).map(c => parseInt(c.dataset.v, 10));
    }
    function setChips(containerId, valueSet) {
        $(containerId).querySelectorAll('.fmt-chip').forEach(c =>
            c.classList.toggle('active', valueSet.has(parseInt(c.dataset.v, 10))));
    }

    // Consecutive ints -> "a-b", otherwise comma list; empty selection -> "*"
    function chipsToToken(vals) {
        if (vals.length === 0) return '*';
        vals.sort((a, b) => a - b);
        const consecutive = vals.length > 2 && vals.every((v, i) => i === 0 || v === vals[i - 1] + 1);
        return consecutive ? `${vals[0]}-${vals[vals.length - 1]}` : vals.join(',');
    }

    function numToken(fkey) {
        const b = B[fkey];
        const mode = $(b.mode).value;
        if (mode === 'every') return '*';
        if (mode === 'step') return '*/' + Math.max(1, parseInt($(b.step).value, 10) || 1);
        if (mode === 'range') {
            let from = parseInt($(b.from).value, 10) || 0, to = parseInt($(b.to).value, 10) || 0;
            if (from > to) [from, to] = [to, from];
            return `${from}-${to}`;
        }
        const list = $(b.list).value.replace(/\s+/g, '');
        return list || '*';
    }

    function syncBuilderVisibility() {
        for (const fkey of Object.keys(B)) {
            const b = B[fkey];
            const mode = $(b.mode).value;
            $(b.step).classList.toggle('b-hide', mode !== 'step');
            $(b.list).classList.toggle('b-hide', mode !== 'list');
            $(b.rangeGrp).classList.toggle('b-hide', mode !== 'range');
        }
    }

    function builderToCron() {
        return [numToken('min'), numToken('hr'), numToken('dom'),
                chipsToToken(chipValues('monChips')), chipsToToken(chipValues('dowChips'))].join(' ');
    }

    // Populate builder controls from a valid 5-field expression
    function cronToBuilder(expr) {
        const parts = expr.trim().split(/\s+/);
        const keys = ['min', 'hr', 'dom'];
        parts.slice(0, 3).forEach((tok, i) => {
            const b = B[keys[i]];
            let m;
            if (tok === '*') $(b.mode).value = 'every';
            else if ((m = tok.match(/^\*\/(\d+)$/))) { $(b.mode).value = 'step'; $(b.step).value = m[1]; }
            else if ((m = tok.match(/^(\d+)-(\d+)$/))) { $(b.mode).value = 'range'; $(b.from).value = m[1]; $(b.to).value = m[2]; }
            else { $(b.mode).value = 'list'; $(b.list).value = tok; }
        });
        const parsed = parseCron(expr);
        if (parsed.fields) {
            setChips('monChips', parsed.fields[3].restricted ? parsed.fields[3].values : new Set());
            setChips('dowChips', parsed.fields[4].restricted ? parsed.fields[4].values : new Set());
        }
        syncBuilderVisibility();
    }

    function renderBuild() {
        syncBuilderVisibility();
        const expr = builderToCron();
        $('outExpr').textContent = expr;
        const parsed = parseCron(expr);
        const descEl = $('buildDescText');
        if (parsed.error) {
            descEl.className = 'desc-text error';
            descEl.textContent = parsed.error;
            statusMsg.textContent = 'Invalid expression';
        } else {
            const desc = describeCron(parsed);
            descEl.className = 'desc-text';
            descEl.innerHTML = highlight(desc);
            statusMsg.textContent = `${expr} — ${desc}`;
        }
        renderRuns(parsed, $('runsBuild'), $('runsTzLabelB'));
    }

    // ============================================================
    // Natural language -> cron
    // ============================================================
    const DOW_WORDS = { sunday: 0, monday: 1, tuesday: 2, wednesday: 3, thursday: 4, friday: 5, saturday: 6,
                        sun: 0, mon: 1, tue: 2, tues: 2, wed: 3, thu: 4, thur: 4, thurs: 4, fri: 5, sat: 6 };
    const MON_WORDS = {};
    MONTH_FULL.forEach((n, i) => { MON_WORDS[n.toLowerCase()] = i + 1; MON_WORDS[n.toLowerCase().slice(0, 3)] = i + 1; });

    function phraseToCron(input) {
        let s = ' ' + input.toLowerCase().replace(/[.,!?]/g, ' ').replace(/\s+/g, ' ').trim() + ' ';
        if (s.trim() === '') return null;
        let matched = false;
        const f = { min: null, hr: null, dom: null, mon: null, dow: null };

        // --- times: "at 9am", "at 9:30 pm", "at 17:00", "at noon", "at midnight", "hourly at :30"
        const hours = [], minutes = [];
        s = s.replace(/ at noon /g, () => { hours.push(12); minutes.push(0); matched = true; return ' '; });
        s = s.replace(/ at midnight /g, () => { hours.push(0); minutes.push(0); matched = true; return ' '; });
        s = s.replace(/ at :(\d{1,2}) /g, (_, mm) => { f.min = String(parseInt(mm, 10) % 60); f.hr = '*'; matched = true; return ' '; });
        s = s.replace(/ at (\d{1,2})(?::(\d{2}))? ?(am|pm)? /g, (_, hh, mm, ap) => {
            let h = parseInt(hh, 10);
            if (ap === 'pm' && h < 12) h += 12;
            if (ap === 'am' && h === 12) h = 0;
            if (h > 23) return _;
            hours.push(h); minutes.push(mm ? parseInt(mm, 10) : 0);
            matched = true;
            return ' ';
        });
        if (hours.length) {
            f.hr = [...new Set(hours)].sort((a, b) => a - b).join(',');
            f.min = String(minutes[0]);
        }

        // --- weekday scope
        const dows = new Set();
        s = s.replace(/ weekdays? /g, () => { for (let d = 1; d <= 5; d++) dows.add(d); matched = true; return ' '; });
        s = s.replace(/ weekends? /g, () => { dows.add(0); dows.add(6); matched = true; return ' '; });
        for (const w of Object.keys(DOW_WORDS)) {
            const re = new RegExp(` (?:every |on |and )*(${w})s? `, 'g');
            if (re.test(s)) { dows.add(DOW_WORDS[w]); matched = true; s = s.replace(re, ' '); }
        }
        if (dows.size) f.dow = chipsToToken([...dows]);

        // --- month names: "in january"
        const mons = new Set();
        for (const w of Object.keys(MON_WORDS)) {
            const re = new RegExp(` (?:in |every |and )*(${w}) `, 'g');
            if (re.test(s)) { mons.add(MON_WORDS[w]); matched = true; s = s.replace(re, ' '); }
        }
        if (mons.size) f.mon = chipsToToken([...mons]);

        // --- day of month: "on the 15th", "on day 15"
        s = s.replace(/ (?:on )?(?:the |day )(\d{1,2})(?:st|nd|rd|th)? (?:day )?(?:of (?:the |every )?month )?/g, (_, d) => {
            const n = parseInt(d, 10);
            if (n < 1 || n > 31) return _;
            f.dom = f.dom ? f.dom + ',' + n : String(n);
            matched = true;
            return ' ';
        });

        // --- intervals & base frequencies
        s = s.replace(/ every (\d+) ?min(?:ute)?s? /g, (_, n) => { f.min = '*/' + n; if (!f.hr) f.hr = '*'; matched = true; return ' '; });
        s = s.replace(/ every min(?:ute)? /g, () => { f.min = '*'; if (!f.hr) f.hr = '*'; matched = true; return ' '; });
        s = s.replace(/ every (\d+) ?h(?:ou)?rs? /g, (_, n) => { f.hr = '*/' + n; if (f.min === null) f.min = '0'; matched = true; return ' '; });
        s = s.replace(/ (?:every h(?:ou)?r|hourly) /g, () => { if (f.hr === null) f.hr = '*'; if (f.min === null) f.min = '0'; matched = true; return ' '; });
        s = s.replace(/ every (\d+) ?days? /g, (_, n) => { f.dom = '*/' + n; matched = true; return ' '; });
        s = s.replace(/ (?:every day|daily|nightly) /g, () => { matched = true; return ' '; });
        s = s.replace(/ (?:every week|weekly) /g, () => { if (f.dow === null) f.dow = '0'; matched = true; return ' '; });
        s = s.replace(/ every (\d+) ?months? /g, (_, n) => { f.mon = '*/' + n; if (f.dom === null) f.dom = '1'; matched = true; return ' '; });
        s = s.replace(/ (?:every month|monthly) /g, () => { if (f.dom === null) f.dom = '1'; matched = true; return ' '; });
        s = s.replace(/ (?:every year|yearly|annually) /g, () => { if (f.dom === null) f.dom = '1'; if (f.mon === null) f.mon = '1'; matched = true; return ' '; });

        if (!matched) return null;
        const cron = [f.min === null ? '0' : f.min, f.hr === null ? '0' : f.hr,
                      f.dom === null ? '*' : f.dom, f.mon === null ? '*' : f.mon,
                      f.dow === null ? '*' : f.dow].join(' ');
        return parseCron(cron).error ? null : cron;
    }

    const NL_EXAMPLES = ['every 5 minutes', 'every weekday at 9am', 'every monday at 3:30pm', 'monthly on the 15th at noon', 'every 2 hours on weekends'];
    function showNlHint(state, cron) {
        const hint = $('nlHint');
        if (state === 'ok') {
            hint.className = 'nl-hint ok';
            hint.innerHTML = `<i class="fas fa-check" style="margin-right:4px;"></i>Recognized &rarr; <code>${esc(cron)}</code>`;
        } else if (state === 'miss') {
            hint.className = 'nl-hint';
            hint.innerHTML = 'Hmm, try phrases like ' + NL_EXAMPLES.map(e => `<code>${e}</code>`).join(' · ');
        } else {
            hint.className = 'nl-hint';
            hint.innerHTML = 'Try ' + NL_EXAMPLES.map(e => `<code>${e}</code>`).join(' · ') + ' — or use the controls below';
        }
        hint.querySelectorAll('code').forEach(c => c.addEventListener('click', () => {
            if (c.textContent.includes(' * ') || /^[\d*]/.test(c.textContent)) return;
            $('nlInput').value = c.textContent;
            handleNlInput();
        }));
    }

    function handleNlInput() {
        const text = $('nlInput').value.trim();
        if (!text) { showNlHint('idle'); return; }
        const cron = phraseToCron(text);
        if (cron) {
            showNlHint('ok', cron);
            cronToBuilder(cron);
            renderBuild();
        } else {
            showNlHint('miss');
        }
    }

    // ============================================================
    // Mode switching
    // ============================================================
    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
        $('explainWrap').classList.toggle('hidden', mode !== 'explain');
        $('buildWrap').classList.toggle('hidden', mode !== 'build');
        refresh();
    }
    function refresh() {
        if (currentMode === 'explain') renderExplain();
        else renderBuild();
    }

    // ============================================================
    // Event bindings
    // ============================================================
    document.querySelectorAll('.mode-btn').forEach(btn => btn.addEventListener('click', () => setMode(btn.dataset.mode)));

    let exprTimer = null;
    $('exprInput').addEventListener('input', () => {
        clearTimeout(exprTimer);
        exprTimer = setTimeout(renderExplain, 150);
    });
    $('copyDescBtn').addEventListener('click', () => copyText(lastDesc, 'Description'));

    let nlTimer = null;
    $('nlInput').addEventListener('input', () => {
        clearTimeout(nlTimer);
        nlTimer = setTimeout(handleNlInput, 250);
    });
    $('copyExprBtn').addEventListener('click', () => copyText($('outExpr').textContent, 'Expression'));

    document.querySelectorAll('.b-mode').forEach(sel => sel.addEventListener('change', renderBuild));
    ['bMinStep','bMinList','bMinFrom','bMinTo','bHrStep','bHrList','bHrFrom','bHrTo','bDomStep','bDomList','bDomFrom','bDomTo']
        .forEach(id => $(id).addEventListener('input', () => { clearTimeout(nlTimer); nlTimer = setTimeout(renderBuild, 150); }));

    $('tzLocal').addEventListener('click', () => { useUtc = false; $('tzLocal').classList.add('active'); $('tzUtc').classList.remove('active'); refresh(); });
    $('tzUtc').addEventListener('click', () => { useUtc = true; $('tzUtc').classList.add('active'); $('tzLocal').classList.remove('active'); refresh(); });

    $('clearBtn').addEventListener('click', () => {
        if (currentMode === 'explain') {
            $('exprInput').value = '';
            renderExplain();
            $('exprInput').focus();
        } else {
            $('nlInput').value = '';
            showNlHint('idle');
            cronToBuilder('* * * * *');
            renderBuild();
            $('nlInput').focus();
        }
    });

    $('themeToggle').addEventListener('click', () => {
        const t = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', t);
        localStorage.setItem('nibset-theme', t);
    });

    // Keep relative times fresh
    setInterval(refresh, 30000);

    // ===== Init =====
    showNlHint('idle');
    cronToBuilder('0 9 * * 1-5');
    renderBuild();
    setMode('explain');
});
</script>
</body>
</html>
