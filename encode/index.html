<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encode / Decode — NibSet</title>
    <link rel="icon" type="image/png" href="../assets/logo.png">
    <meta name="description" content="Convert text between character encodings (UTF-8, CP1252, Latin-1, Shift-JIS…), debug mojibake, and transform Base64 / URL / Hex.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
    (function(){
        var t = localStorage.getItem('nibset-theme');
        if (!t) { t = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'; localStorage.setItem('nibset-theme', t); }
        document.documentElement.setAttribute('data-theme', t);
    })();
    </script>

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #060608;
            --bg-secondary: #111115;
            --bg-tertiary: #1c1c24;
            --bg-hover: #16161c;
            --text-primary: #e8e8ec;
            --text-secondary: #8b8b95;
            --text-muted: #55555e;
            --accent: #c9f270;
            --accent-hover: #b8e35f;
            --accent-text: #060608;
            --border: rgba(255,255,255,0.06);
            --header-bg: rgba(6,6,8,0.85);
            --header-border: rgba(255,255,255,0.05);
            --success: #c9f270;
            --danger: #ef4444;
            --warn-bg: rgba(239,68,68,0.10);
            --font-ui: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
            --header-height: 56px;
            --toolbar-height: 44px;
            --statusbar-height: 28px;
            --radius: 8px;
            --radius-sm: 4px;
        }

        [data-theme="light"] {
            --bg-primary: #f5f5f7;
            --bg-secondary: #eaeaee;
            --bg-tertiary: #dcdce0;
            --bg-hover: #f0f0f4;
            --text-primary: #1a1a1e;
            --text-secondary: #5a5a64;
            --text-muted: #8b8b95;
            --accent: #5a8a1a;
            --accent-hover: #4a7515;
            --accent-text: #ffffff;
            --border: rgba(0,0,0,0.08);
            --header-bg: rgba(245,245,247,0.85);
            --header-border: rgba(0,0,0,0.08);
            --success: #5a8a1a;
            --danger: #c0392b;
            --warn-bg: rgba(192,57,43,0.08);
        }

        html, body { height: 100dvh; overflow: hidden; font-family: var(--font-ui); background: var(--bg-primary); color: var(--text-primary); }
        .app { display: flex; flex-direction: column; height: 100dvh; }

        /* ===== Header ===== */
        .header {
            display: flex; align-items: center; justify-content: space-between;
            height: var(--header-height); padding: 0 16px;
            background: var(--header-bg); backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--header-border); flex-shrink: 0;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header-home { display: flex; align-items: center; opacity: 0.7; transition: opacity 0.2s; flex-shrink: 0; }
        .header-home:hover { opacity: 1; }
        .header-title { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 600; color: var(--text-primary); }
        .header-title i { color: var(--accent); }
        .header-actions { display: flex; gap: 8px; }

        /* ===== Theme Toggle ===== */
        .theme-toggle { display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-tertiary); color: var(--text-secondary); cursor: pointer; transition: all 0.15s; }
        .theme-toggle:hover { background: var(--bg-hover); color: var(--text-primary); }
        .theme-toggle svg { width: 18px; height: 18px; }
        [data-theme="dark"] .theme-toggle .icon-sun { display: none; }
        [data-theme="light"] .theme-toggle .icon-moon { display: none; }

        /* ===== Toolbar ===== */
        .toolbar { display: flex; align-items: center; gap: 4px; padding: 0 16px; height: var(--toolbar-height); border-bottom: 1px solid var(--border); background: var(--bg-secondary); flex-shrink: 0; overflow-x: auto; }
        .toolbar-btn { display: flex; align-items: center; gap: 5px; padding: 5px 10px; border: none; border-radius: var(--radius-sm); background: transparent; color: var(--text-secondary); font-family: var(--font-ui); font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
        .toolbar-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .toolbar-btn i { font-size: 11px; }
        .toolbar-btn.mode-btn.active { background: var(--accent); color: var(--accent-text); }
        .toolbar-btn.mode-btn.active:hover { background: var(--accent-hover); }
        .toolbar-btn.toggle-on { color: var(--accent); }
        .toolbar-btn.hidden { display: none; }
        .tb-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
        .toolbar-spacer { flex: 1; }

        /* ===== Main ===== */
        .main { display: flex; flex: 1; min-height: 0; }

        /* ===== Panes ===== */
        .pane { display: flex; flex-direction: column; flex: 1; min-width: 0; }
        .pane-label {
            min-height: 32px; padding: 4px 12px;
            background: var(--bg-secondary); border-bottom: 1px solid var(--border);
            font-size: 12px; font-weight: 600; color: var(--text-muted);
            display: flex; align-items: center; justify-content: space-between; gap: 8px;
            flex-shrink: 0;
        }
        .pane-label-left { display: flex; align-items: center; gap: 8px; min-width: 0; }
        .pane-title { white-space: nowrap; }
        .pane-body { position: relative; flex: 1; overflow: hidden; background: var(--bg-primary); }

        .pane-ta {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            padding: 16px;
            border: none; outline: none; resize: none;
            background: transparent; color: var(--text-primary);
            font-family: var(--font-mono); font-size: 13px; line-height: 21px;
            tab-size: 4; overflow: auto;
            caret-color: var(--accent);
        }
        .pane-ta::placeholder { color: var(--text-muted); }
        .pane-ta::selection { background: rgba(201,242,112,0.2); }
        [data-theme="light"] .pane-ta::selection { background: rgba(90,138,26,0.15); }
        .pane-ta.error { color: var(--danger) !important; }

        /* ===== Encoding select + view toggle (Encodings mode) ===== */
        .enc-select {
            border: 1px solid var(--border); border-radius: var(--radius-sm);
            background: var(--bg-tertiary); color: var(--text-primary);
            font-family: var(--font-ui); font-size: 11px; font-weight: 600;
            padding: 3px 6px; outline: none; max-width: 170px;
        }
        .enc-select:focus { border-color: var(--accent); }
        .view-toggle { display: inline-flex; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
        .vt-btn { border: none; background: var(--bg-tertiary); color: var(--text-secondary); font-family: var(--font-ui); font-size: 11px; font-weight: 600; padding: 3px 8px; cursor: pointer; transition: all 0.15s; }
        .vt-btn:hover { color: var(--text-primary); }
        .vt-btn.active { background: var(--accent); color: var(--accent-text); }
        .enc-only { display: none; }
        .mode-enc .enc-only { display: inline-flex; }

        /* ===== Copy Button ===== */
        .copy-btn {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 3px 8px;
            border: 1px solid var(--border); border-radius: var(--radius-sm);
            background: var(--bg-tertiary); color: var(--text-secondary);
            font-family: var(--font-ui); font-size: 11px; font-weight: 500;
            cursor: pointer; transition: all 0.15s; white-space: nowrap;
        }
        .copy-btn:hover { background: var(--bg-hover); color: var(--text-primary); border-color: rgba(255,255,255,0.12); }
        [data-theme="light"] .copy-btn:hover { border-color: rgba(0,0,0,0.15); }

        /* ===== Pane Divider ===== */
        .pane-divider { width: 6px; background: var(--bg-secondary); border-left: 1px solid var(--border); border-right: 1px solid var(--border); cursor: col-resize; transition: background 0.15s; flex-shrink: 0; }
        .pane-divider:hover, .pane-divider.dragging { background: var(--accent); }

        /* ===== Codepoint drawer (Encodings mode) ===== */
        .cp-drawer { height: 168px; flex-shrink: 0; border-top: 1px solid var(--border); background: var(--bg-secondary); display: none; flex-direction: column; }
        .mode-enc .cp-drawer.open { display: flex; }
        .cp-drawer-head { display: flex; align-items: center; justify-content: space-between; padding: 4px 12px; font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .cp-scroll { flex: 1; overflow: auto; }
        table.cp-table { width: 100%; border-collapse: collapse; font-family: var(--font-mono); font-size: 12px; }
        table.cp-table th { position: sticky; top: 0; background: var(--bg-secondary); text-align: left; padding: 5px 12px; color: var(--text-muted); font-weight: 600; font-family: var(--font-ui); font-size: 11px; border-bottom: 1px solid var(--border); }
        table.cp-table td { padding: 4px 12px; border-bottom: 1px solid var(--border); color: var(--text-secondary); white-space: nowrap; }
        table.cp-table td.glyph { color: var(--text-primary); font-family: var(--font-ui); }
        table.cp-table tr.bad td { background: var(--warn-bg); }
        table.cp-table tr.bad td.target { color: var(--danger); }

        /* ===== Status Bar ===== */
        .statusbar { display: flex; align-items: center; justify-content: space-between; height: var(--statusbar-height); padding: 0 16px; background: var(--bg-secondary); border-top: 1px solid var(--border); font-size: 11px; color: var(--text-muted); flex-shrink: 0; }
        .statusbar-left, .statusbar-right { display: flex; align-items: center; gap: 12px; }
        .statusbar .warn { color: var(--danger); font-weight: 600; }

        /* ===== Toast ===== */
        .toast-container { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 8px; z-index: 1000; pointer-events: none; }
        .toast { padding: 8px 16px; background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; box-shadow: 0 4px 20px rgba(0,0,0,0.3); opacity: 0; transform: translateY(8px); transition: opacity 0.2s, transform 0.2s; white-space: nowrap; }
        .toast.show { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>
<div class="app mode-enc" id="app">

    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <a href="../index.html" class="header-home" title="Back to NibSet">
                <svg viewBox="0 0 32 38" fill="none" xmlns="http://www.w3.org/2000/svg" width="18" height="22">
                    <path d="M16 0L20 12L16 10L12 12L16 0Z" fill="var(--accent)" />
                    <path d="M10 12L16 10L22 12L24 22L20 26H12L8 22L10 12Z" fill="url(#nhg)" stroke="var(--border)" stroke-width="0.5"/>
                    <rect x="12" y="26" width="8" height="4" rx="1" fill="url(#nhg)" />
                    <line x1="16" y1="0" x2="16" y2="10" stroke="var(--accent)" stroke-opacity="0.3" stroke-width="0.5"/>
                    <circle cx="16" cy="14" r="1.5" fill="var(--accent)" opacity="0.9"/>
                    <path d="M4 8C1 8 0 10 0 13V25C0 28 1 30 4 30" stroke="url(#nhg)" stroke-width="2" fill="none" stroke-linecap="round"/>
                    <path d="M28 8C31 8 32 10 32 13V25C32 28 31 30 28 30" stroke="url(#nhg)" stroke-width="2" fill="none" stroke-linecap="round"/>
                    <line x1="10" y1="33" x2="22" y2="33" stroke="url(#nhg)" stroke-width="1.5" stroke-linecap="round"/>
                    <line x1="11" y1="35.5" x2="21" y2="35.5" stroke="url(#nhg)" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
                    <defs><linearGradient id="nhg" x1="0" y1="0" x2="32" y2="38" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="var(--text-primary)"/><stop offset="100%" stop-color="var(--text-muted)"/></linearGradient></defs>
                </svg>
            </a>
            <div class="header-title">
                <i class="fa-solid fa-language"></i>
                Encode / Decode
            </div>
        </div>
        <div class="header-actions">
            <button class="theme-toggle" id="themeToggle" title="Toggle theme">
                <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
            </button>
        </div>
    </header>

    <!-- Toolbar -->
    <div class="toolbar">
        <button class="toolbar-btn mode-btn active" data-mode="enc"><i class="fa-solid fa-language"></i> Encodings</button>
        <button class="toolbar-btn mode-btn" data-mode="base64"><i class="fa-solid fa-font"></i> Base64</button>
        <button class="toolbar-btn mode-btn" data-mode="url"><i class="fa-solid fa-link"></i> URL</button>
        <button class="toolbar-btn mode-btn" data-mode="hex"><i class="fa-solid fa-hashtag"></i> Hex</button>
        <div class="toolbar-spacer"></div>
        <button class="toolbar-btn enc-only toggle-on" id="swapBtn"><i class="fa-solid fa-right-left"></i> Swap</button>
        <button class="toolbar-btn enc-only toggle-on" id="cpToggle"><i class="fa-solid fa-table-list"></i> Codepoints</button>
        <button class="toolbar-btn" id="clearBtn"><i class="fas fa-eraser"></i> Clear</button>
    </div>

    <!-- Main -->
    <div class="main">

        <!-- Left / Source Pane -->
        <div class="pane" id="inputPane">
            <div class="pane-label">
                <div class="pane-label-left">
                    <span class="pane-title" id="leftTitle">Source</span>
                    <select class="enc-select enc-only" id="leftEnc"></select>
                    <span class="view-toggle enc-only" data-pane="left">
                        <button class="vt-btn active" data-view="text">Text</button>
                        <button class="vt-btn" data-view="hex">Hex</button>
                    </span>
                </div>
                <button class="copy-btn" id="copyLeftBtn"><i class="fas fa-copy"></i> Copy</button>
            </div>
            <div class="pane-body">
                <textarea class="pane-ta" id="inputTA" spellcheck="false" placeholder="Type or paste text…"></textarea>
            </div>
        </div>

        <div class="pane-divider" id="paneDivider"></div>

        <!-- Right / Target Pane -->
        <div class="pane" id="outputPane">
            <div class="pane-label">
                <div class="pane-label-left">
                    <span class="pane-title" id="rightTitle">Target</span>
                    <select class="enc-select enc-only" id="rightEnc"></select>
                    <span class="view-toggle enc-only" data-pane="right">
                        <button class="vt-btn" data-view="text">Text</button>
                        <button class="vt-btn active" data-view="hex">Hex</button>
                    </span>
                </div>
                <button class="copy-btn" id="copyRightBtn"><i class="fas fa-copy"></i> Copy</button>
            </div>
            <div class="pane-body">
                <textarea class="pane-ta" id="outputTA" spellcheck="false" placeholder="Result…"></textarea>
            </div>
        </div>

    </div>

    <!-- Codepoint drawer -->
    <div class="cp-drawer open" id="cpDrawer">
        <div class="cp-drawer-head">
            <span>Per-character breakdown</span>
            <span id="cpSummary"></span>
        </div>
        <div class="cp-scroll">
            <table class="cp-table">
                <thead><tr><th>Char</th><th>Codepoint</th><th id="cpSrcHead">Source bytes</th><th id="cpTgtHead">Target bytes</th></tr></thead>
                <tbody id="cpBody"></tbody>
            </table>
        </div>
    </div>

    <!-- Status Bar -->
    <div class="statusbar">
        <div class="statusbar-left">
            <span id="statusMsg">Convert text between character encodings</span>
        </div>
        <div class="statusbar-right">
            <span id="charCountMsg"></span>
        </div>
    </div>

</div>

<div class="toast-container" id="toastContainer"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const $ = id => document.getElementById(id);

    // ===== DOM refs =====
    const app            = $('app');
    const inputTA        = $('inputTA');
    const outputTA       = $('outputTA');
    const leftEncSel     = $('leftEnc');
    const rightEncSel    = $('rightEnc');
    const statusMsg      = $('statusMsg');
    const charCountMsg   = $('charCountMsg');
    const toastContainer = $('toastContainer');
    const cpDrawer       = $('cpDrawer');
    const cpBody         = $('cpBody');

    // ===== State =====
    let currentMode = 'enc';
    let syncing     = false;
    let leftTimer   = null;
    let rightTimer  = null;
    let S = '';                 // canonical Unicode text (Encodings mode)
    let leftView  = 'text';
    let rightView = 'hex';

    // ===== Toast =====
    function toast(msg) {
        const el = document.createElement('div');
        el.className = 'toast';
        el.textContent = msg;
        toastContainer.appendChild(el);
        requestAnimationFrame(() => el.classList.add('show'));
        setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300); }, 2000);
    }

    // ===== Clipboard =====
    function copyText(text, label) {
        if (!text) { toast('Nothing to copy'); return; }
        navigator.clipboard.writeText(text)
            .then(() => toast(label ? `${label} copied!` : 'Copied!'))
            .catch(() => toast('Copy failed'));
    }

    // ===== Hex helpers (shared) =====
    function bytesToHex(arr) {
        return Array.from(arr).map(b => b.toString(16).padStart(2, '0').toUpperCase()).join(' ');
    }
    function parseHex(s) {
        const clean = s.replace(/0x/gi, '').replace(/[^0-9a-fA-F]/g, '');
        const out = [];
        for (let i = 0; i + 2 <= clean.length; i += 2) out.push(parseInt(clean.substr(i, 2), 16));
        return out;
    }

    // ============================================================
    // Character-encoding engine
    // ============================================================
    const ENCODINGS = [
        { label: 'UTF-8',               group: 'Unicode',  kind: 'utf8'    },
        { label: 'UTF-16 LE',           group: 'Unicode',  kind: 'utf16le' },
        { label: 'UTF-16 BE',           group: 'Unicode',  kind: 'utf16be' },
        { label: 'ASCII (7-bit)',       group: 'Basic',    kind: 'ascii'   },
        { label: 'ISO-8859-1 (Latin-1)',group: 'Basic',    kind: 'latin1'  },
        { label: 'ISO-8859-2',          group: 'European', kind: 'sbcs', td: 'iso-8859-2'   },
        { label: 'ISO-8859-15',         group: 'European', kind: 'sbcs', td: 'iso-8859-15'  },
        { label: 'Windows-1250',        group: 'European', kind: 'sbcs', td: 'windows-1250' },
        { label: 'Windows-1252',        group: 'European', kind: 'sbcs', td: 'windows-1252' },
        { label: 'Windows-1254 (Turk.)',group: 'European', kind: 'sbcs', td: 'windows-1254' },
        { label: 'Windows-1251 (Cyr.)', group: 'Cyrillic', kind: 'sbcs', td: 'windows-1251' },
        { label: 'KOI8-R',              group: 'Cyrillic', kind: 'sbcs', td: 'koi8-r'       },
        { label: 'Shift_JIS',           group: 'CJK',      kind: 'dbcs', td: 'shift_jis'    },
        { label: 'EUC-JP',              group: 'CJK',      kind: 'dbcs', td: 'euc-jp'       },
        { label: 'GBK',                 group: 'CJK',      kind: 'dbcs', td: 'gbk'          },
        { label: 'Big5',                group: 'CJK',      kind: 'dbcs', td: 'big5'         },
        { label: 'EUC-KR',              group: 'CJK',      kind: 'dbcs', td: 'euc-kr'       },
    ];
    const encByLabel = Object.fromEntries(ENCODINGS.map(e => [e.label, e]));

    function getDecoder(td) {
        if (!getDecoder._c) getDecoder._c = {};
        return getDecoder._c[td] || (getDecoder._c[td] = new TextDecoder(td, { fatal: false }));
    }

    // Lazily build reverse codepoint -> byte(s) maps from TextDecoder.
    function buildSbcsMap(enc) {
        if (enc._map) return enc._map;
        const dec = getDecoder(enc.td);
        const m = new Map();
        for (let b = 0; b < 256; b++) {
            const ch = dec.decode(new Uint8Array([b]));
            if (ch.length !== 1) continue;
            const cp = ch.codePointAt(0);
            if (cp === 0xFFFD) continue;
            if (!m.has(cp)) m.set(cp, [b]);
        }
        return (enc._map = m);
    }
    function buildDbcsMap(enc) {
        if (enc._map) return enc._map;
        const dec = getDecoder(enc.td);
        const m = new Map();
        for (let b = 0; b < 256; b++) {
            const ch = dec.decode(new Uint8Array([b]));
            if (ch.length !== 1) continue;
            const cp = ch.codePointAt(0);
            if (cp === 0xFFFD) continue;
            if (!m.has(cp)) m.set(cp, [b]);
        }
        for (let b1 = 0x81; b1 < 256; b1++) {
            for (let b2 = 0x21; b2 < 256; b2++) {
                const ch = dec.decode(new Uint8Array([b1, b2]));
                if (ch.length !== 1) continue;
                const cp = ch.codePointAt(0);
                if (cp === 0xFFFD) continue;
                if (!m.has(cp)) m.set(cp, [b1, b2]);
            }
        }
        return (enc._map = m);
    }

    // Decode bytes -> string
    function decodeBytes(bytes, enc) {
        const u8 = bytes instanceof Uint8Array ? bytes : new Uint8Array(bytes);
        switch (enc.kind) {
            case 'utf8':    return getDecoder('utf-8').decode(u8);
            case 'utf16le': return getDecoder('utf-16le').decode(u8);
            case 'utf16be': return getDecoder('utf-16be').decode(u8);
            case 'ascii':   return Array.from(u8).map(b => b <= 0x7f ? String.fromCharCode(b) : '�').join('');
            case 'latin1':  return Array.from(u8).map(b => String.fromCharCode(b)).join('');
            default:        return getDecoder(enc.td).decode(u8); // sbcs / dbcs
        }
    }

    // Encode a single codepoint -> array of bytes, or null if unrepresentable
    function encodeCodepoint(cp, enc) {
        switch (enc.kind) {
            case 'utf8':    return Array.from(new TextEncoder().encode(String.fromCodePoint(cp)));
            case 'utf16le': {
                const s = String.fromCodePoint(cp); const out = [];
                for (let i = 0; i < s.length; i++) { const c = s.charCodeAt(i); out.push(c & 0xff, c >> 8); }
                return out;
            }
            case 'utf16be': {
                const s = String.fromCodePoint(cp); const out = [];
                for (let i = 0; i < s.length; i++) { const c = s.charCodeAt(i); out.push(c >> 8, c & 0xff); }
                return out;
            }
            case 'ascii':   return cp <= 0x7f ? [cp] : null;
            case 'latin1':  return cp <= 0xff ? [cp] : null;
            case 'sbcs':    { const m = buildSbcsMap(enc); return m.get(cp) || null; }
            case 'dbcs':    { const m = buildDbcsMap(enc); return m.get(cp) || null; }
        }
        return null;
    }

    // Encode whole string -> { bytes:[], bad:[{i,cp}] }
    function encodeText(str, enc) {
        const bytes = [];
        const bad = [];
        let i = 0;
        for (const ch of str) {
            const cp = ch.codePointAt(0);
            const b = encodeCodepoint(cp, enc);
            if (b === null) bad.push({ i, cp });
            else for (const x of b) bytes.push(x);
            i++;
        }
        return { bytes, bad };
    }

    // ============================================================
    // Encodings mode rendering
    // ============================================================
    function paneRefs(which) {
        return which === 'left'
            ? { ta: inputTA,  enc: encByLabel[leftEncSel.value],  view: leftView  }
            : { ta: outputTA, enc: encByLabel[rightEncSel.value], view: rightView };
    }

    // Make a pane the source of truth -> recompute S
    function setSFromPane(which) {
        const { ta, enc, view } = paneRefs(which);
        if (view === 'text') S = ta.value;
        else S = decodeBytes(parseHex(ta.value), enc);
    }

    // Render one pane's textarea from canonical S
    function renderPane(which) {
        const { ta, enc, view } = paneRefs(which);
        ta.classList.remove('error');
        if (view === 'text') { ta.value = S; return; }
        const { bytes, bad } = encodeText(S, enc);
        ta.value = bytesToHex(bytes);
        if (bad.length) ta.classList.add('error');
    }

    const CP_LIMIT = 600;
    function cpName(cp, ch) {
        if (cp === 0x20) return '␠';
        if (cp === 0x09) return '⇥';
        if (cp === 0x0a) return '␊';
        if (cp === 0x0d) return '␍';
        if (cp < 0x20 || cp === 0x7f) return '·';
        return ch;
    }
    function renderTable() {
        if (!cpDrawer.classList.contains('open')) return;
        const lEnc = encByLabel[leftEncSel.value];
        const rEnc = encByLabel[rightEncSel.value];
        $('cpSrcHead').textContent = lEnc.label + ' bytes';
        $('cpTgtHead').textContent = rEnc.label + ' bytes';
        const chars = Array.from(S);
        let rows = '';
        let badCount = 0;
        const shown = Math.min(chars.length, CP_LIMIT);
        for (let i = 0; i < shown; i++) {
            const ch = chars[i];
            const cp = ch.codePointAt(0);
            const sb = encodeCodepoint(cp, lEnc);
            const tb = encodeCodepoint(cp, rEnc);
            const bad = tb === null;
            if (bad) badCount++;
            rows += `<tr class="${bad ? 'bad' : ''}">`
                + `<td class="glyph">${escapeHtml(cpName(cp, ch))}</td>`
                + `<td>U+${cp.toString(16).toUpperCase().padStart(4, '0')}</td>`
                + `<td>${sb ? bytesToHex(sb) : '—'}</td>`
                + `<td class="target">${tb ? bytesToHex(tb) : '✕ unrepresentable'}</td>`
                + `</tr>`;
        }
        cpBody.innerHTML = rows;
        const more = chars.length > shown ? ` (showing first ${shown})` : '';
        $('cpSummary').textContent = `${chars.length} char${chars.length !== 1 ? 's' : ''}${badCount ? ` · ${badCount} unrepresentable` : ''}${more}`;
    }
    function escapeHtml(s) {
        return s.replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
    }

    function updateEncStatus() {
        const lEnc = encByLabel[leftEncSel.value];
        const rEnc = encByLabel[rightEncSel.value];
        const { bad } = encodeText(S, rEnc);
        const chars = Array.from(S).length;
        charCountMsg.textContent = chars ? `${chars.toLocaleString()} char${chars !== 1 ? 's' : ''}` : '';
        if (!S) { statusMsg.textContent = 'Convert text between character encodings'; return; }
        if (bad.length) {
            statusMsg.innerHTML = `${lEnc.label} → ${rEnc.label} · <span class="warn">${bad.length} char${bad.length !== 1 ? 's' : ''} not representable in ${rEnc.label}</span>`;
        } else {
            statusMsg.textContent = `${lEnc.label} → ${rEnc.label} · all characters representable`;
        }
    }

    // Full refresh of the non-authoritative side + table + status
    function refreshEnc(authoritative) {
        const other = authoritative === 'left' ? 'right' : 'left';
        renderPane(other);
        renderTable();
        updateEncStatus();
    }

    // ============================================================
    // Base64 / URL / Hex transforms (legacy modes)
    // ============================================================
    function base64Encode(s) {
        const bytes = new TextEncoder().encode(s);
        let bin = ''; bytes.forEach(b => bin += String.fromCharCode(b));
        return btoa(bin);
    }
    function base64Decode(s) {
        const clean = s.trim().replace(/\s/g, '');
        const bin = atob(clean);
        const bytes = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
        return new TextDecoder().decode(bytes);
    }
    function urlEncode(s) { return encodeURIComponent(s); }
    function urlDecode(s) { return decodeURIComponent(s); }
    function hexEncode(s) {
        return Array.from(new TextEncoder().encode(s)).map(b => b.toString(16).padStart(2, '0')).join(' ');
    }
    function hexDecode(s) {
        const hex = s.trim().replace(/\s+/g, '');
        if (hex.length % 2 !== 0) throw new Error('Odd number of hex digits');
        const pairs = hex.match(/.{2}/g) || [];
        const bytes = pairs.map(h => {
            if (!/^[0-9a-fA-F]{2}$/.test(h)) throw new Error(`Invalid hex byte: ${h}`);
            return parseInt(h, 16);
        });
        return new TextDecoder().decode(new Uint8Array(bytes));
    }
    const LEGACY_LABEL = { base64: 'Base64', url: 'URL', hex: 'Hex' };
    function legacyEncode(s) {
        if (currentMode === 'base64') return base64Encode(s);
        if (currentMode === 'url')    return urlEncode(s);
        if (currentMode === 'hex')    return hexEncode(s);
    }
    function legacyDecode(s) {
        if (currentMode === 'base64') return base64Decode(s);
        if (currentMode === 'url')    return urlDecode(s);
        if (currentMode === 'hex')    return hexDecode(s);
    }
    function syncLeftToRight() {
        const input = inputTA.value;
        const len = input.length;
        charCountMsg.textContent = len > 0 ? `${len.toLocaleString()} char${len !== 1 ? 's' : ''}` : '';
        if (!input) { outputTA.value = ''; outputTA.classList.remove('error'); statusMsg.textContent = 'Type or paste plain text…'; return; }
        try {
            outputTA.value = legacyEncode(input);
            outputTA.classList.remove('error');
            statusMsg.textContent = `${LEGACY_LABEL[currentMode]} · Encoded`;
        } catch (err) {
            outputTA.value = `Error: ${err.message}`;
            outputTA.classList.add('error');
            statusMsg.textContent = `Failed: ${err.message}`;
        }
    }
    function syncRightToLeft() {
        const input = outputTA.value;
        if (!input) { inputTA.value = ''; outputTA.classList.remove('error'); charCountMsg.textContent = ''; statusMsg.textContent = 'Type or paste encoded text…'; return; }
        try {
            const decoded = legacyDecode(input);
            inputTA.value = decoded;
            outputTA.classList.remove('error');
            const len = decoded.length;
            charCountMsg.textContent = len > 0 ? `${len.toLocaleString()} char${len !== 1 ? 's' : ''}` : '';
            statusMsg.textContent = `${LEGACY_LABEL[currentMode]} · Decoded`;
        } catch (err) {
            outputTA.classList.add('error');
            statusMsg.textContent = `Failed: ${err.message}`;
        }
    }

    // ============================================================
    // Mode switching
    // ============================================================
    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
        app.classList.toggle('mode-enc', mode === 'enc');
        if (mode === 'enc') {
            $('leftTitle').textContent = 'Source';
            $('rightTitle').textContent = 'Target';
            outputTA.readOnly = false;
            outputTA.placeholder = 'Edit either side — text or hex…';
            setSFromPane('left');
            renderPane('left'); renderPane('right');
            renderTable(); updateEncStatus();
        } else {
            $('leftTitle').textContent = 'Plain';
            $('rightTitle').textContent = 'Encoded';
            outputTA.placeholder = 'Encoded result will appear here…';
            outputTA.classList.remove('error');
            syncLeftToRight();
        }
    }

    // ============================================================
    // Pane divider
    // ============================================================
    function initDivider() {
        const divider = $('paneDivider');
        const container = divider.parentElement;
        let dragging = false, startX = 0, startLeft = 0;
        divider.addEventListener('mousedown', e => {
            dragging = true; startX = e.clientX;
            startLeft = $('inputPane').getBoundingClientRect().width;
            divider.classList.add('dragging');
            document.body.style.userSelect = 'none';
            document.body.style.cursor = 'col-resize';
        });
        document.addEventListener('mousemove', e => {
            if (!dragging) return;
            const containerWidth = container.getBoundingClientRect().width - divider.offsetWidth;
            const newLeft = Math.max(120, Math.min(containerWidth - 120, startLeft + (e.clientX - startX)));
            const leftPct = (newLeft / containerWidth) * 100;
            $('inputPane').style.flex = `0 0 ${leftPct}%`;
            $('outputPane').style.flex = `0 0 ${100 - leftPct}%`;
        });
        document.addEventListener('mouseup', () => {
            if (!dragging) return;
            dragging = false;
            divider.classList.remove('dragging');
            document.body.style.userSelect = '';
            document.body.style.cursor = '';
        });
    }

    // ============================================================
    // Build encoding selects
    // ============================================================
    function buildEncSelects() {
        const groups = {};
        ENCODINGS.forEach(e => { (groups[e.group] = groups[e.group] || []).push(e); });
        const html = Object.entries(groups).map(([g, list]) =>
            `<optgroup label="${g}">` + list.map(e => `<option value="${e.label}">${e.label}</option>`).join('') + `</optgroup>`
        ).join('');
        leftEncSel.innerHTML = html;
        rightEncSel.innerHTML = html;
        leftEncSel.value = 'UTF-8';
        rightEncSel.value = 'Windows-1252';
    }

    // ============================================================
    // Event bindings
    // ============================================================
    inputTA.addEventListener('input', () => {
        if (syncing) return;
        clearTimeout(leftTimer);
        leftTimer = setTimeout(() => {
            syncing = true;
            if (currentMode === 'enc') { setSFromPane('left'); refreshEnc('left'); }
            else syncLeftToRight();
            syncing = false;
        }, 150);
    });
    outputTA.addEventListener('input', () => {
        if (syncing) return;
        clearTimeout(rightTimer);
        rightTimer = setTimeout(() => {
            syncing = true;
            if (currentMode === 'enc') { setSFromPane('right'); refreshEnc('right'); }
            else syncRightToLeft();
            syncing = false;
        }, 150);
    });

    // View toggles
    document.querySelectorAll('.view-toggle').forEach(vt => {
        const which = vt.dataset.pane;
        vt.querySelectorAll('.vt-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                vt.querySelectorAll('.vt-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                if (which === 'left') leftView = btn.dataset.view; else rightView = btn.dataset.view;
                renderPane(which);          // show current S in the new view
            });
        });
    });

    // Encoding dropdowns
    leftEncSel.addEventListener('change', () => {
        // In hex view the bytes are authoritative -> reinterpret them (mojibake debugging)
        if (leftView === 'hex') { setSFromPane('left'); refreshEnc('left'); }
        else { renderTable(); updateEncStatus(); }
    });
    rightEncSel.addEventListener('change', () => {
        if (rightView === 'hex') { setSFromPane('right'); refreshEnc('right'); }
        else { renderTable(); updateEncStatus(); }
    });

    // Swap source/target encodings
    $('swapBtn').addEventListener('click', () => {
        const l = leftEncSel.value, r = rightEncSel.value;
        leftEncSel.value = r; rightEncSel.value = l;
        const lv = leftView; leftView = rightView; rightView = lv;
        document.querySelectorAll('.view-toggle').forEach(vt => {
            const v = vt.dataset.pane === 'left' ? leftView : rightView;
            vt.querySelectorAll('.vt-btn').forEach(b => b.classList.toggle('active', b.dataset.view === v));
        });
        renderPane('left'); renderPane('right'); renderTable(); updateEncStatus();
    });

    // Codepoint drawer toggle
    $('cpToggle').addEventListener('click', () => {
        const open = cpDrawer.classList.toggle('open');
        $('cpToggle').classList.toggle('toggle-on', open);
        if (open) renderTable();
    });

    // Mode buttons
    document.querySelectorAll('.mode-btn').forEach(btn => btn.addEventListener('click', () => setMode(btn.dataset.mode)));

    // Copy buttons
    $('copyLeftBtn').addEventListener('click', () => copyText(inputTA.value, currentMode === 'enc' ? 'Source' : 'Input'));
    $('copyRightBtn').addEventListener('click', () => {
        if (currentMode !== 'enc' && outputTA.classList.contains('error')) { toast('Nothing to copy'); return; }
        copyText(outputTA.value, currentMode === 'enc' ? 'Target' : 'Output');
    });

    $('clearBtn').addEventListener('click', () => {
        inputTA.value = ''; outputTA.value = '';
        inputTA.classList.remove('error'); outputTA.classList.remove('error');
        charCountMsg.textContent = '';
        if (currentMode === 'enc') { S = ''; renderTable(); statusMsg.textContent = 'Convert text between character encodings'; }
        else statusMsg.textContent = 'Type or paste text to transform';
    });

    $('themeToggle').addEventListener('click', () => {
        const t = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', t);
        localStorage.setItem('nibset-theme', t);
    });

    // ===== Init =====
    buildEncSelects();
    initDivider();
    inputTA.value = 'Héllo, café — €5';
    setMode('enc');
});
</script>
</body>
</html>
