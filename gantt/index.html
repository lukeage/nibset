    e.stopPropagation();
    exportDropdown.classList.remove('open');
    const data = JSON.stringify({ version: 1, tasks, view }, null, 2);
    downloadBlob(new Blob([data], { type: 'application/json' }), 'gantt.json');
  });
  document.getElementById('exportPngBtn').addEventListener('click', async (e) => {
    e.stopPropagation();
    exportDropdown.classList.remove('open');
    const blob = await renderToPngBlob();
    if (!blob) return;
    const buf = await blob.arrayBuffer();
    const jsonStr = JSON.stringify({ version: 1, tasks, view });
    const enhanced = embedPngMetadata(buf, 'GanttTogether', jsonStr);
    downloadBlob(new Blob([enhanced], { type: 'image/png' }), 'gantt.png');
  });

  function downloadBlob(blob, name) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = name; a.click();
    URL.revokeObjectURL(url);
  }

  // Import
  const fileInput = document.createElement('input');
  fileInput.type = 'file'; fileInput.accept = '.json,.png'; fileInput.style.display = 'none';
  document.body.appendChild(fileInput);
  importBtn.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', () => { importFile(fileInput.files[0]); fileInput.value = ''; });

  function importFile(file) {
    if (!file) return;
    if (file.name.endsWith('.png') || file.type === 'image/png') {
      const r = new FileReader();
      r.onload = () => {
        const meta = extractPngMetadata(r.result, 'GanttTogether');
        if (!meta) { alert('This PNG does not contain Gantt data'); return; }
        try { loadStateFromData(JSON.parse(meta)); }
        catch (err) { alert('Failed to parse embedded data: ' + err.message); }
      };
      r.readAsArrayBuffer(file);
    } else {
      const r = new FileReader();
      r.onload = () => {
        try { loadStateFromData(JSON.parse(r.result)); }
        catch (err) { alert('Failed to parse file: ' + err.message); }
      };
      r.readAsText(file);
    }
  }

  function loadStateFromData(data) {
    if (!data || !Array.isArray(data.tasks)) { alert('Invalid file format'); return; }
    pushUndo();
    tasks = data.tasks;
    if (data.view) view = Object.assign({ zoom: 'week', customColumns: [], columnCollapse: {} }, data.view);
    selectedId = null;
    document.querySelectorAll('#zoomGroup .tool-btn').forEach(b => b.classList.toggle('tool-active', b.dataset.zoom === view.zoom));
    render();
    if (isHost) {
      for (const e of connections) if (e.conn.open) e.conn.send({ type: 'sync-state', tasks, view });
    } else if (hostConn && hostConn.open) {
      hostConn.send({ type: 'sync-state', tasks, view });
    }
  }

  // ============================================================
  // PNG export rendering — serialize the timeline SVG to canvas
  // ============================================================
  async function renderToPngBlob() {
    if (tasks.length === 0 && (!view.customColumns || view.customColumns.length === 0)) {
      alert('Nothing to export yet.');
      return null;
    }
    const cols = lastCols;
    const rows = lastRows;
    const totalW = cols.length ? cols[cols.length - 1].x + cols[cols.length - 1].width : 600;
    const leftW = 280;
    const headerH = 40;
    const bodyH = Math.max(rows.length * ROW_HEIGHT + 20, 120);
    const totalH = headerH + bodyH;
    const fullW = leftW + totalW;

    const isLight = document.documentElement.getAttribute('data-theme') === 'light';
    const bg = isLight ? '#f5f5f7' : '#060608';
    const textColor = isLight ? '#1a1a1e' : '#e8e8ec';
    const mutedColor = isLight ? '#5a5a64' : '#8b8b95';
    const borderColor = isLight ? '#dcdce0' : '#1c1c24';
    const accent = getAccent();
    const defaultBar = getDefaultBar();
    const rowHoverColor = isLight ? 'rgba(0,0,0,0.04)' : 'rgba(255,255,255,0.04)';

    // Build standalone SVG markup
    let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${fullW}" height="${totalH}" font-family="Plus Jakarta Sans, system-ui, sans-serif" font-size="12">`;
    svg += `<rect x="0" y="0" width="${fullW}" height="${totalH}" fill="${bg}"/>`;

    // Left pane: header
    svg += `<rect x="0" y="0" width="${leftW}" height="${headerH}" fill="${bg}"/>`;
    svg += `<text x="14" y="${headerH/2+4}" fill="${mutedColor}" font-size="11" font-weight="700" letter-spacing="0.6" style="text-transform:uppercase">Tasks</text>`;
    svg += `<line x1="0" y1="${headerH}" x2="${fullW}" y2="${headerH}" stroke="${borderColor}"/>`;
    svg += `<line x1="${leftW}" y1="0" x2="${leftW}" y2="${totalH}" stroke="${borderColor}"/>`;

    // Left pane: rows
    for (let i = 0; i < rows.length; i++) {
      const { task, depth } = rows[i];
      const ty = headerH + i * ROW_HEIGHT;
      svg += `<line x1="0" x2="${fullW}" y1="${ty + ROW_HEIGHT}" y2="${ty + ROW_HEIGHT}" stroke="${borderColor}"/>`;
      const indent = 8 + depth * 14;
      const color = task.color || defaultBar;
      svg += `<circle cx="${indent + 8}" cy="${ty + ROW_HEIGHT/2}" r="5" fill="${color}"/>`;
      let glyph = '';
      if (task.type === 'milestone') glyph = '◆ ';
      else if (task.type === 'group') glyph = '▸ ';
      const txt = escapeXml(glyph + task.title);
      svg += `<text x="${indent + 20}" y="${ty + ROW_HEIGHT/2 + 4}" fill="${textColor}">${txt}</text>`;
      if (task.assignee) {
        svg += `<text x="${leftW - 10}" y="${ty + ROW_HEIGHT/2 + 4}" fill="${mutedColor}" font-size="10" text-anchor="end">${escapeXml(task.assignee)}</text>`;
      }
    }

    // Right pane: header
    for (const c of cols) {
      const cx = leftW + c.x;
      svg += `<rect x="${cx}" y="0" width="${c.width}" height="${headerH}" fill="${c.weekend ? rowHoverColor : 'none'}"/>`;
      svg += `<line x1="${cx + c.width}" y1="0" x2="${cx + c.width}" y2="${totalH}" stroke="${borderColor}"/>`;
      if (!c.collapsed) {
        svg += `<text x="${cx + c.width/2}" y="${headerH/2 - 2}" fill="${mutedColor}" font-size="11" font-weight="600" text-anchor="middle">${escapeXml(c.label)}</text>`;
        if (c.sub) svg += `<text x="${cx + c.width/2}" y="${headerH/2 + 12}" fill="${mutedColor}" font-size="9" text-anchor="middle">${escapeXml(c.sub)}</text>`;
      } else {
        svg += `<rect x="${cx}" y="0" width="${c.width}" height="${totalH}" fill="${borderColor}" opacity="0.5"/>`;
      }
    }

    // Weekend stripes in body
    for (const c of cols) {
      if (c.weekend && !c.collapsed) {
        const cx = leftW + c.x;
        svg += `<rect x="${cx}" y="${headerH}" width="${c.width}" height="${bodyH}" fill="${rowHoverColor}"/>`;
      }
    }

    // Today line
    const today = todayISO();
    const tx = dateToX(today, cols);
    if (tx != null && tx > 0 && tx < totalW) {
      svg += `<line x1="${leftW + tx}" y1="${headerH}" x2="${leftW + tx}" y2="${totalH}" stroke="${accent}" stroke-width="1.5" stroke-dasharray="4 3"/>`;
    }

    // Bars
    for (let i = 0; i < rows.length; i++) {
      const { task } = rows[i];
      const y = headerH + i * ROW_HEIGHT + BAR_PAD;
      if (task.type === 'milestone') {
        const x = leftW + dateToX(task.start, cols);
        const s = BAR_HEIGHT;
        const cx = x, cy = y + s/2;
        svg += `<path d="M ${cx} ${cy - s/2} L ${cx + s/2} ${cy} L ${cx} ${cy + s/2} L ${cx - s/2} ${cy} Z" fill="${task.color || defaultBar}" stroke="${task.status === 'done' ? '#22c55e' : 'rgba(0,0,0,0.2)'}" stroke-width="${task.status === 'done' ? 2 : 1}"/>`;
        svg += `<text x="${cx + s/2 + 6}" y="${cy + 4}" fill="${mutedColor}" font-size="11">${escapeXml(task.title)}</text>`;
      } else if (task.type === 'group') {
        const span = computeGroupSpan(task);
        const rect = spanToRect(span.start, span.end, cols);
        const x = leftW + rect.x, w = rect.width, h = 10, by = y + (BAR_HEIGHT - h)/2;
        const cap = 4;
        const d = `M ${x} ${by} H ${x + w} V ${by + h} H ${x + w - cap} L ${x + w - cap - cap} ${by + h - cap} H ${x + cap + cap} L ${x + cap} ${by + h} H ${x} Z`;
        svg += `<path d="${d}" fill="${task.color || textColor}"/>`;
        svg += `<text x="${x}" y="${by - 4}" fill="${mutedColor}" font-size="11" font-weight="600">${escapeXml(task.title)}</text>`;
      } else {
        const rect = spanToRect(task.start, task.end, cols);
        const x = leftW + rect.x, w = rect.width;
        const color = task.color || defaultBar;
        svg += `<rect x="${x}" y="${y}" width="${w}" height="${BAR_HEIGHT}" rx="5" fill="${color}"/>`;
        const statusFill = task.status === 'done' ? '#22c55e' : task.status === 'doing' ? '#f59e0b' : 'rgba(255,255,255,0.6)';
        svg += `<circle cx="${x + 8}" cy="${y + BAR_HEIGHT/2}" r="3.5" fill="${statusFill}"/>`;
        if (w > 36) {
          const labelColor = task.color ? '#000' : '#fff';
          const trimmed = task.title.length > 30 ? task.title.slice(0, 27) + '…' : task.title;
          svg += `<text x="${x + 18}" y="${y + BAR_HEIGHT/2 + 4}" fill="${labelColor}" font-size="11">${escapeXml(trimmed)}</text>`;
        }
      }
    }

    svg += '</svg>';

    return await new Promise((resolve) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = fullW; canvas.height = totalH;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        canvas.toBlob(b => resolve(b), 'image/png');
      };
      img.onerror = () => resolve(null);
      img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
    });
  }
  function escapeXml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&apos;'}[c]));
  }

  // ============================================================
  // PNG metadata (tEXt chunk) — adapted verbatim from draw tool
  // ============================================================
  function crc32(buf) {
    let crc = -1;
    for (let i = 0; i < buf.length; i++) {
      crc ^= buf[i];
      for (let j = 0; j < 8; j++) crc = (crc >>> 1) ^ (crc & 1 ? 0xEDB88320 : 0);
    }
    return (crc ^ -1) >>> 0;
  }
  function embedPngMetadata(pngBuf, key, value) {
    const png = new Uint8Array(pngBuf);
    let iendPos = -1;
    for (let i = png.length - 12; i >= 8; i--) {
      if (png[i+4] === 0x49 && png[i+5] === 0x45 && png[i+6] === 0x4E && png[i+7] === 0x44) {
        iendPos = i; break;
      }
    }
    if (iendPos < 0) return pngBuf;
    const enc = new TextEncoder();
    const keyBytes = enc.encode(key);
    const valBytes = enc.encode(value);
    const dataLen = keyBytes.length + 1 + valBytes.length;
    const chunk = new Uint8Array(12 + dataLen);
    const dv = new DataView(chunk.buffer);
    dv.setUint32(0, dataLen);
    chunk[4] = 0x74; chunk[5] = 0x45; chunk[6] = 0x58; chunk[7] = 0x74;
    chunk.set(keyBytes, 8);
    chunk[8 + keyBytes.length] = 0;
    chunk.set(valBytes, 9 + keyBytes.length);
    const crcData = chunk.slice(4, 8 + dataLen);
    dv.setUint32(8 + dataLen, crc32(crcData));
    const result = new Uint8Array(png.length + chunk.length);
    result.set(png.slice(0, iendPos));
    result.set(chunk, iendPos);
    result.set(png.slice(iendPos), iendPos + chunk.length);
    return result.buffer;
  }
  function extractPngMetadata(pngBuf, key) {
    const png = new Uint8Array(pngBuf);
    const enc = new TextEncoder();
    const keyBytes = enc.encode(key);
    let pos = 8;
    while (pos < png.length - 8) {
      const dv = new DataView(png.buffer, pos);
      const len = dv.getUint32(0);
      const type = String.fromCharCode(png[pos+4], png[pos+5], png[pos+6], png[pos+7]);
      if (type === 'tEXt') {
        let match = keyBytes.length < len;
        for (let i = 0; match && i < keyBytes.length; i++) {
          if (png[pos + 8 + i] !== keyBytes[i]) match = false;
        }
        if (match && png[pos + 8 + keyBytes.length] === 0) {
          const valStart = pos + 9 + keyBytes.length;
          const valEnd = pos + 8 + len;
          return new TextDecoder().decode(png.slice(valStart, valEnd));
        }
      }
      if (type === 'IEND') break;
      pos += 12 + len;
    }
    return null;
  }

  // ============================================================
  // PeerJS collaboration — host/guest, adapted from draw tool
  // ============================================================
  function broadcast(msg) {
    if (isHost) {
      for (const entry of connections) if (entry.conn.open) entry.conn.send(msg);
    } else if (hostConn && hostConn.open) {
      hostConn.send(msg);
    }
  }
  function broadcastExcept(msg, excludeConn) {
    for (const entry of connections) {
      if (entry.conn !== excludeConn && entry.conn.open) entry.conn.send(msg);
    }
  }

  function applyTaskPatch(task, patch) {
    Object.assign(task, patch);
  }

  function handleMessage(msg, fromConn) {
    if (msg.type === 'sync-state') {
      tasks = msg.tasks || [];
      if (msg.view) view = Object.assign({ zoom: 'week', customColumns: [], columnCollapse: {} }, msg.view);
      selectedId = null;
      document.querySelectorAll('#zoomGroup .tool-btn').forEach(b => b.classList.toggle('tool-active', b.dataset.zoom === view.zoom));
      render();
      return;
    }
    if (msg.type === 'user-count') {
      userCount = msg.count;
      updateStatusCount();
      return;
    }
    if (msg.type === 'task-add') {
      if (!findTask(msg.task.id)) tasks.push(msg.task);
      render();
      if (isHost && fromConn) broadcastExcept(msg, fromConn);
      return;
    }
    if (msg.type === 'task-update') {
      const t = findTask(msg.id);
      if (t) applyTaskPatch(t, msg.patch);
      render();
      if (isHost && fromConn) broadcastExcept(msg, fromConn);
      return;
    }
    if (msg.type === 'task-delete') {
      const task = findTask(msg.id);
      if (task) {
        const parentId = task.parentId;
        const kids = childrenOf(msg.id);
        const newSibs = childrenOf(parentId).filter(s => s.id !== msg.id);
        const idx = childrenOf(parentId).findIndex(s => s.id === msg.id);
        for (const k of kids) k.parentId = parentId;
        const before = newSibs.slice(0, idx);
        const after = newSibs.slice(idx);
        [...before, ...kids, ...after].forEach((s, i) => s.orderIndex = i);
        tasks = tasks.filter(t => t.id !== msg.id);
      }
      render();
      if (isHost && fromConn) broadcastExcept(msg, fromConn);
      return;
    }
    if (msg.type === 'task-reorder') {
      const t = findTask(msg.id);
      if (t) {
        const oldParentId = t.parentId;
        t.parentId = msg.parentId;
        // Re-pack old parent siblings (excluding t)
        if (oldParentId !== msg.parentId) {
          childrenOf(oldParentId).filter(s => s.id !== msg.id).forEach((s, i) => s.orderIndex = i);
        }
        // Re-pack new parent siblings around t at the requested index
        const others = childrenOf(msg.parentId).filter(s => s.id !== msg.id);
        others.forEach((s, i) => s.orderIndex = i < msg.orderIndex ? i : i + 1);
        t.orderIndex = msg.orderIndex;
      }
      render();
      if (isHost && fromConn) broadcastExcept(msg, fromConn);
      return;
    }
    if (msg.type === 'view-update') {
      Object.assign(view, msg.patch);
      document.querySelectorAll('#zoomGroup .tool-btn').forEach(b => b.classList.toggle('tool-active', b.dataset.zoom === view.zoom));
      render();
      if (isHost && fromConn) broadcastExcept(msg, fromConn);
      return;
    }
  }

  function getUserCount() { return connections.length + 1; }
  function broadcastUserCount() {
    const count = getUserCount();
    for (const entry of connections) if (entry.conn.open) entry.conn.send({ type: 'user-count', count });
    updateStatusCount();
  }

  function startHosting() {
    appState = 'room';
    isHost = true;
    setStatus('Initializing...', 'waiting');
    const peer = new Peer();
    peer.on('open', (id) => {
      myId = id;
      const inviteLink = window.location.origin + window.location.pathname + '#room=' + id;
      setStatus('Waiting for guests', 'waiting');
      copyLinkBtn.classList.remove('hidden');
      copyLinkBtn.onclick = () => {
        navigator.clipboard.writeText(inviteLink).then(() => {
          copyLinkBtn.title = 'Copied!';
          setTimeout(() => { copyLinkBtn.title = 'Copy Link'; }, 2000);
        });
      };
    });
    peer.on('connection', (c) => {
      if (connections.length >= MAX_USERS - 1) {
        c.on('open', () => {
          c.send({ type: 'error', message: 'Room is full (max ' + MAX_USERS + ' users)' });
          setTimeout(() => c.close(), 500);
        });
        return;
      }
      const entry = { conn: c };
      connections.push(entry);
      c.on('open', () => {
        c.send({ type: 'user-count', count: getUserCount() });
        c.send({ type: 'sync-state', tasks, view });
        updateStatusCount();
        broadcastUserCount();
      });
      c.on('data', (msg) => handleMessage(msg, c));
      c.on('close', () => {
        connections = connections.filter(e => e.conn !== c);
        broadcastUserCount();
        if (connections.length === 0) setStatus('Waiting for guests', 'waiting');
      });
    });
    peer.on('error', (err) => setStatus('Error: ' + err.type, 'disconnected'));
  }

  function handleJoin() {
    const hash = window.location.hash;
    if (!hash.startsWith('#room=')) return;
    guestRoomId = hash.substring(6);
    connectAsGuest(guestRoomId);
  }

  function connectAsGuest(roomId) {
    appState = 'room';
    isHost = false;
    setStatus('Connecting...', 'waiting');
    const peer = new Peer();
    guestPeer = peer;
    peer.on('open', (id) => {
      myId = id;
      const c = peer.connect(roomId, { reliable: true, serialization: 'json' });
      hostConn = c;
      c.on('open', () => {
        reconnectAttempts = 0;
        hideConnectionBanner();
        setStatus('Connected!', 'connected');
        history.replaceState(null, '', window.location.pathname);
      });
      c.on('data', (msg) => {
        if (msg.type === 'error') {
          setStatus(msg.message, 'disconnected');
          c.close();
          return;
        }
        handleMessage(msg, null);
      });
      c.on('close', () => {
        setStatus('Disconnected', 'disconnected');
        hostConn = null;
        attemptReconnect();
      });
    });
    peer.on('error', (err) => {
      if (err.type === 'peer-unavailable') setStatus('Room not found or expired', 'disconnected');
      else { setStatus('Error: ' + err.type, 'disconnected'); attemptReconnect(); }
    });
  }

  function attemptReconnect() {
    if (!guestRoomId || reconnectAttempts >= MAX_RECONNECT) {
      showConnectionBanner('Disconnected. Could not reconnect.');
      return;
    }
    reconnectAttempts++;
    const delay = Math.min(1000 * Math.pow(2, reconnectAttempts - 1), 10000);
    showConnectionBanner('Reconnecting... (attempt ' + reconnectAttempts + '/' + MAX_RECONNECT + ')');
    setStatus('Reconnecting...', 'reconnecting');
    setTimeout(() => {
      if (guestPeer) { try { guestPeer.destroy(); } catch (e) {} guestPeer = null; }
      connectAsGuest(guestRoomId);
    }, delay);
  }

  // ============================================================
  // Theme toggle
  // ============================================================
  (function setupTheme() {
    let mode = localStorage.getItem('nibset-theme') || 'dark';
    const btn = document.getElementById('themeToggle');
    function apply(m) {
      mode = m;
      document.documentElement.setAttribute('data-theme', m);
      localStorage.setItem('nibset-theme', m);
      btn.querySelector('.icon-sun').style.display = (m === 'light') ? 'block' : 'none';
      btn.querySelector('.icon-moon').style.display = (m === 'dark') ? 'block' : 'none';
      render();
    }
    btn.addEventListener('click', () => apply(mode === 'light' ? 'dark' : 'light'));
    apply(mode);
  })();

  // ============================================================
  // Keyboard shortcuts
  // ============================================================
  document.addEventListener('keydown', (e) => {
    const tag = (e.target && e.target.tagName) || '';
    const editing = tag === 'INPUT' || tag === 'TEXTAREA' || (e.target && e.target.isContentEditable);
    if (editing) return;
    if (e.key === 'Escape') {
      customPanel.classList.remove('open');
      return;
    }
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z' && !e.shiftKey) { e.preventDefault(); performUndo(); return; }
    if ((e.ctrlKey || e.metaKey) && ((e.key.toLowerCase() === 'z' && e.shiftKey) || e.key.toLowerCase() === 'y')) { e.preventDefault(); performRedo(); return; }
    if ((e.key === 'Delete' || e.key === 'Backspace') && selectedId) { e.preventDefault(); deleteTask(selectedId); return; }
    if (e.key === 'Enter' && selectedId) {
      e.preventDefault();
      setInspectorCollapsed(false);
      const iTitle = document.getElementById('iTitle');
      if (iTitle) { iTitle.focus(); iTitle.select(); }
    }
  });

  // ============================================================
  // Init
  // ============================================================
  function restoreLocalState() {
    const data = loadLocalState();
    if (!data) return false;
    tasks = data.tasks;
    if (data.view) view = Object.assign({ zoom: 'week', customColumns: [], columnCollapse: {} }, data.view);
    document.querySelectorAll('#zoomGroup .tool-btn').forEach(b => b.classList.toggle('tool-active', b.dataset.zoom === view.zoom));
    return true;
  }

  function ensureDemoState() {
    if (tasks.length > 0) return;
    if (restoreLocalState() && tasks.length > 0) return;
    // Seed with a small example so the empty state isn't blank.
    const t = todayISO();
    const groupId = uuid();
    const g = { id: groupId, type: 'group', parentId: null, orderIndex: 0, collapsed: false,
      title: 'Project kickoff', start: t, end: addDays(t, 14),
      color: null, assignee: '', notes: '', status: 'doing', authorId: myId };
    const child1 = { id: uuid(), type: 'task', parentId: groupId, orderIndex: 0, collapsed: false,
      title: 'Research & discovery', start: t, end: addDays(t, 4),
      color: '#3b82f6', assignee: 'Alex', notes: '', status: 'doing', authorId: myId };
    const child2 = { id: uuid(), type: 'task', parentId: groupId, orderIndex: 1, collapsed: false,
      title: 'Draft proposal', start: addDays(t, 3), end: addDays(t, 8),
      color: '#c9f270', assignee: '', notes: '', status: 'todo', authorId: myId };
    const ms = { id: uuid(), type: 'milestone', parentId: groupId, orderIndex: 2, collapsed: false,
      title: 'Kickoff meeting', start: addDays(t, 10), end: addDays(t, 10),
      color: '#ef4444', assignee: '', notes: '', status: 'todo', authorId: myId };
    tasks = [g, child1, child2, ms];
  }

  if (window.location.hash.startsWith('#room=')) {
    handleJoin();
  } else {
    ensureDemoState();
    startHosting();
  }
  render();

  window.addEventListener('resize', render);
})();
</script>
</body>
