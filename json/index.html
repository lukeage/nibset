    <script>
    // Lightweight TOML parser (covers common subset: strings, numbers, booleans, arrays, tables, inline tables)
    window.toml = { parse: function(input) {
      var result = {}, current = result, stack = [result], lines = input.split('\n');
      function parseValue(s) {
        s = s.trim();
        if (s === 'true') return true;
        if (s === 'false') return false;
        if (/^-?\d+$/.test(s)) return parseInt(s, 10);
        if (/^-?(\d+\.?\d*|\.\d+)([eE][+-]?\d+)?$/.test(s) || /^[+-]?(inf|nan)$/.test(s)) return parseFloat(s);
        if ((s[0]==='"'&&s[s.length-1]==='"')||(s[0]==="'"&&s[s.length-1]==="'")) {
          var q=s[0], inner=s.slice(1,-1);
          if(q==='"') inner=inner.replace(/\\n/g,'\n').replace(/\\t/g,'\t').replace(/\\"/g,'"').replace(/\\\\/g,'\\');
          return inner;
        }
        if (s[0]==='[') return parseInlineArray(s);
        if (s[0]==='{') return parseInlineTable(s);
        // Multi-line or datetime strings — return as-is
        return s;
      }
      function parseInlineArray(s) {
        s = s.trim().slice(1,-1).trim();
        if (!s) return [];
        return splitComma(s).map(parseValue);
      }
      function parseInlineTable(s) {
        s = s.trim().slice(1,-1).trim();
        if (!s) return {};
        var obj = {};
        splitComma(s).forEach(function(pair) {
          var eq = pair.indexOf('=');
          if (eq<0) return;
          var k = pair.slice(0,eq).trim().replace(/^["']|["']$/g,'');
          obj[k] = parseValue(pair.slice(eq+1));
        });
        return obj;
      }
      function splitComma(s) {
        var parts=[],depth=0,start=0,inStr=false,q='';
        for(var i=0;i<s.length;i++){
          var c=s[i];
          if(inStr){if(c===q&&s[i-1]!=='\\')inStr=false;continue;}
          if(c==='"'||c==="'"){inStr=true;q=c;continue;}
          if(c==='['||c==='{')depth++;
          if(c===']'||c==='}')depth--;
          if(c===','&&depth===0){parts.push(s.slice(start,i).trim());start=i+1;}
        }
        var last=s.slice(start).trim();
        if(last)parts.push(last);
        return parts;
      }
      function ensurePath(obj, keys) {
        var cur = obj;
        for (var i=0;i<keys.length;i++) {
          var k = keys[i];
          if (!(k in cur) || typeof cur[k] !== 'object') cur[k] = {};
          cur = cur[k];
        }
        return cur;
      }
      function parseKey(k) {
        k = k.trim();
        return k.split('.').map(function(part) {
          part = part.trim();
          if ((part[0]==='"'&&part[part.length-1]==='"')||(part[0]==="'"&&part[part.length-1]==="'"))
            return part.slice(1,-1);
          return part;
        });
      }
      var inMultiStr = false, multiKey = '', multiStr = '', multiQuote = '';
      for (var i=0;i<lines.length;i++) {
        var line = lines[i];
        if (inMultiStr) {
          var endIdx = line.indexOf(multiQuote);
          if (endIdx >= 0) {
            multiStr += line.slice(0, endIdx);
            current[multiKey] = multiStr;
            inMultiStr = false;
          } else {
            multiStr += line + '\n';
          }
          continue;
        }
        // Strip comments outside of strings
        var commentIdx = -1, inQ = false, qc = '';
        for (var ci = 0; ci < line.length; ci++) {
          var ch = line[ci];
          if (inQ) { if (ch === qc && line[ci-1] !== '\\') inQ = false; continue; }
          if (ch === '"' || ch === "'") { inQ = true; qc = ch; continue; }
          if (ch === '#') { commentIdx = ci; break; }
        }
        if (commentIdx >= 0) line = line.slice(0, commentIdx);
        line = line.trim();
        if (!line) continue;
        // Array of tables [[key]]
        var m = line.match(/^\[\[([^\]]+)\]\]\s*$/);
        if (m) {
          var keys = parseKey(m[1]);
          var parent = ensurePath(result, keys.slice(0,-1));
          var lastKey = keys[keys.length-1];
          if (!Array.isArray(parent[lastKey])) parent[lastKey] = [];
          var obj = {};
          parent[lastKey].push(obj);
          current = obj;
          continue;
        }
        // Table [key]
        m = line.match(/^\[([^\]]+)\]\s*$/);
        if (m) {
          var keys = parseKey(m[1]);
          current = ensurePath(result, keys);
          continue;
        }
        // Key = value
        var eq = line.indexOf('=');
        if (eq > 0) {
          var k = line.slice(0,eq).trim().replace(/^["']|["']$/g,'');
          var v = line.slice(eq+1).trim();
          // Check for multi-line strings
          if (v.startsWith('"""') || v.startsWith("'''")) {
            multiQuote = v.slice(0,3);
            var rest = v.slice(3);
            var endIdx = rest.indexOf(multiQuote);
            if (endIdx >= 0) {
              current[k] = rest.slice(0, endIdx);
            } else {
              inMultiStr = true; multiKey = k; multiStr = rest + '\n';
            }
            continue;
          }
          current[k] = parseValue(v);
        }
      }
      return result;
    }};
    </script>
    <script>
    (function(){
      var t = localStorage.getItem('nibset-theme');
      if (!t) { t = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'; localStorage.setItem('nibset-theme', t); }
      document.documentElement.setAttribute('data-theme', t);
      var link = document.getElementById('hljs-theme');
      if (link && t === 'light') link.href = link.href.replace('atom-one-dark.min.css', 'atom-one-light.min.css');
    })();
    </script>

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #060608;
            --bg-secondary: #111115;
            --bg-tertiary: #1c1c24;
            --bg-hover: #16161c;
            --text-primary: #e8e8ec;
            --text-secondary: #8b8b95;
            --text-muted: #55555e;
            --accent: #c9f270;
            --accent-hover: #b8e35f;
            --accent-text: #060608;
            --border: rgba(255,255,255,0.06);
            --header-bg: rgba(6,6,8,0.85);
            --header-border: rgba(255,255,255,0.05);
            --divider: #55555e;
            --success: #c9f270;
            --danger: #ef4444;
            --info: #c9f270;
            --warning: #fbbf24;
            --font-ui: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
            --header-height: 56px;
            --toolbar-height: 44px;
            --statusbar-height: 28px;
            --radius: 8px;
            --radius-sm: 4px;
        }

        [data-theme="light"] {
            --bg-primary: #f5f5f7;
            --bg-secondary: #eaeaee;
            --bg-tertiary: #dcdce0;
            --bg-hover: #f0f0f4;
            --text-primary: #1a1a1e;
            --text-secondary: #5a5a64;
            --text-muted: #8b8b95;
            --accent: #5a8a1a;
            --accent-hover: #4a7515;
            --accent-text: #ffffff;
            --border: rgba(0,0,0,0.08);
            --header-bg: rgba(245,245,247,0.85);
            --header-border: rgba(0,0,0,0.08);
            --divider: #c0c0c8;
            --success: #5a8a1a;
            --info: #5a8a1a;
        }

        html, body { height: 100dvh; overflow: hidden; font-family: var(--font-ui); background: var(--bg-primary); color: var(--text-primary); }
        .app { display: flex; flex-direction: column; height: 100dvh; }

        /* ===== Header ===== */
        .header {
            display: flex; align-items: center; justify-content: space-between;
            height: var(--header-height); padding: 0 16px;
            background: var(--header-bg); backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--header-border); flex-shrink: 0;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header-home { display: flex; align-items: center; opacity: 0.7; transition: opacity 0.2s; flex-shrink: 0; }
        .header-home:hover { opacity: 1; }
        .header-title { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 600; color: var(--text-primary); }
        .header-title i { color: var(--accent); }
        .header-center { display: flex; align-items: center; gap: 4px; }
        .header-actions { display: flex; gap: 8px; }

        /* ===== View Switcher ===== */
        .view-switcher {
            display: flex; gap: 2px; background: var(--bg-tertiary); border-radius: var(--radius-sm); padding: 3px;
            border: 1px solid var(--border);
        }
        .view-btn {
            padding: 5px 14px; border: none; background: transparent; color: var(--text-muted);
            font-family: var(--font-ui); font-size: 12px; font-weight: 600; cursor: pointer;
            border-radius: 3px; transition: all 0.15s ease; display: flex; align-items: center; gap: 6px;
        }
        .view-btn:hover { color: var(--text-secondary); }
        .view-btn.active { background: var(--accent); color: var(--accent-text); }
        .view-btn i { font-size: 11px; }

        /* ===== Buttons ===== */
        .btn {
            display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px;
            border: 1px solid var(--border); border-radius: var(--radius-sm);
            background: var(--bg-tertiary); color: var(--text-secondary);
            font-family: var(--font-ui); font-size: 13px; font-weight: 500;
            cursor: pointer; transition: all 0.15s ease; white-space: nowrap;
        }
        .btn:hover { background: var(--bg-hover); border-color: var(--divider); color: var(--text-primary); }
        .btn i { font-size: 12px; }
        .btn--accent { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
        .btn--accent:hover { background: var(--accent-hover); }

        .theme-toggle {
            display: flex; align-items: center; justify-content: center;
            width: 36px; height: 36px; border: 1px solid var(--border);
            border-radius: var(--radius-sm); background: var(--bg-tertiary);
            color: var(--text-secondary); cursor: pointer; transition: all 0.15s ease;
        }
        .theme-toggle:hover { background: var(--bg-hover); border-color: var(--divider); color: var(--text-primary); }
        .theme-toggle svg { width: 18px; height: 18px; }
        [data-theme="dark"] .theme-toggle .icon-sun { display: none; }
        [data-theme="light"] .theme-toggle .icon-moon { display: none; }

        /* ===== Toolbar ===== */
        .toolbar {
            display: flex; align-items: center; gap: 6px; padding: 0 16px;
            height: var(--toolbar-height); border-bottom: 1px solid var(--border);
            background: var(--bg-secondary); flex-shrink: 0; overflow-x: auto;
        }
        .toolbar-btn {
            display: flex; align-items: center; gap: 5px; padding: 5px 10px;
            border: none; border-radius: var(--radius-sm); background: transparent;
            color: var(--text-secondary); font-family: var(--font-ui); font-size: 12px;
            font-weight: 500; cursor: pointer; transition: all 0.15s ease; white-space: nowrap;
        }
        .toolbar-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .toolbar-btn.active { background: var(--accent); color: var(--accent-text); }
        .toolbar-btn i { font-size: 11px; }
        .tb-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
        .toolbar-spacer { flex: 1; }
        .format-group { display: flex; align-items: center; gap: 4px; }
        .format-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .format-select {
            padding: 4px 8px; border: 1px solid var(--border); border-radius: var(--radius-sm);
            background: var(--bg-tertiary); color: var(--text-secondary);
            font-family: var(--font-ui); font-size: 12px; font-weight: 500;
            cursor: pointer; outline: none; transition: all 0.15s ease;
        }
        .format-select:hover { border-color: var(--divider); color: var(--text-primary); }
        .format-select:focus { border-color: var(--accent); }
        .format-select option { background: var(--bg-secondary); color: var(--text-primary); }

        .validation-indicator {
            display: flex; align-items: center; gap: 6px; font-size: 12px;
            font-weight: 500; white-space: nowrap; margin-left: auto; padding-right: 4px;
        }
        .validation-indicator .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .validation-indicator.valid { color: var(--success); }
        .validation-indicator.valid .dot { background: var(--success); }
        .validation-indicator.invalid { color: var(--danger); }
        .validation-indicator.invalid .dot { background: var(--danger); }
        .validation-indicator.empty { color: var(--text-muted); }
        .validation-indicator.empty .dot { background: var(--text-muted); }

        /* ===== Editor Container ===== */
        .editor-container {
            display: flex; flex: 1; min-height: 0; position: relative;
        }
        .input-pane {
            display: flex; flex-direction: column; flex: 1; min-width: 0;
        }
        .input-pane textarea {
            flex: 1; width: 100%; padding: 16px; border: none; outline: none; resize: none;
            background: var(--bg-primary); color: var(--text-primary);
            font-family: var(--font-mono); font-size: 13px; line-height: 1.6;
            tab-size: 2;
        }
        .input-pane textarea::placeholder { color: var(--text-muted); }

        .pane-divider {
            width: 6px; background: var(--bg-secondary);
            border-left: 1px solid var(--border); border-right: 1px solid var(--border);
            cursor: col-resize; transition: background 0.15s ease; flex-shrink: 0;
        }
        .pane-divider:hover, .pane-divider.dragging { background: var(--accent); }

        .output-pane {
            display: flex; flex-direction: column; flex: 1; min-width: 0;
            overflow: auto; background: var(--bg-primary);
        }
        .output-pane .empty-state {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            flex: 1; color: var(--text-muted); font-size: 13px; gap: 8px; padding: 32px;
        }
        .output-pane .empty-state i { font-size: 28px; opacity: 0.4; }

        /* ===== Compare Mode ===== */
        .compare-container { display: none; flex: 1; flex-direction: column; min-height: 0; }
        .compare-container.active { display: flex; }
        .compare-panes { display: flex; flex: 1; min-height: 0; }
        .compare-pane { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .compare-label {
            height: 28px; padding: 0 16px; background: var(--bg-secondary);
            border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 600;
            color: var(--text-muted); display: flex; align-items: center;
        }
        .compare-pane textarea {
            flex: 1; width: 100%; padding: 16px; border: none; outline: none; resize: none;
            background: var(--bg-primary); color: var(--text-primary);
            font-family: var(--font-mono); font-size: 13px; line-height: 1.6; tab-size: 2;
        }
        .compare-pane textarea::placeholder { color: var(--text-muted); }
        .compare-divider {
            width: 6px; background: var(--bg-secondary);
            border-left: 1px solid var(--border); border-right: 1px solid var(--border);
            cursor: col-resize; transition: background 0.15s ease; flex-shrink: 0;
        }
        .compare-divider:hover, .compare-divider.dragging { background: var(--accent); }

        .diff-results {
            border-top: 2px solid var(--border); background: var(--bg-secondary);
            overflow-y: auto; max-height: 40%; min-height: 120px;
        }
        .diff-header {
            display: flex; align-items: center; gap: 8px; padding: 10px 16px;
            border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 600; color: var(--text-secondary);
        }
        .diff-header .diff-count { color: var(--accent); }
        .diff-list { padding: 8px 0; }
        .diff-entry {
            display: flex; align-items: flex-start; gap: 12px; padding: 6px 16px;
            font-family: var(--font-mono); font-size: 12px; line-height: 1.5;
            border-left: 3px solid transparent;
        }
        .diff-entry:hover { background: var(--bg-hover); }
        .diff-entry.added { border-left-color: var(--success); background: rgba(201,242,112,0.04); }
        .diff-entry.removed { border-left-color: var(--danger); background: rgba(239,68,68,0.04); }
        .diff-entry.changed { border-left-color: var(--warning); background: rgba(251,191,36,0.04); }
        .diff-path { color: var(--accent); cursor: pointer; flex-shrink: 0; min-width: 0; word-break: break-all; }
        .diff-path:hover { text-decoration: underline; }
        .diff-type {
            font-size: 10px; font-weight: 700; text-transform: uppercase; padding: 1px 6px;
            border-radius: 3px; flex-shrink: 0; font-family: var(--font-ui);
        }
        .diff-entry.added .diff-type { background: rgba(201,242,112,0.15); color: var(--success); }
        .diff-entry.removed .diff-type { background: rgba(239,68,68,0.15); color: var(--danger); }
        .diff-entry.changed .diff-type { background: rgba(251,191,36,0.15); color: var(--warning); }
        .diff-value { color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; }
        .diff-empty {
            padding: 24px 16px; text-align: center; color: var(--text-muted); font-size: 13px;
        }

        /* ===== Tree View ===== */
        .tree { font-family: var(--font-mono); font-size: 13px; padding: 16px; overflow: auto; flex: 1; line-height: 1.7; }
        .tree-node { position: relative; }
        .tree-children { padding-left: 20px; }
        .tree-node.collapsed > .tree-children { display: none; }
        .tree-line {
            display: flex; align-items: center; gap: 4px; padding: 1px 4px;
            border-radius: 3px; cursor: default;
        }
        .tree-line:hover { background: var(--bg-hover); }
        .tree-toggle {
            display: inline-flex; align-items: center; justify-content: center;
            width: 16px; height: 16px; font-size: 10px; cursor: pointer;
            color: var(--text-muted); transition: transform 0.15s ease; flex-shrink: 0;
            user-select: none;
        }
        .tree-toggle.expanded { transform: rotate(90deg); }
        .tree-toggle-placeholder { width: 16px; flex-shrink: 0; }
        .tree-key {
            color: var(--accent); cursor: pointer; font-weight: 500;
        }
        .tree-key:hover { text-decoration: underline; }
        .tree-colon { color: var(--text-muted); margin: 0 2px; }
        .tree-string { color: #a8db72; }
        .tree-number { color: #f0c674; }
        .tree-boolean { color: #81a2be; }
        .tree-null { color: var(--text-muted); font-style: italic; }
        .tree-bracket { color: var(--text-muted); }
        .tree-count { color: var(--text-muted); font-size: 11px; margin-left: 4px; }
        .tree-preview { color: var(--text-muted); font-size: 12px; margin-left: 4px; opacity: 0.7; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 300px; display: inline-block; vertical-align: bottom; }

        [data-theme="light"] .tree-string { color: #50762e; }
        [data-theme="light"] .tree-number { color: #986801; }
        [data-theme="light"] .tree-boolean { color: #4078a0; }

        /* ===== Formatted View ===== */
        .formatted-view { flex: 1; overflow: auto; }
        .formatted-view pre {
            margin: 0; padding: 16px; background: var(--bg-primary) !important;
            font-family: var(--font-mono); font-size: 13px; line-height: 1.6;
        }
        .formatted-view code { background: transparent !important; }

        /* ===== Status Bar ===== */
        .statusbar {
            display: flex; align-items: center; justify-content: space-between;
            height: var(--statusbar-height); padding: 0 16px;
            background: var(--bg-secondary); border-top: 1px solid var(--border);
            font-size: 11px; color: var(--text-muted); flex-shrink: 0;
        }
        .statusbar-left, .statusbar-right { display: flex; align-items: center; gap: 12px; }
        .statusbar-right { font-family: var(--font-mono); }

        /* ===== Toast ===== */
        .toast-container {
            position: fixed; bottom: 48px; right: 16px; z-index: 9999;
            display: flex; flex-direction: column; gap: 8px;
        }
        .toast {
            padding: 10px 16px; background: var(--bg-tertiary); border: 1px solid var(--border);
            border-radius: var(--radius); color: var(--text-primary); font-size: 13px;
            font-weight: 500; display: flex; align-items: center; gap: 8px;
            animation: toastIn 0.25s ease; box-shadow: 0 4px 24px rgba(0,0,0,0.3);
        }
        .toast i { color: var(--accent); font-size: 14px; }
        @keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* ===== Mobile ===== */
        .mobile-tabs {
            display: none; height: 40px; background: var(--bg-secondary);
            border-bottom: 1px solid var(--border); overflow-x: auto;
        }
        .mobile-tabs button {
            flex: 1; border: none; background: transparent; color: var(--text-muted);
            font-family: var(--font-ui); font-size: 12px; font-weight: 600; cursor: pointer;
            padding: 0 16px; white-space: nowrap;
        }
        .mobile-tabs button.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        @media (max-width: 768px) {
            .header-center { display: none; }
            .mobile-tabs { display: flex; }

            .editor-container[data-mobile="input"] .output-pane,

            }
            .btn span.btn-label { display: none; }

        }
    </style>
</head>

{

}'></textarea>

<div class="toast-container" id="toastContainer"></div>

<script>
(function() {
    'use strict';

    // ===== State =====
    const state = {
        viewMode: 'tree',
        parsedData: null,
        isValid: false,
        sortKeys: false,
        inputFormat: 'auto',
        detectedFormat: null,
        outputFormat: 'json'
    };

    // ===== DOM refs =====
    const $ = id => document.getElementById(id);
    const jsonInput = $('jsonInput');
    const treeView = $('treeView');
    const formattedView = $('formattedView');
    const emptyState = $('emptyState');
    const outputPane = $('outputPane');
    const editorContainer = $('editorContainer');
    const compareContainer = $('compareContainer');
    const compareLeft = $('compareLeft');
    const compareRight = $('compareRight');
    const diffResults = $('diffResults');
    const validationIndicator = $('validationIndicator');
    const charCount = $('charCount');
    const lineCount = $('lineCount');
    const lastPath = $('lastPath');
    const toastContainer = $('toastContainer');
    const inputFormatEl = $('inputFormat');
    const outputFormatEl = $('outputFormat');

    // ===== Toast =====
    function showToast(message, icon = 'fa-check') {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = '<i class="fas ' + icon + '"></i> ' + escapeHtml(message);
        toastContainer.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // ===== Clipboard =====
    function copyToClipboard(text, label) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(() => showToast(label || 'Copied to clipboard'));
        } else {
            const ta = document.createElement('textarea');
            ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
            document.body.appendChild(ta); ta.select(); document.execCommand('copy');
            document.body.removeChild(ta);
            showToast(label || 'Copied to clipboard');
        }
    }

    // ===== Helpers =====
    function escapeHtml(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    function needsBracketNotation(key) {
        return /[^a-zA-Z0-9_$]/.test(key) || /^\d/.test(key);
    }

    function buildPathSegment(parentPath, key, isArrayIndex) {
        if (isArrayIndex) return parentPath + '[' + key + ']';
        if (needsBracketNotation(key)) return parentPath + '["' + key.replace(/"/g, '\\"') + '"]';
        return parentPath + '.' + key;
    }

    // ===== Format Detection =====
    function detectFormat(text) {
        const trimmed = text.trim();
        if (!trimmed) return null;
        if (/^\s*<[\?a-zA-Z!]/.test(trimmed)) return 'xml';
        try { JSON.parse(trimmed); return 'json'; } catch (e) {}
        const lines = trimmed.split('\n').filter(function(l) { return l.trim() && !l.trim().startsWith('#'); });
        const tomlScore = lines.filter(function(l) { return /^\s*\[?\[?[\w."'-]+\]?\]?\s*$/.test(l) || /^\s*[\w."'-]+\s*=/.test(l); }).length;
        if (tomlScore > 0 && tomlScore >= lines.length * 0.4) return 'toml';
        if (/^---/.test(trimmed) || lines.some(function(l) { return /^\s*[\w"'-]+\s*:(\s|$)/.test(l); })) return 'yaml';
        return 'json';
    }

    // ===== Parsers =====
    function parseJSON(text) {
        if (!text.trim()) return { valid: false, empty: true, format: 'json' };
        try {
            var data = JSON.parse(text);
            return { valid: true, data: data, format: 'json' };
        } catch (e) {
            var msg = e.message;
            var line = null, column = null;
            var posMatch = msg.match(/position\s+(\d+)/i) || msg.match(/at\s+(\d+)/i);
            if (posMatch) {
                var pos = parseInt(posMatch[1]);
                var before = text.substring(0, pos);
                line = (before.match(/\n/g) || []).length + 1;
                column = pos - before.lastIndexOf('\n');
            }
            return { valid: false, error: msg, line: line, column: column, format: 'json' };
        }
    }

    function parseYAML(text) {
        if (!text.trim()) return { valid: false, empty: true, format: 'yaml' };
        try {
            var data = jsyaml.load(text);
            if (data === undefined) data = null;
            return { valid: true, data: data, format: 'yaml' };
        } catch (e) {
            var line = e.mark ? e.mark.line + 1 : null;
            var column = e.mark ? e.mark.column + 1 : null;
            return { valid: false, error: e.message, line: line, column: column, format: 'yaml' };
        }
    }

    function parseTOML(text) {
        if (!text.trim()) return { valid: false, empty: true, format: 'toml' };
        try {
            var data = toml.parse(text);
            return { valid: true, data: data, format: 'toml' };
        } catch (e) {
            return { valid: false, error: e.message, line: e.line || null, column: e.column || null, format: 'toml' };
        }
    }

    function parseXML(text) {
        if (!text.trim()) return { valid: false, empty: true, format: 'xml' };
        try {
            var parser = new XMLParser({
                ignoreAttributes: false,
                attributeNamePrefix: '@_',
                textNodeName: '#text',
                parseTagValue: true,
                trimValues: true
            });
            var data = parser.parse(text);
            return { valid: true, data: data, format: 'xml' };
        } catch (e) {
            return { valid: false, error: e.message, line: null, column: null, format: 'xml' };
        }
    }

    function parseData(text, format) {
        if (!text.trim()) return { valid: false, empty: true, format: null };
        var fmt = format === 'auto' ? detectFormat(text) : format;
        switch (fmt) {
            case 'json': return parseJSON(text);
            case 'yaml': return parseYAML(text);
            case 'toml': return parseTOML(text);
            case 'xml':  return parseXML(text);
            default:     return parseJSON(text);
        }
    }

    // ===== Serializers =====
    function sortReplacer(key, value) {
        if (value && typeof value === 'object' && !Array.isArray(value)) {
            var sorted = {};
            Object.keys(value).sort().forEach(function(k) { sorted[k] = value[k]; });
            return sorted;
        }
        return value;
    }

    function sortObject(obj) {
        if (obj === null || typeof obj !== 'object') return obj;
        if (Array.isArray(obj)) return obj.map(sortObject);
        var sorted = {};
        Object.keys(obj).sort().forEach(function(k) { sorted[k] = sortObject(obj[k]); });
        return sorted;
    }

    function tomlStringify(data, prefix) {
        if (data === null || data === undefined || typeof data !== 'object' || Array.isArray(data)) {
            return '# Cannot represent this value as TOML (requires a top-level table)\n';
        }
        var lines = [];
        prefix = prefix || '';
        var keys = state.sortKeys ? Object.keys(data).sort() : Object.keys(data);
        var primitives = [];
        var tables = [];
        keys.forEach(function(k) {
            var v = data[k];
            if (v === null || v === undefined) return;
            if (typeof v === 'object' && !Array.isArray(v)) {
                tables.push(k);
            } else if (Array.isArray(v) && v.length > 0 && typeof v[0] === 'object' && v[0] !== null && !Array.isArray(v[0])) {
                tables.push(k);
            } else {
                primitives.push(k);
            }
        });
        primitives.forEach(function(k) {
            lines.push(tomlKey(k) + ' = ' + tomlValue(data[k]));
        });
        tables.forEach(function(k) {
            var v = data[k];
            if (Array.isArray(v)) {
                v.forEach(function(item) {
                    if (lines.length > 0) lines.push('');
                    var path = prefix ? prefix + '.' + tomlKey(k) : tomlKey(k);
                    lines.push('[[' + path + ']]');
                    if (typeof item === 'object' && item !== null && !Array.isArray(item)) {
                        lines.push(tomlStringify(item, path).trimEnd());
                    } else {
                        lines.push('# Unsupported array element type');
                    }
                });
            } else {
                if (lines.length > 0) lines.push('');
                var path = prefix ? prefix + '.' + tomlKey(k) : tomlKey(k);
                lines.push('[' + path + ']');
                lines.push(tomlStringify(v, path).trimEnd());
            }
        });
        return lines.join('\n') + '\n';
    }

    function tomlKey(k) {
        if (/^[a-zA-Z0-9_-]+$/.test(k)) return k;
        return '"' + k.replace(/\\/g, '\\\\').replace(/"/g, '\\"') + '"';
    }

    function tomlValue(v) {
        if (typeof v === 'string') return '"' + v.replace(/\\/g, '\\\\').replace(/"/g, '\\"').replace(/\n/g, '\\n').replace(/\t/g, '\\t') + '"';
        if (typeof v === 'number' || typeof v === 'boolean') return String(v);
        if (v === null || v === undefined) return '""';
        if (Array.isArray(v)) return '[' + v.map(tomlValue).join(', ') + ']';
        return '"' + String(v) + '"';
    }

    function serializeData(data, format, options) {
        options = options || {};
        var sortKeys = options.sortKeys || false;
        switch (format) {
            case 'json':
                return JSON.stringify(data, sortKeys ? sortReplacer : null, 2);
            case 'yaml':
                return jsyaml.dump(sortKeys ? sortObject(data) : data, { indent: 2, lineWidth: -1 });
            case 'toml':
                return tomlStringify(sortKeys ? sortObject(data) : data);
            case 'xml': {
                var xmlData = data;
                if (Array.isArray(data) || typeof data !== 'object' || data === null) {
                    xmlData = { root: data };
                }
                return buildXml(xmlData, 0);
            }
            default:
                return JSON.stringify(data, null, 2);
        }
    }

    // ===== XML Builder =====
    function buildXml(obj, depth) {
        var indent = '  ';
        var pad = '';
        for (var d = 0; d < depth; d++) pad += indent;
        var lines = [];
        if (typeof obj !== 'object' || obj === null) {
            return xmlEscape(String(obj == null ? '' : obj));
        }
        if (Array.isArray(obj)) {
            obj.forEach(function(item) { lines.push(buildXml(item, depth)); });
            return lines.join('\n');
        }
        var keys = Object.keys(obj);
        keys.forEach(function(key) {
            if (key.indexOf('@_') === 0) return; // attributes handled inline
            var val = obj[key];
            if (key === '#text') {
                lines.push(pad + xmlEscape(String(val)));
                return;
            }
            if (Array.isArray(val)) {
                val.forEach(function(item) {
                    lines.push(buildXmlElement(key, item, obj, depth));
                });
            } else {
                lines.push(buildXmlElement(key, val, null, depth));
            }
        });
        return lines.join('\n');
    }

    function buildXmlElement(tag, val, parentForAttrs, depth) {
        var indent = '  ';
        var pad = '';
        for (var d = 0; d < depth; d++) pad += indent;
        var attrs = '';
        if (val !== null && typeof val === 'object' && !Array.isArray(val)) {
            Object.keys(val).forEach(function(k) {
                if (k.indexOf('@_') === 0) {
                    attrs += ' ' + k.slice(2) + '="' + xmlEscape(String(val[k])) + '"';
                }
            });
        }
        if (val === null || val === undefined) {
            return pad + '<' + tag + attrs + '/>';
        }
        if (typeof val !== 'object') {
            return pad + '<' + tag + attrs + '>' + xmlEscape(String(val)) + '</' + tag + '>';
        }
        if (Array.isArray(val)) {
            var lines = [];
            val.forEach(function(item) { lines.push(buildXmlElement(tag, item, null, depth)); });
            return lines.join('\n');
        }
        var hasChildren = Object.keys(val).some(function(k) { return k.indexOf('@_') !== 0; });
        if (!hasChildren) {
            return pad + '<' + tag + attrs + '/>';
        }
        var inner = buildXml(val, depth + 1);
        return pad + '<' + tag + attrs + '>\n' + inner + '\n' + pad + '</' + tag + '>';
    }

    function xmlEscape(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ===== Update Status =====
    function updateStatus(text) {
        var chars = text.length;
        var lines = text ? text.split('\n').length : 0;
        charCount.textContent = chars.toLocaleString() + ' chars';
        lineCount.textContent = lines.toLocaleString() + ' lines';
    }

    function updateValidation(result) {
        var vi = validationIndicator;
        var vt = vi.querySelector('.validation-text');
        if (result.empty) {
            vi.className = 'validation-indicator empty';
            vt.textContent = 'Paste data to start';
        } else if (result.valid) {
            vi.className = 'validation-indicator valid';
            var fmt = result.format ? result.format.toUpperCase() : '';
            var type = Array.isArray(result.data) ? 'Array' : typeof result.data === 'object' && result.data !== null ? 'Object' : typeof result.data;
            vt.textContent = 'Valid ' + fmt + ' \u00b7 ' + type;
        } else {
            vi.className = 'validation-indicator invalid';
            var fmt = result.format ? result.format.toUpperCase() + ' ' : '';
            var msg = 'Invalid ' + fmt;
            if (result.line) msg += '\u00b7 line ' + result.line + ':' + result.column;
            vt.textContent = msg.trim();
        }
    }

    // ===== Tree View =====
    function renderTree(data, path, isRoot) {
        const container = document.createDocumentFragment();

        function createNode(key, value, currentPath, isArrayIndex) {
            const node = document.createElement('div');
            node.className = 'tree-node';

            const line = document.createElement('div');
            line.className = 'tree-line';

            const isExpandable = value !== null && typeof value === 'object';

            if (isExpandable) {
                const toggle = document.createElement('span');
                toggle.className = 'tree-toggle expanded';
                toggle.textContent = '\u25B6';
                toggle.addEventListener('click', (e) => {
                    e.stopPropagation();
                    node.classList.toggle('collapsed');
                    toggle.classList.toggle('expanded');
                });
                line.appendChild(toggle);
            } else {
                const ph = document.createElement('span');
                ph.className = 'tree-toggle-placeholder';
                line.appendChild(ph);
            }

            if (key !== null) {
                const keyEl = document.createElement('span');
                keyEl.className = 'tree-key';
                keyEl.textContent = isArrayIndex ? key : '"' + key + '"';
                keyEl.title = 'Click to copy path: ' + currentPath;
                keyEl.addEventListener('click', (e) => {
                    e.stopPropagation();
                    copyToClipboard(currentPath, 'Copied: ' + currentPath);
                    lastPath.textContent = currentPath;
                });
                line.appendChild(keyEl);

                const colon = document.createElement('span');
                colon.className = 'tree-colon';
                colon.textContent = ':';
                line.appendChild(colon);
            }

            if (isExpandable) {
                const isArr = Array.isArray(value);
                const bracket = document.createElement('span');
                bracket.className = 'tree-bracket';
                bracket.textContent = isArr ? '[' : '{';
                line.appendChild(bracket);

                const count = document.createElement('span');
                count.className = 'tree-count';
                const len = isArr ? value.length : Object.keys(value).length;
                count.textContent = len + (isArr ? (len === 1 ? ' item' : ' items') : (len === 1 ? ' key' : ' keys'));
                line.appendChild(count);

                // Preview for collapsed state
                if (!isArr && len > 0) {
                    const preview = document.createElement('span');
                    preview.className = 'tree-preview';
                    const previewKeys = Object.keys(value).slice(0, 3).map(k => '"' + k + '"').join(', ');
                    preview.textContent = previewKeys + (len > 3 ? ', ...' : '');
                    line.appendChild(preview);
                }

                node.appendChild(line);

                const children = document.createElement('div');
                children.className = 'tree-children';

                if (isArr) {
                    value.forEach((item, i) => {
                        const childPath = currentPath + '[' + i + ']';
                        children.appendChild(createNode(i, item, childPath, true));
                    });
                } else {
                    const keys = state.sortKeys ? Object.keys(value).sort() : Object.keys(value);
                    keys.forEach(k => {
                        const childPath = buildPathSegment(currentPath, k, false);
                        children.appendChild(createNode(k, value[k], childPath, false));
                    });
                }

                const closeBracket = document.createElement('div');
                closeBracket.className = 'tree-line';
                const closePh = document.createElement('span');
                closePh.className = 'tree-toggle-placeholder';
                closeBracket.appendChild(closePh);
                const closeEl = document.createElement('span');
                closeEl.className = 'tree-bracket';
                closeEl.textContent = isArr ? ']' : '}';
                closeBracket.appendChild(closeEl);
                children.appendChild(closeBracket);

                node.appendChild(children);
            } else {
                const valEl = document.createElement('span');
                if (value === null) {
                    valEl.className = 'tree-null';
                    valEl.textContent = 'null';
                } else if (typeof value === 'string') {
                    valEl.className = 'tree-string';
                    valEl.textContent = '"' + value + '"';
                } else if (typeof value === 'number') {
                    valEl.className = 'tree-number';
                    valEl.textContent = String(value);
                } else if (typeof value === 'boolean') {
                    valEl.className = 'tree-boolean';
                    valEl.textContent = String(value);
                }
                line.appendChild(valEl);
                node.appendChild(line);
            }

            return node;
        }

        if (isRoot) {
            container.appendChild(createNode(null, data, '$', false));
        }

        return container;
    }

    function showTree(data) {
        treeView.innerHTML = '';
        treeView.appendChild(renderTree(data, '$', true));
    }

    // ===== Formatted View =====
    function showFormatted(data) {
        try {
            var langMap = { json: 'json', yaml: 'yaml', toml: 'ini', xml: 'xml' };
            var fmt = state.outputFormat;
            var formatted = serializeData(data, fmt, { sortKeys: state.sortKeys });
            var lang = langMap[fmt] || 'json';
            formattedView.innerHTML = '<pre><code class="language-' + lang + '"></code></pre>';
            var codeEl = formattedView.querySelector('code');
            codeEl.textContent = formatted;
            hljs.highlightElement(codeEl);
        } catch (e) {
            formattedView.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><span>Cannot convert to ' + state.outputFormat.toUpperCase() + '</span></div>';
        }
    }

    // ===== Compare / Diff =====
    function compareJSON(a, b, path) {
        const diffs = [];
        path = path || '$';

        if (a === b) return diffs;
        if (a === null || b === null || typeof a !== typeof b) {
            diffs.push({ path, type: 'changed', left: a, right: b });
            return diffs;
        }
        if (typeof a !== 'object') {
            if (a !== b) diffs.push({ path, type: 'changed', left: a, right: b });
            return diffs;
        }

        const aIsArr = Array.isArray(a);
        const bIsArr = Array.isArray(b);
        if (aIsArr !== bIsArr) {
            diffs.push({ path, type: 'changed', left: a, right: b });
            return diffs;
        }

        if (aIsArr) {
            const maxLen = Math.max(a.length, b.length);
            for (let i = 0; i < maxLen; i++) {
                const childPath = path + '[' + i + ']';
                if (i >= a.length) {
                    diffs.push({ path: childPath, type: 'added', right: b[i] });
                } else if (i >= b.length) {
                    diffs.push({ path: childPath, type: 'removed', left: a[i] });
                } else {
                    diffs.push(...compareJSON(a[i], b[i], childPath));
                }
            }
        } else {
            const allKeys = new Set([...Object.keys(a), ...Object.keys(b)]);
            for (const key of allKeys) {
                const childPath = buildPathSegment(path, key, false);
                if (!(key in a)) {
                    diffs.push({ path: childPath, type: 'added', right: b[key] });
                } else if (!(key in b)) {
                    diffs.push({ path: childPath, type: 'removed', left: a[key] });
                } else {
                    diffs.push(...compareJSON(a[key], b[key], childPath));
                }
            }
        }
        return diffs;
    }

    function renderDiff() {
        const leftText = compareLeft.value.trim();
        const rightText = compareRight.value.trim();

        if (!leftText || !rightText) {
            diffResults.innerHTML = '<div class="diff-empty">Paste data in both panels to compare</div>';
            return;
        }

        var leftResult = parseData(leftText, 'auto');
        if (!leftResult.valid) {
            diffResults.innerHTML = '<div class="diff-empty" style="color:var(--danger)">Left data is invalid' + (leftResult.format ? ' (' + leftResult.format.toUpperCase() + ')' : '') + '</div>';
            return;
        }
        var rightResult = parseData(rightText, 'auto');
        if (!rightResult.valid) {
            diffResults.innerHTML = '<div class="diff-empty" style="color:var(--danger)">Right data is invalid' + (rightResult.format ? ' (' + rightResult.format.toUpperCase() + ')' : '') + '</div>';
            return;
        }
        var leftData = leftResult.data;
        var rightData = rightResult.data;

        const diffs = compareJSON(leftData, rightData);

        if (diffs.length === 0) {
            diffResults.innerHTML = '<div class="diff-empty" style="color:var(--success)"><i class="fas fa-check-circle" style="margin-right:6px;"></i> Documents are identical</div>';
            return;
        }

        let html = '<div class="diff-header"><span>Found <span class="diff-count">' + diffs.length + '</span> difference' + (diffs.length !== 1 ? 's' : '') + '</span></div>';
        html += '<div class="diff-list">';
        diffs.forEach(d => {
            const typeLabel = d.type === 'added' ? 'add' : d.type === 'removed' ? 'del' : 'mod';
            let valueText = '';
            if (d.type === 'changed') {
                valueText = truncate(JSON.stringify(d.left)) + ' → ' + truncate(JSON.stringify(d.right));
            } else if (d.type === 'added') {
                valueText = truncate(JSON.stringify(d.right));
            } else {
                valueText = truncate(JSON.stringify(d.left));
            }
            html += '<div class="diff-entry ' + d.type + '">';
            html += '<span class="diff-type">' + typeLabel + '</span>';
            html += '<span class="diff-path" title="Click to copy" onclick="event.stopPropagation()">' + escapeHtml(d.path) + '</span>';
            html += '<span class="diff-value">' + escapeHtml(valueText) + '</span>';
            html += '</div>';
        });
        html += '</div>';
        diffResults.innerHTML = html;

        // Bind copy on diff paths
        diffResults.querySelectorAll('.diff-path').forEach(el => {
            el.addEventListener('click', () => {
                copyToClipboard(el.textContent, 'Copied: ' + el.textContent);
            });
        });
    }

    function truncate(s, max) {
        max = max || 60;
        return s.length > max ? s.substring(0, max) + '...' : s;
    }

    // ===== View Mode Switching =====
    function setViewMode(mode) {
        state.viewMode = mode;

        // Update buttons
        document.querySelectorAll('.view-btn').forEach(b => {
            b.classList.toggle('active', b.dataset.view === mode);
        });

        // Toggle tree-only toolbar buttons
        document.querySelectorAll('.tree-only').forEach(el => {
            el.style.display = mode === 'tree' ? '' : 'none';
        });

        if (mode === 'compare') {
            editorContainer.style.display = 'none';
            compareContainer.classList.add('active');
            renderDiff();
        } else {
            editorContainer.style.display = 'flex';
            compareContainer.classList.remove('active');
            renderCurrentView();
        }
    }

    function renderCurrentView() {
        var text = jsonInput.value;
        var result = parseData(text, state.inputFormat);
        state.detectedFormat = result.format;
        updateValidation(result);
        updateStatus(text);

        if (result.empty) {
            emptyState.style.display = 'flex';
            treeView.style.display = 'none';
            formattedView.style.display = 'none';
            return;
        }

        emptyState.style.display = 'none';

        if (!result.valid) {
            treeView.style.display = 'none';
            formattedView.style.display = 'none';
            emptyState.style.display = 'flex';
            emptyState.querySelector('i').className = 'fas fa-exclamation-triangle';
            emptyState.querySelector('span').textContent = 'Fix errors to see output';
            return;
        }

        emptyState.querySelector('i').className = 'fas fa-brackets-curly';
        emptyState.querySelector('span').textContent = 'Paste data on the left to explore';

        state.parsedData = result.data;
        state.isValid = true;

        if (state.viewMode === 'tree') {
            treeView.style.display = 'block';
            formattedView.style.display = 'none';
            showTree(result.data);
        } else if (state.viewMode === 'formatted') {
            treeView.style.display = 'none';
            formattedView.style.display = 'block';
            showFormatted(result.data);
        }
    }

    // ===== Expand / Collapse All =====
    function expandAll() {
        treeView.querySelectorAll('.tree-node.collapsed').forEach(n => {
            n.classList.remove('collapsed');
            const toggle = n.querySelector(':scope > .tree-line > .tree-toggle');
            if (toggle) toggle.classList.add('expanded');
        });
    }

    function collapseAll() {
        treeView.querySelectorAll('.tree-node').forEach(n => {
            if (n.querySelector('.tree-children')) {
                n.classList.add('collapsed');
                const toggle = n.querySelector(':scope > .tree-line > .tree-toggle');
                if (toggle) toggle.classList.remove('expanded');
            }
        });
    }

    // ===== Draggable Dividers =====
    function setupDivider(dividerEl, containerEl, leftSelector, rightSelector) {
        let isDragging = false;
        dividerEl.addEventListener('mousedown', (e) => {
            isDragging = true;
            dividerEl.classList.add('dragging');
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';
            e.preventDefault();
        });
        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const rect = containerEl.getBoundingClientRect();
            const offset = e.clientX - rect.left;
            let ratio = offset / rect.width;
            ratio = Math.max(0.15, Math.min(0.85, ratio));
            const left = containerEl.querySelector(leftSelector);
            const right = containerEl.querySelector(rightSelector);
            if (left && right) {
                left.style.flex = '0 0 ' + (ratio * 100) + '%';
                right.style.flex = '0 0 ' + ((1 - ratio) * 100 - 1) + '%';
            }
        });
        document.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                dividerEl.classList.remove('dragging');
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
            }
        });
    }

    setupDivider($('paneDivider'), editorContainer, '.input-pane', '.output-pane');
    setupDivider($('compareDivider'), document.querySelector('.compare-panes'), '.compare-pane:first-child', '.compare-pane:last-child');

    // ===== Theme Toggle =====
    $('themeToggle').addEventListener('click', () => {
        const html = document.documentElement;
        const current = html.getAttribute('data-theme');
        const next = current === 'light' ? 'dark' : 'light';
        html.setAttribute('data-theme', next);
        localStorage.setItem('nibset-theme', next);
        const link = document.getElementById('hljs-theme');
        if (link) {
            link.href = next === 'light'
                ? link.href.replace('atom-one-dark.min.css', 'atom-one-light.min.css')
                : link.href.replace('atom-one-light.min.css', 'atom-one-dark.min.css');
        }
        // Re-render formatted view if active
        if (state.viewMode === 'formatted' && state.isValid) renderCurrentView();
    });

    // ===== Event Wiring =====
    let validateTimer;
    jsonInput.addEventListener('input', () => {
        clearTimeout(validateTimer);
        validateTimer = setTimeout(() => renderCurrentView(), 150);
        updateStatus(jsonInput.value);
    });

    // View switcher
    document.querySelectorAll('.view-btn').forEach(btn => {
        btn.addEventListener('click', () => setViewMode(btn.dataset.view));
    });

    // Format selectors
    inputFormatEl.addEventListener('change', function(e) {
        state.inputFormat = e.target.value;
        renderCurrentView();
    });
    outputFormatEl.addEventListener('change', function(e) {
        state.outputFormat = e.target.value;
        renderCurrentView();
    });

    // Format
    $('formatBtn').addEventListener('click', function() {
        if (!jsonInput.value.trim()) return;
        var result = parseData(jsonInput.value, state.inputFormat);
        if (!result.valid) {
            showToast('Cannot format invalid data', 'fa-exclamation-triangle');
            return;
        }
        var fmt = result.format || 'json';
        try {
            jsonInput.value = serializeData(result.data, fmt, { sortKeys: state.sortKeys });
            renderCurrentView();
            showToast('Formatted as ' + fmt.toUpperCase(), 'fa-check');
        } catch (e) {
            showToast('Cannot format: ' + e.message, 'fa-exclamation-triangle');
        }
    });

    // Minify
    $('minifyBtn').addEventListener('click', function() {
        if (!jsonInput.value.trim()) return;
        var result = parseData(jsonInput.value, state.inputFormat);
        if (!result.valid) {
            showToast('Cannot minify invalid data', 'fa-exclamation-triangle');
            return;
        }
        var fmt = result.format || 'json';
        try {
            if (fmt === 'json') {
                jsonInput.value = JSON.stringify(result.data);
            } else if (fmt === 'yaml') {
                jsonInput.value = jsyaml.dump(result.data, { flowLevel: 0, lineWidth: -1 });
            } else if (fmt === 'xml') {
                var xmlData = result.data;
                if (Array.isArray(result.data) || typeof result.data !== 'object' || result.data === null) {
                    xmlData = { root: result.data };
                }
                // Minify XML by building then stripping whitespace between tags
                var xmlStr = buildXml(xmlData, 0);
                jsonInput.value = xmlStr.replace(/>\s+</g, '><').trim();
            } else if (fmt === 'toml') {
                showToast('TOML cannot be minified', 'fa-info-circle');
                return;
            }
            renderCurrentView();
            showToast('Minified', 'fa-check');
        } catch (e) {
            showToast('Cannot minify: ' + e.message, 'fa-exclamation-triangle');
        }
    });

    // Clear
    $('clearBtn').addEventListener('click', () => {
        jsonInput.value = '';
        compareLeft.value = '';
        compareRight.value = '';
        renderCurrentView();
        renderDiff();
        lastPath.textContent = '';
    });

    // Expand / Collapse
    $('expandBtn').addEventListener('click', expandAll);
    $('collapseBtn').addEventListener('click', collapseAll);

    // Sort keys
    $('sortKeysBtn').addEventListener('click', () => {
        state.sortKeys = !state.sortKeys;
        $('sortKeysBtn').classList.toggle('active', state.sortKeys);
        renderCurrentView();
        if (state.sortKeys) showToast('Keys sorted', 'fa-sort-alpha-down');
    });

    // Copy output
    $('copyOutputBtn').addEventListener('click', function() {
        if (!state.parsedData && !jsonInput.value.trim()) return;
        if (state.parsedData) {
            try {
                var text = serializeData(state.parsedData, state.outputFormat, { sortKeys: state.sortKeys });
                copyToClipboard(text, 'Copied as ' + state.outputFormat.toUpperCase());
            } catch (e) {
                copyToClipboard(jsonInput.value, 'Copied raw input');
            }
        } else {
            copyToClipboard(jsonInput.value, 'Copied raw input');
        }
    });

    // Compare mode inputs
    let diffTimer;
    function debounceDiff() {
        clearTimeout(diffTimer);
        diffTimer = setTimeout(renderDiff, 200);
    }
    compareLeft.addEventListener('input', debounceDiff);
    compareRight.addEventListener('input', debounceDiff);

    // Mobile tabs
    $('mobileTabs').querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
            $('mobileTabs').querySelectorAll('button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            editorContainer.dataset.mobile = btn.dataset.mobile;
        });
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'F') {
            e.preventDefault();
            $('formatBtn').click();
        }
    });

    // ===== Init =====
    renderCurrentView();

})();
</script>
</body>
</html>
