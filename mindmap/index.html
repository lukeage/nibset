<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindMap — NibSet</title>
<link rel="icon" type="image/png" href="../assets/logo.png">
<meta name="description" content="Collaborative radial mind-map with markdown notes, cross-references, PNG round-trip, and real-time P2P sync.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://unpkg.com/peerjs@1/dist/peerjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script>
(function(){
  var t = localStorage.getItem('nibset-theme');
  if (!t) { t = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'; localStorage.setItem('nibset-theme', t); }
  document.documentElement.setAttribute('data-theme', t);
})();
</script>

<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-primary: #060608;
  --bg-secondary: #111115;
  --bg-tertiary: #1c1c24;
  --bg-hover: #16161c;
  --text-primary: #e8e8ec;
  --text-secondary: #8b8b95;
  --text-muted: #55555e;
  --accent: #c9f270;
  --accent-hover: #b8e35f;
  --accent-text: #060608;
  --border: rgba(255,255,255,0.10);
  --border-strong: rgba(255,255,255,0.22);
  --header-bg: rgba(6,6,8,0.85);
  --header-border: rgba(255,255,255,0.05);
  --danger: #ef4444;
  --font-ui: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
  --header-height: 52px;
  --toolbar-height: 44px;
  --statusbar-height: 26px;
  --radius: 8px;
  --radius-sm: 4px;
  --radius-card: 14px;
  --card-bg: #0e0e13;
  --card-bg-soft: #16161e;

  --branch-1:  hsl(  8, 55%, 68%);
  --branch-2:  hsl( 32, 60%, 65%);
  --branch-3:  hsl( 52, 55%, 65%);
  --branch-4:  hsl( 92, 40%, 62%);
  --branch-5:  hsl(150, 40%, 60%);
  --branch-6:  hsl(180, 40%, 60%);
  --branch-7:  hsl(205, 50%, 65%);
  --branch-8:  hsl(232, 45%, 70%);
  --branch-9:  hsl(275, 40%, 70%);
  --branch-10: hsl(320, 45%, 68%);
  --branch-tint-inner: 0.32;
  --branch-tint-outer: 0.18;
}

[data-theme="light"] {
  --bg-primary: #f5f5f7;
  --bg-secondary: #eaeaee;
  --bg-tertiary: #dcdce0;
  --bg-hover: #f0f0f4;
  --text-primary: #1a1a1e;
  --text-secondary: #5a5a64;
  --text-muted: #8b8b95;
  --accent: #5a8a1a;
  --accent-hover: #4a7515;
  --accent-text: #ffffff;
  --border: rgba(0,0,0,0.10);
  --border-strong: rgba(0,0,0,0.22);
  --header-bg: rgba(245,245,247,0.85);
  --header-border: rgba(0,0,0,0.08);
  --card-bg: #ffffff;
  --card-bg-soft: #f0f0f4;

  --branch-1:  hsl(  8, 55%, 48%);
  --branch-2:  hsl( 32, 60%, 45%);
  --branch-3:  hsl( 48, 60%, 42%);
  --branch-4:  hsl( 92, 40%, 38%);
  --branch-5:  hsl(150, 40%, 38%);
  --branch-6:  hsl(180, 40%, 38%);
  --branch-7:  hsl(205, 55%, 45%);
  --branch-8:  hsl(232, 45%, 52%);
  --branch-9:  hsl(275, 40%, 50%);
  --branch-10: hsl(320, 45%, 48%);
  --branch-tint-inner: 0.55;
  --branch-tint-outer: 0.28;
}

html, body { height: 100dvh; overflow: hidden; font-family: var(--font-ui); background: var(--bg-primary); color: var(--text-primary); }
.app { display: flex; flex-direction: column; height: 100dvh; }

.header { display: flex; align-items: center; justify-content: space-between; height: var(--header-height); padding: 0 12px; background: var(--header-bg); backdrop-filter: blur(16px); border-bottom: 1px solid var(--header-border); flex-shrink: 0; gap: 12px; }
.header-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
.header-home { display: flex; align-items: center; opacity: 0.7; transition: opacity 0.2s; flex-shrink: 0; }
.header-home:hover { opacity: 1; }
.header-title { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 600; }
.header-title i { color: var(--accent); }
.header-center { flex: 1; display: flex; justify-content: center; min-width: 0; }
.title-input { width: 240px; padding: 6px 10px; border: 1px solid transparent; border-radius: var(--radius-sm); background: transparent; color: var(--text-primary); font-family: var(--font-ui); font-size: 14px; font-weight: 600; text-align: center; outline: none; }
.title-input:hover { border-color: var(--border); }
.title-input:focus { border-color: var(--accent); background: var(--bg-secondary); }
.header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

.p2p-status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
.dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.dot-connected { background: #22c55e; }
.dot-waiting { background: #f59e0b; animation: pulse 1.5s ease-in-out infinite; }
.dot-reconnecting { background: #f59e0b; animation: pulse 1.5s ease-in-out infinite; }
.dot-disconnected { background: #ef4444; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

.btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-secondary); color: var(--text-primary); font-family: var(--font-ui); font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.btn:hover { background: var(--bg-tertiary); border-color: var(--border-strong); }
.btn.btn-accent { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
.btn.btn-accent:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
.btn.hidden { display: none; }
.btn-icon { width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-secondary); color: var(--text-secondary); cursor: pointer; transition: all 0.15s; }
.btn-icon:hover { background: var(--bg-tertiary); color: var(--text-primary); }

.theme-toggle { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-secondary); color: var(--text-secondary); cursor: pointer; transition: all 0.15s; }
.theme-toggle:hover { background: var(--bg-hover); color: var(--text-primary); }
.theme-toggle svg { width: 16px; height: 16px; }
[data-theme="dark"] .theme-toggle .icon-sun { display: none; }
[data-theme="light"] .theme-toggle .icon-moon { display: none; }

.toolbar { display: flex; align-items: center; gap: 4px; padding: 0 12px; height: var(--toolbar-height); border-bottom: 1px solid var(--border); background: var(--bg-secondary); flex-shrink: 0; overflow-x: auto; }
.tool-btn { display: flex; align-items: center; gap: 6px; padding: 6px 10px; border: 1px solid transparent; border-radius: var(--radius-sm); background: transparent; color: var(--text-secondary); font-family: var(--font-ui); font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.tool-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }
.tool-btn i { font-size: 11px; }
.tool-btn.active { background: var(--accent); color: var(--accent-text); }
.tool-btn.active:hover { background: var(--accent-hover); }
.tool-btn.toggle-on { background: var(--bg-tertiary); color: var(--text-primary); border-color: var(--border); }
.tb-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; margin: 0 4px; }
.toolbar-spacer { flex: 1; }

.workspace { position: relative; flex: 1; overflow: hidden; background:
  radial-gradient(circle at 50% 50%, var(--bg-secondary) 0%, var(--bg-primary) 100%);
}
.workspace.tool-select { cursor: default; }
.workspace.tool-arrow-parent, .workspace.tool-arrow-ref { cursor: crosshair; }
.workspace.panning, .workspace.panning * { cursor: grabbing !important; }
.workspace.space-held { cursor: grab; }

.world {
  position: absolute; left: 50%; top: 50%;
  transform-origin: 0 0;
  width: 0; height: 0;

}

.arrows-layer {
  position: absolute; overflow: visible; pointer-events: none;
  left: 0; top: 0; width: 1px; height: 1px;
  z-index: 2;
}

.cards-layer { position: relative; z-index: 3; }
.pills-layer {
  position: absolute; overflow: visible; pointer-events: none;
  left: 0; top: 0; width: 1px; height: 1px;
  z-index: 4;
}
.pills-layer .conn-pill { pointer-events: all; }
.arrows-layer .edge { fill: none; stroke: var(--text-secondary); stroke-width: 1.5; stroke-linecap: round; opacity: 0.85; }
.arrows-layer .edge-head { fill: var(--text-secondary); }
.arrows-layer .ref { fill: none; stroke: var(--accent); stroke-width: 1.6; stroke-dasharray: 7 5; stroke-linecap: round; }
.arrows-layer .ref-head { fill: var(--accent); }
.arrows-layer .ref-label { fill: var(--accent); font-family: var(--font-ui); font-size: 14px; font-style: italic; font-weight: 500; }
.arrows-layer.refs-hidden .ref, .arrows-layer.refs-hidden .ref-head, .arrows-layer.refs-hidden .ref-label { opacity: 0.10; }
.arrows-layer.refs-hidden .ref-hit { pointer-events: none; }
.arrows-layer .preview { stroke-dasharray: 4 4; opacity: 0.7; }
.arrows-layer .edge-hit,
.arrows-layer .ref-hit {
  fill: none; stroke: transparent; stroke-width: 14;
  stroke-linecap: round; pointer-events: none;
}

.workspace.presentation .arrows-layer { pointer-events: none; }
.workspace.presentation .arrows-layer .edge,
.workspace.presentation .arrows-layer .ref { pointer-events: stroke; cursor: pointer; }
.workspace.presentation .arrows-layer .edge-hit,
.workspace.presentation .arrows-layer .ref-hit { pointer-events: stroke; cursor: pointer; }
.workspace.presentation .arrows-layer .edge:hover { stroke: var(--accent); stroke-width: 2.4; }
.workspace.presentation .arrows-layer .ref:hover { stroke-width: 2.4; }

.conn-pill { pointer-events: all; cursor: pointer; }
.conn-pill rect { fill: var(--bg-tertiary); stroke: var(--border-strong); stroke-width: 1; }
.conn-pill text { fill: var(--text-primary); font-family: var(--font-ui); font-size: 12px; font-weight: 500; dominant-baseline: middle; text-anchor: middle; pointer-events: none; user-select: none; }
.conn-pill.ref rect { stroke: var(--accent); stroke-dasharray: 4 3; }
.conn-pill.ref text { fill: var(--accent); }
.conn-pill:hover rect { stroke: var(--accent); stroke-width: 1.5; }
.conn-pill .pill-arrow { fill: var(--text-secondary); }
.conn-pill.ref .pill-arrow { fill: var(--accent); }

.card {
  position: absolute;
  width: 280px;
  background: var(--card-bg);
  border: 1.5px solid var(--border-strong);
  border-radius: var(--radius-card);
  padding: 10px 12px 14px;
  display: flex; flex-direction: column; gap: 8px;
  box-shadow: 0 1px 0 rgba(0,0,0,0.4), 0 8px 24px -12px rgba(0,0,0,0.6);
  user-select: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
[data-theme="light"] .card { box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 8px 24px -12px rgba(0,0,0,0.18); }
.card[style*="--branch-color"]:not(.root):not(.selected):not(.drop-target) {
  border-color: color-mix(in srgb, var(--branch-color) calc(var(--branch-tint-inner) * 100%), var(--border-strong));
  box-shadow:
    inset 0 0 0 1px color-mix(in srgb, var(--branch-color) calc(var(--branch-tint-inner) * 100%), transparent),
    0 0 0 1px color-mix(in srgb, var(--branch-color) calc(var(--branch-tint-outer) * 100%), transparent),
    0 0 22px -6px color-mix(in srgb, var(--branch-color) 28%, transparent),
    0 1px 0 rgba(0,0,0,0.4),
    0 8px 24px -12px rgba(0,0,0,0.6);
}
[data-theme="light"] .card[style*="--branch-color"]:not(.root):not(.selected):not(.drop-target) {
  box-shadow:
    inset 0 0 0 1px color-mix(in srgb, var(--branch-color) calc(var(--branch-tint-inner) * 100%), transparent),
    0 0 0 1px color-mix(in srgb, var(--branch-color) calc(var(--branch-tint-outer) * 100%), transparent),
    0 0 18px -6px color-mix(in srgb, var(--branch-color) 18%, transparent),
    0 1px 0 rgba(0,0,0,0.04),
    0 8px 24px -12px rgba(0,0,0,0.18);
}
.card.root {
  box-shadow: 0 0 0 1px color-mix(in srgb, var(--accent) 35%, transparent),
              0 0 14px 2px color-mix(in srgb, var(--accent) 18%, transparent),
              0 8px 24px -12px rgba(0,0,0,0.6);
}
.card.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 8px 24px -12px rgba(0,0,0,0.6); z-index: 5; }
.card.drop-target { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent); }
.card-title-wrap {
  border: 1px solid var(--border-strong);
  border-radius: 8px;
  padding: 4px 8px;
  background: var(--card-bg-soft);
}
.card-title {
  width: 100%;
  border: none; outline: none; background: transparent;
  font-family: var(--font-ui); font-size: 13px; font-weight: 600; letter-spacing: 0.04em;
  color: var(--text-primary); text-transform: uppercase;
  padding: 0;
}
.card-body {
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 10px;
  flex: 1;
  min-height: 64px;
  display: block;
  font-size: 10.5px; line-height: 1.4;
  color: var(--text-secondary);
  cursor: text;
  overflow: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.card-body::-webkit-scrollbar { width: 6px; height: 6px; }
.card-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.card-body::-webkit-scrollbar-track { background: transparent; }
.card-body .notes-view { color: var(--text-primary); }
.card-body .notes-view.empty { min-height: 0; }
.card-body .notes-view.empty::before {
  content: 'Click to add notes…';
  color: var(--text-muted);
  font-style: italic;
  opacity: 0.6;
}
.card-body .notes-view :where(p, ul, ol, blockquote, pre, table, hr) { margin: 0 0 6px; }
.card-body .notes-view :where(p, ul, ol, blockquote, pre, table, hr):last-child { margin-bottom: 0; }
.card-body .notes-view ul, .card-body .notes-view ol { padding-left: 18px; }
.card-body .notes-view li { margin: 0 0 2px; }
.card-body .notes-view code { font-family: var(--font-mono); font-size: 10px; background: var(--bg-tertiary); padding: 1px 4px; border-radius: 3px; }
.card-body .notes-view pre { font-family: var(--font-mono); font-size: 10px; line-height: 1.4; background: var(--bg-tertiary); padding: 6px 8px; border-radius: 4px; white-space: pre-wrap; }
.card-body .notes-view pre code { background: none; padding: 0; font-size: inherit; }
.card-body .notes-view a { color: var(--accent); text-decoration: underline; }
.card-body .notes-view h1 { font-size: 16px; font-weight: 700; color: var(--text-primary); margin: 4px 0 6px; line-height: 1.25; }
.card-body .notes-view h2 { font-size: 14px; font-weight: 700; color: var(--text-primary); margin: 4px 0 5px; line-height: 1.25; }
.card-body .notes-view h3 { font-size: 12px; font-weight: 700; color: var(--text-primary); margin: 3px 0 4px; line-height: 1.3; }
.card-body .notes-view :where(h4, h5, h6) { font-size: 11px; font-weight: 700; color: var(--text-primary); margin: 3px 0 4px; line-height: 1.3; text-transform: uppercase; letter-spacing: 0.02em; }
.card-body .notes-view blockquote { margin: 0 0 6px; padding: 2px 0 2px 8px; border-left: 2px solid var(--border); color: var(--text-secondary); font-style: italic; }
.card-body .notes-view hr { border: none; border-top: 1px solid var(--border); margin: 6px 0; }
.card-body .notes-view strong { font-weight: 700; color: var(--text-primary); }
.card-body .notes-view em { font-style: italic; }
.card-body .notes-view table { border-collapse: collapse; width: 100%; font-size: 10px; }
.card-body .notes-view th, .card-body .notes-view td { border: 1px solid var(--border); padding: 2px 5px; text-align: left; vertical-align: top; }
.card-body .notes-view th { background: var(--bg-tertiary); font-weight: 700; color: var(--text-primary); }
.card-body .notes-edit {
  width: 100%; height: 100%; min-height: 48px;
  border: none; outline: none; resize: none; background: transparent;
  font-family: var(--font-mono); font-size: 10px; line-height: 1.4;
  color: var(--text-primary);
  overflow: hidden;
}
.card-actions {
  position: absolute; right: 8px; bottom: 8px;
  display: flex; gap: 4px;
}
.card-action {
  width: 22px; height: 22px;
  border: 1px solid var(--border-strong);
  border-radius: 6px;
  background: var(--card-bg-soft);
  color: var(--text-secondary);
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 10px;
  transition: all 0.15s;
}
.card-action:hover { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
.card-action.add { font-size: 14px; line-height: 1; }
.card.root .card-action.delete { display: none; }
.card-collapse-indicator {
  position: absolute; left: 50%; bottom: -10px; transform: translateX(-50%);
  width: 20px; height: 20px;
  border: 1.5px solid var(--border-strong);
  border-radius: 50%;
  background: var(--card-bg);
  color: var(--text-secondary);
  display: none; align-items: center; justify-content: center;
  cursor: pointer; font-size: 10px;
}
.card.has-children .card-collapse-indicator { display: inline-flex; }
.card-collapse-indicator:hover { color: var(--accent); border-color: var(--accent); }
.card .anchor-grip { position: absolute; inset: 0; pointer-events: none; }

.card.dragging-arrow-from { box-shadow: 0 0 0 2px var(--accent); }

.statusbar { display: flex; align-items: center; justify-content: space-between; height: var(--statusbar-height); padding: 0 12px; background: var(--bg-secondary); border-top: 1px solid var(--border); font-size: 11px; color: var(--text-muted); flex-shrink: 0; gap: 12px; }
.statusbar-left, .statusbar-right { display: flex; align-items: center; gap: 12px; min-width: 0; }
.statusbar-hint { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.toast-container { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 8px; z-index: 1000; pointer-events: none; }
.toast { padding: 8px 16px; background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; box-shadow: 0 4px 20px rgba(0,0,0,0.3); opacity: 0; transform: translateY(8px); transition: opacity 0.2s, transform 0.2s; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateY(0); }

#connectionBanner { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); padding: 8px 16px; background: rgba(239,68,68,0.9); color: #fff; border-radius: 8px; font-size: 13px; z-index: 800; display: none; }
#connectionBanner.visible { display: block; }

.ref-prompt {
  position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
  background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 18px; z-index: 100; width: 320px; box-shadow: 0 16px 48px rgba(0,0,0,0.5);
  display: none;
}
.ref-prompt.open { display: block; }
.ref-prompt label { font-size: 12px; color: var(--text-secondary); display: block; margin-bottom: 6px; }
.ref-prompt input { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-primary); color: var(--text-primary); font-family: var(--font-ui); font-size: 13px; outline: none; }
.ref-prompt input:focus { border-color: var(--accent); }
.ref-prompt-actions { display: flex; gap: 8px; margin-top: 14px; justify-content: flex-end; }

</style>
</head>

<script>
'use strict';
(function(){

const $ = id => document.getElementById(id);

const STORAGE_KEY = 'nibset-mindmap-data';
const AUTOSAVE_DELAY = 1500;
const MAX_USERS = 8;
const MAX_RECONNECT = 5;
const PNG_KEY = 'NibSetMindMap';
const CARD_W = 280;
const CARD_H_BASE = 60;       
const CARD_H_NOTES = 380;     
const STAR_SIBLING_PAD = 28;
const STAR_RADIAL_PAD = 36;
const STAR_INNER_MIN = 240;

function uid() { return crypto.randomUUID ? 'n_' + crypto.randomUUID().slice(0, 8) : 'n_' + Math.random().toString(36).slice(2, 10); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function deepClone(o) { return JSON.parse(JSON.stringify(o)); }
function debounce(fn, ms) { let t; return function(...a) { clearTimeout(t); t = setTimeout(() => fn.apply(this, a), ms); }; }

if (window.marked) { marked.use({ breaks: true, gfm: true }); }
function renderMarkdown(md) {
  if (!md) return '';
  try {
    let html = marked.parse(md);
    html = html
      .replace(/<script[\s\S]*?<\/script>/gi, '')
      .replace(/<iframe[\s\S]*?<\/iframe>/gi, '')
      .replace(/<style[\s\S]*?<\/style>/gi, '')
      .replace(/\son\w+\s*=\s*("[^"]*"|'[^']*'|[^\s>]+)/gi, '')
      .replace(/javascript:/gi, '');
    return html;
  } catch (e) { return escapeHtml(md); }
}
function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function renderNotesAsSvg(notesMd, boxX, boxY, boxW, boxH, fillText, fillMuted) {
  const html = renderMarkdown(notesMd);
  if (!html) return '';
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  const padX = 10, padY = 8;
  const innerW = Math.max(20, boxW - padX * 2);
  const innerH = Math.max(20, boxH - padY * 2);
  const blocks = [];
  function pushText(text, opts) {
    const t = (text || '').replace(/\s+/g, ' ').trim();
    if (!t) return;
    blocks.push(Object.assign({ kind: 'text', text: t, size: 11, weight: '400', style: 'normal', fill: fillText, indent: 0, mono: false, gapAfter: 4 }, opts || {}));
  }
  function walkChildren(parent, depth) {
    for (const el of parent.children) {
      const tag = el.tagName.toLowerCase();
      if (tag === 'h1') pushText(el.textContent, { size: 16, weight: '700', gapAfter: 6 });
      else if (tag === 'h2') pushText(el.textContent, { size: 14, weight: '700', gapAfter: 5 });
      else if (tag === 'h3') pushText(el.textContent, { size: 12, weight: '700', gapAfter: 4 });
      else if (tag === 'h4' || tag === 'h5' || tag === 'h6') pushText(el.textContent, { weight: '700', gapAfter: 4 });
      else if (tag === 'p') pushText(el.textContent, { indent: depth * 10 });
      else if (tag === 'blockquote') pushText(el.textContent, { style: 'italic', fill: fillMuted, indent: 6 + depth * 10 });
      else if (tag === 'pre') {
        const lines = (el.textContent || '').replace(/\n+$/, '').split('\n');
        for (const ln of lines) blocks.push({ kind: 'text', text: ln, size: 10, weight: '400', style: 'normal', fill: fillMuted, indent: 6 + depth * 10, mono: true, gapAfter: 0 });
        if (blocks.length) blocks[blocks.length - 1].gapAfter = 4;
      }
      else if (tag === 'ul' || tag === 'ol') {
        let i = 1;
        for (const li of el.children) {
          if (li.tagName !== 'LI') continue;
          const prefix = tag === 'ol' ? `${i++}. ` : '• ';
          let liText = '';
          for (const n of li.childNodes) {
            if (n.nodeType === 3) liText += n.textContent;
            else if (n.nodeType === 1 && !/^(UL|OL)$/.test(n.tagName)) liText += n.textContent;
          }
          pushText(prefix + liText, { indent: 6 + depth * 12 });
          for (const sub of li.children) {
            if (sub.tagName === 'UL' || sub.tagName === 'OL') walkChildren({ children: [sub] }, depth + 1);
          }
        }
      }
      else if (tag === 'hr') blocks.push({ kind: 'hr' });
      else if (tag === 'table') {
        const rows = [];
        for (const section of el.children) {
          if (!/^(THEAD|TBODY|TFOOT)$/.test(section.tagName)) continue;
          const isHead = section.tagName === 'THEAD';
          for (const tr of section.children) {
            if (tr.tagName !== 'TR') continue;
            const cells = [];
            for (const c of tr.children) {
              if (c.tagName !== 'TH' && c.tagName !== 'TD') continue;
              cells.push((c.textContent || '').replace(/\s+/g, ' ').trim());
            }
            if (cells.length) rows.push({ cells, head: isHead || tr.querySelector('th') !== null });
          }
        }
        if (rows.length) blocks.push({ kind: 'table', rows, indent: depth * 10 });
      }
      else walkChildren(el, depth);
    }
  }
  walkChildren(tmp, 0);
  if (!blocks.length) return '';
  const parts = [];
  let y = boxY + padY;
  const bottom = boxY + padY + innerH;
  for (const b of blocks) {
    if (y >= bottom) break;
    if (b.kind === 'hr') { parts.push(`<line x1="${boxX + padX}" y1="${(y + 3).toFixed(2)}" x2="${boxX + boxW - padX}" y2="${(y + 3).toFixed(2)}" stroke="${fillMuted}" stroke-width="0.6"/>`); y += 7; continue; }
    if (b.kind === 'table') {
      const size = 10;
      const rowH = size * 1.6;
      const cols = Math.max(1, b.rows.reduce((m, r) => Math.max(m, r.cells.length), 0));
      const tableLeft = boxX + padX + b.indent;
      const tableRight = boxX + boxW - padX;
      const tableW = Math.max(40, tableRight - tableLeft);
      const colW = tableW / cols;
      const charW = size * 0.52;
      const maxChars = Math.max(3, Math.floor((colW - 6) / charW));
      const tableTop = y;
      for (const row of b.rows) {
        if (y + rowH > bottom) break;
        for (let ci = 0; ci < cols; ci++) {
          const cell = row.cells[ci] || '';
          const txt = cell.length > maxChars ? cell.slice(0, Math.max(1, maxChars - 1)) + '…' : cell;
          const cx = tableLeft + ci * colW + 4;
          const cy = y + size * 1.05;
          parts.push(`<text x="${cx.toFixed(2)}" y="${cy.toFixed(2)}" font-family="Plus Jakarta Sans, sans-serif" font-size="${size}" font-weight="${row.head ? '700' : '400'}" font-style="normal" fill="${fillText}" xml:space="preserve">${escapeXml(txt)}</text>`);
        }
        const lineY = (y + rowH - 1).toFixed(2);
        parts.push(`<line x1="${tableLeft.toFixed(2)}" y1="${lineY}" x2="${(tableLeft + colW * cols).toFixed(2)}" y2="${lineY}" stroke="${fillMuted}" stroke-width="0.4"/>`);
        y += rowH;
      }
      const tableBottom = y;
      for (let ci = 0; ci <= cols; ci++) {
        const lx = (tableLeft + ci * colW).toFixed(2);
        parts.push(`<line x1="${lx}" y1="${tableTop.toFixed(2)}" x2="${lx}" y2="${tableBottom.toFixed(2)}" stroke="${fillMuted}" stroke-width="0.4"/>`);
      }
      y += 4;
      continue;
    }
    const lineH = b.size * 1.35;
    const charW = b.size * (b.mono ? 0.6 : 0.52);
    const maxChars = Math.max(6, Math.floor((innerW - b.indent) / charW));
    const lines = wrapText(b.text, maxChars);
    const fam = b.mono ? 'ui-monospace, Menlo, Consolas, monospace' : 'Plus Jakarta Sans, sans-serif';
    for (const ln of lines) {
      if (y + b.size > bottom) break;
      const tx = boxX + padX + b.indent;
      const ty = y + b.size * 0.85;
      parts.push(`<text x="${tx.toFixed(2)}" y="${ty.toFixed(2)}" font-family="${fam}" font-size="${b.size}" font-weight="${b.weight}" font-style="${b.style}" fill="${b.fill}" xml:space="preserve">${escapeXml(ln)}</text>`);
      y += lineH;
    }
    y += b.gapAfter;
  }
  return parts.join('');
}
function wrapText(text, maxChars) {
  const out = [];
  const words = String(text).split(/\s+/).filter(Boolean);
  let cur = '';
  for (const w of words) {
    if (w.length > maxChars) {
      if (cur) { out.push(cur); cur = ''; }
      for (let i = 0; i < w.length; i += maxChars) out.push(w.slice(i, i + maxChars));
      continue;
    }
    if (!cur) cur = w;
    else if (cur.length + 1 + w.length <= maxChars) cur += ' ' + w;
    else { out.push(cur); cur = w; }
  }
  if (cur) out.push(cur);
  return out;
}

let mm = null;
let selectedId = null;
let activeTool = 'select';     
let refsVisible = true;
let editingNodeId = null;
let editingField = null;       

let viewportX = 0, viewportY = 0, viewportScale = 1;
const MIN_SCALE = 0.15, MAX_SCALE = 3;

let presentationMode = false;
let focusAnim = null; 
const PRESENT_KEY = 'nibset-mindmap-presentation';

let layoutMode = 'tree';
const LAYOUT_KEY = 'nibset-mindmap-layout';

let isPanning = false, panStartX = 0, panStartY = 0, panOriginX = 0, panOriginY = 0, spaceHeld = false;

let arrowDrag = null;          

let pendingRef = null;         

let isHost = false;
let myId = null;
let connections = [];
let hostConn = null;
let guestPeer = null;
let guestRoomId = null;
let reconnectAttempts = 0;
let userCount = 1;
let isApplyingRemote = false;
let msgBuffer = [];
let msgFlushTimer = null;
const CHUNK_SIZE = 12000;
let pendingChunks = {};

const workspace   = $('workspace');
const world       = $('world');
const cardsLayer  = $('cardsLayer');
const edgesGroup  = $('edgesGroup');
const refsGroup   = $('refsGroup');
const pillsGroup  = $('pillsGroup');
const arrowsLayer = $('arrowsLayer');
const previewArrow= $('previewArrow');
const statusDot   = $('statusDot');
const statusText  = $('statusText');
const copyLinkBtn = $('copyLinkBtn');
const toastContainer = $('toastContainer');
const titleInput  = $('mmTitle');
const saveStatus  = $('saveStatus');
const zoomLabel   = $('zoomLabel');
const statusMsg   = $('statusMsg');
const refPrompt   = $('refPrompt');
const refLabelInput = $('refLabelInput');
const fileInput   = $('fileInput');

function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  toastContainer.appendChild(el);
  requestAnimationFrame(() => el.classList.add('show'));
  setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300); }, 2200);
}

function createMindMap() {
  const rootId = uid();
  const c1 = uid(), c2 = uid();
  return {
    meta: { title: 'Untitled MindMap', createdAt: Date.now(), updatedAt: Date.now() },
    rootId,
    nodes: {
      [rootId]: { id: rootId, parentId: null, title: 'Central Idea', notes: '', collapsed: false },
      [c1]: { id: c1, parentId: rootId, title: 'Idea 1', notes: '', collapsed: false },
      [c2]: { id: c2, parentId: rootId, title: 'Idea 2', notes: '', collapsed: false }
    },
    refs: []
  };
}

function getChildren(parentId) {
  const arr = [];
  for (const id in mm.nodes) {
    if (mm.nodes[id].parentId === parentId) arr.push(mm.nodes[id]);
  }
  return arr;
}

function isAncestor(ancestorId, nodeId) {
  let cur = mm.nodes[nodeId];
  while (cur) {
    if (cur.parentId === ancestorId) return true;
    cur = mm.nodes[cur.parentId];
  }
  return false;
}

function descendantIds(nodeId) {
  const out = [];
  function walk(id) { for (const c of getChildren(id)) { out.push(c.id); walk(c.id); } }
  walk(nodeId);
  return out;
}

function setSubtreeCollapsed(nodeId, collapsed) {
  mm.nodes[nodeId].collapsed = collapsed;
  for (const id of descendantIds(nodeId)) mm.nodes[id].collapsed = collapsed;
}

function computeLayout() {
  return layoutMode === 'tree' ? computeTreeLayout() : computeStarLayout();
}

function computeTreeLayout() {
  const positions = {};
  const visible = new Set();
  if (!mm || !mm.rootId || !mm.nodes[mm.rootId]) return { positions, visible };

  const H_PAD = 40; 
  const V_PAD = 80; 

  const childrenOf = {};
  function gather(id) {
    visible.add(id);
    const node = mm.nodes[id];
    if (!node || node.collapsed) { childrenOf[id] = []; return; }
    const kids = getChildren(id).map(c => c.id);
    childrenOf[id] = kids;
    for (const cid of kids) gather(cid);
  }
  gather(mm.rootId);

  const depth = {};
  (function setDepth(id, d) {
    depth[id] = d;
    for (const cid of childrenOf[id]) setDepth(cid, d + 1);
  })(mm.rootId, 0);

  let maxDepth = 0;
  const maxHByDepth = {};
  for (const id of visible) {
    const d = depth[id];
    if (d > maxDepth) maxDepth = d;
    const h = cardHeight(mm.nodes[id]);
    maxHByDepth[d] = Math.max(maxHByDepth[d] || 0, h);
  }
  const yByDepth = { 0: 0 };
  for (let d = 1; d <= maxDepth; d++) {
    yByDepth[d] = yByDepth[d - 1] + (maxHByDepth[d - 1] || 0) / 2 + (maxHByDepth[d] || 0) / 2 + V_PAD;
  }

  const subtreeWidth = {};
  (function computeWidth(id) {
    const kids = childrenOf[id];
    if (kids.length === 0) { subtreeWidth[id] = CARD_W; return CARD_W; }
    let total = 0;
    for (let i = 0; i < kids.length; i++) {
      total += computeWidth(kids[i]);
      if (i > 0) total += H_PAD;
    }
    subtreeWidth[id] = Math.max(CARD_W, total);
    return subtreeWidth[id];
  })(mm.rootId);

  (function place(id, leftX) {
    const kids = childrenOf[id];
    const w = subtreeWidth[id];
    if (kids.length === 0) {
      positions[id] = { x: leftX + CARD_W / 2, y: yByDepth[depth[id]] };
      return;
    }
    let totalKids = 0;
    for (let i = 0; i < kids.length; i++) {
      totalKids += subtreeWidth[kids[i]];
      if (i > 0) totalKids += H_PAD;
    }
    let cx = leftX + (w - totalKids) / 2;
    for (const cid of kids) {
      place(cid, cx);
      cx += subtreeWidth[cid] + H_PAD;
    }
    const firstX = positions[kids[0]].x;
    const lastX = positions[kids[kids.length - 1]].x;
    positions[id] = { x: (firstX + lastX) / 2, y: yByDepth[depth[id]] };
  })(mm.rootId, -subtreeWidth[mm.rootId] / 2);

  return { positions, visible };
}

function computeStarLayout() {
  const positions = {};
  const visible = new Set();
  if (!mm || !mm.rootId || !mm.nodes[mm.rootId]) return { positions, visible };

  const rootId = mm.rootId;
  const rootNode = mm.nodes[rootId];
  visible.add(rootId);
  positions[rootId] = { x: 0, y: 0, angle: 0 };

  const rootKids = (rootNode && !rootNode.collapsed) ? getChildren(rootId) : [];
  if (rootKids.length === 0) return { positions, visible };

  const projOutward = (node, theta) =>
    Math.abs(Math.cos(theta)) * CARD_W + Math.abs(Math.sin(theta)) * cardHeight(node);
  const projTangent = (node, theta) =>
    Math.abs(Math.sin(theta)) * CARD_W + Math.abs(Math.cos(theta)) * cardHeight(node);

  function leafCount(id) {
    const n = mm.nodes[id];
    if (!n) return 1;
    const kids = getChildren(id);
    if (kids.length === 0 || n.collapsed) return 1;
    let total = 0;
    for (const c of kids) total += leafCount(c.id);
    return Math.max(1, total);
  }

  function subtreeExtent(id, theta) {
    const node = mm.nodes[id];
    if (!node) return CARD_W + STAR_SIBLING_PAD;
    const self = projTangent(node, theta) + STAR_SIBLING_PAD;
    if (node.collapsed) return self;
    const kids = getChildren(id);
    if (kids.length === 0) return self;
    let sum = 0;
    for (const c of kids) sum += subtreeExtent(c.id, theta);
    return Math.max(self, sum);
  }

  function placeSubtree(id, x, y, dirAngle) {
    visible.add(id);
    positions[id] = { x, y, angle: dirAngle };
    const node = mm.nodes[id];
    if (!node || node.collapsed) return;
    const kids = getChildren(id);
    if (kids.length === 0) return;

    const ox = Math.cos(dirAngle), oy = Math.sin(dirAngle);
    const tx = -Math.sin(dirAngle), ty = Math.cos(dirAngle);

    const myProj = projOutward(node, dirAngle);
    let maxKidProj = 0;
    for (const c of kids) maxKidProj = Math.max(maxKidProj, projOutward(c, dirAngle));
    const step = myProj / 2 + maxKidProj / 2 + STAR_RADIAL_PAD;

    const childExtents = kids.map(c => subtreeExtent(c.id, dirAngle));
    const total = childExtents.reduce((s, e) => s + e, 0);
    let offset = -total / 2;
    for (let i = 0; i < kids.length; i++) {
      const c = kids[i];
      const tCenter = offset + childExtents[i] / 2;
      offset += childExtents[i];
      const cx = x + ox * step + tx * tCenter;
      const cy = y + oy * step + ty * tCenter;
      placeSubtree(c.id, cx, cy, dirAngle);
    }
  }

  if (rootKids.length === 1) {
    const only = rootKids[0];
    const a = Math.PI; // largest (only) branch goes left
    const r = Math.max(STAR_INNER_MIN,
      projOutward(rootNode, a) / 2 + projOutward(only, a) / 2 + STAR_RADIAL_PAD);
    placeSubtree(only.id, Math.cos(a) * r, Math.sin(a) * r, a);
    return { positions, visible };
  }

  const N = rootKids.length;
  const leaves = rootKids.map(c => leafCount(c.id));
  const weights = leaves.map(l => Math.sqrt(l));
  const totalW = weights.reduce((a, b) => a + b, 0);
  const shares = weights.map(w => (w / totalW) * Math.PI * 2);

  let largestIdx = 0;
  for (let i = 1; i < N; i++) if (leaves[i] > leaves[largestIdx]) largestIdx = i;
  let cumulativeBefore = 0;
  for (let i = 0; i < largestIdx; i++) cumulativeBefore += shares[i];
  const startAngle = Math.PI - cumulativeBefore - shares[largestIdx] / 2;

  const centers = [];
  let angle = startAngle;
  for (let i = 0; i < N; i++) {
    centers.push(angle + shares[i] / 2);
    angle += shares[i];
  }

  let r1 = STAR_INNER_MIN;
  for (let i = 0; i < N; i++) {
    const j = (i + 1) % N;
    let dTheta = centers[j] - centers[i];
    while (dTheta < 0) dTheta += 2 * Math.PI;
    if (dTheta > Math.PI) dTheta = 2 * Math.PI - dTheta;
    const e_i = subtreeExtent(rootKids[i].id, centers[i]);
    const e_j = subtreeExtent(rootKids[j].id, centers[j]);
    const need = ((e_i + e_j) / 2 + STAR_SIBLING_PAD) / Math.max(0.001, dTheta);
    if (need > r1) r1 = need;
  }
  for (let i = 0; i < N; i++) {
    const need = projOutward(rootNode, centers[i]) / 2
               + projOutward(rootKids[i], centers[i]) / 2
               + STAR_RADIAL_PAD;
    if (r1 < need) r1 = need;
  }

  for (let i = 0; i < N; i++) {
    const cx = Math.cos(centers[i]) * r1;
    const cy = Math.sin(centers[i]) * r1;
    placeSubtree(rootKids[i].id, cx, cy, centers[i]);
  }

  return { positions, visible };
}

const CARD_TITLE_BLOCK = 70; 
const CARD_LINE_PX = 15;     
const CARD_LINE_WRAP = 45;   
function cardHeight(node) {
  const notes = (node && node.notes ? node.notes : '').trim();
  if (!notes) return CARD_TITLE_BLOCK + 60; 
  let lines = 0;
  for (const ln of notes.split('\n')) {
    lines += Math.max(1, Math.ceil(ln.length / CARD_LINE_WRAP));
  }
  const bodyH = clamp(lines * CARD_LINE_PX + 24, 80, CARD_H_NOTES - CARD_TITLE_BLOCK);
  return CARD_TITLE_BLOCK + bodyH;
}

let _sizeProbe = null;
function ensureSizeProbe() {
  if (_sizeProbe) return _sizeProbe;
  const card = document.createElement('div');
  card.className = 'card';
  card.style.cssText = 'position:absolute;left:-99999px;top:0;visibility:hidden;pointer-events:none;height:auto;';
  card.innerHTML = '<div class="card-title-wrap"><input class="card-title" type="text" value=""></div>'
    + '<div class="card-body" style="overflow:visible;height:auto;max-height:none;flex:none;"><div class="notes-view"></div></div>';
  document.body.appendChild(card);
  _sizeProbe = {
    card,
    title: card.querySelector('.card-title'),
    view: card.querySelector('.notes-view'),
  };
  return _sizeProbe;
}

function presentCardDims(node) {
  const ws = workspace.getBoundingClientRect();
  const maxW = Math.max(CARD_W, Math.floor(ws.width * 0.80));
  const maxH = Math.max(CARD_TITLE_BLOCK + 80, Math.floor(ws.height * 0.80));
  const probe = ensureSizeProbe();
  probe.title.value = node.title || '';
  const md = (node.notes || '').trim();
  probe.view.innerHTML = md ? renderMarkdown(node.notes) : '';

  probe.card.style.width = 'auto';
  probe.card.style.maxWidth = maxW + 'px';
  const naturalW = clamp(probe.card.offsetWidth, CARD_W, maxW);

  probe.card.style.maxWidth = '';
  probe.card.style.width = naturalW + 'px';
  const naturalH = probe.card.offsetHeight;
  return { w: naturalW, h: clamp(naturalH, CARD_TITLE_BLOCK + 60, maxH) };
}

function cardDims(id) {
  const node = mm.nodes[id];
  if (!node) return { w: CARD_W, h: CARD_TITLE_BLOCK + 60 };
  if (presentationMode && id === selectedId) return presentCardDims(node);
  return { w: CARD_W, h: cardHeight(node) };
}

let cachedLayout = { positions: {}, visible: new Set() };

const BRANCH_PALETTE_SIZE = 10;

function buildBranchColorMap(positions) {
  const colorOf = {};
  if (!mm || !mm.rootId || !positions) return colorOf;
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  const sat = isLight ? 55 : 52;
  const light = isLight ? 46 : 64;
  for (const id in mm.nodes) {
    if (id === mm.rootId) continue;
    const p = positions[id];
    if (!p) continue;
    if (p.x === 0 && p.y === 0) continue;
    let deg = Math.atan2(p.y, p.x) * 180 / Math.PI;
    if (deg < 0) deg += 360;
    colorOf[id] = `hsl(${deg.toFixed(1)} ${sat}% ${light}%)`;
  }
  return colorOf;
}

function render(opts) {
  const skipAutoFocus = !!(opts && opts.skipAutoFocus);
  cachedLayout = computeLayout();
  const { positions, visible } = cachedLayout;
  const branchColor = buildBranchColorMap(positions);

  const existing = new Map();
  cardsLayer.querySelectorAll('.card').forEach(el => existing.set(el.dataset.id, el));

  for (const id in mm.nodes) {
    const node = mm.nodes[id];
    const pos = positions[id];
    if (!pos || !visible.has(id)) {
      const el = existing.get(id);
      if (el) el.remove();
      existing.delete(id);
      continue;
    }
    let el = existing.get(id);
    if (!el) {
      el = createCardElement(node);
      cardsLayer.appendChild(el);
    } else {
      updateCardElement(el, node);
    }
    existing.delete(id);

    const dims = cardDims(id);
    const isFocusedPresent = presentationMode && id === selectedId;
    el.style.left = (pos.x - dims.w / 2) + 'px';
    el.style.top  = (pos.y - dims.h / 2) + 'px';
    el.style.width = isFocusedPresent ? (dims.w + 'px') : '';
    el.style.height = dims.h + 'px';
    el.classList.toggle('has-children', getChildren(id).length > 0);
    el.classList.toggle('selected', selectedId === id);
    el.classList.toggle('root', id === mm.rootId);
    const bc = branchColor[id];
    if (bc && id !== mm.rootId) el.style.setProperty('--branch-color', bc);
    else el.style.removeProperty('--branch-color');
  }

  for (const el of existing.values()) el.remove();

  renderArrows();
  updateZoom();
  if (!skipAutoFocus && presentationMode && selectedId && cachedLayout.visible.has(selectedId) && !focusAnim) {
    focusOnNode(selectedId, { animate: false });
  }
}

function createCardElement(node) {
  const el = document.createElement('div');
  el.className = 'card';
  el.dataset.id = node.id;
  el.innerHTML = `
    <div class="card-title-wrap">
      <input class="card-title" type="text" maxlength="200" value="">
    </div>
    <div class="card-body">
      <div class="notes-view"></div>
      <textarea class="notes-edit" placeholder="Markdown notes..." style="display:none"></textarea>
    </div>
    <div class="card-actions">
      <button class="card-action delete" title="Delete node"><i class="fa-solid fa-trash"></i></button>
      <button class="card-action add" title="Add child">+</button>
    </div>
    <div class="card-collapse-indicator" title="Collapse / expand"><i class="fa-solid fa-minus"></i></div>
  `;
  attachCardHandlers(el);
  updateCardElement(el, node);
  return el;
}

function updateCardElement(el, node) {
  const titleEl = el.querySelector('.card-title');
  if (document.activeElement !== titleEl) titleEl.value = node.title || '';
  const view = el.querySelector('.notes-view');
  const edit = el.querySelector('.notes-edit');
  if (document.activeElement !== edit) edit.value = node.notes || '';
  const md = (node.notes || '').trim();
  view.innerHTML = md ? renderMarkdown(node.notes) : '';
  view.classList.toggle('empty', !md);

  const ind = el.querySelector('.card-collapse-indicator i');
  ind.className = 'fa-solid ' + (node.collapsed ? 'fa-plus' : 'fa-minus');
}

function attachCardHandlers(el) {
  const id = el.dataset.id;
  const titleEl = el.querySelector('.card-title');
  const view = el.querySelector('.notes-view');
  const edit = el.querySelector('.notes-edit');
  const body = el.querySelector('.card-body');
  const addBtn = el.querySelector('.card-action.add');
  const deleteBtn = el.querySelector('.card-action.delete');
  const collapseInd = el.querySelector('.card-collapse-indicator');

  el.addEventListener('mousedown', (e) => {

    if (focusAnim) {
      cancelAnimationFrame(focusAnim.raf);
      focusAnim = null;
    }
    if (activeTool === 'arrow-parent' || activeTool === 'arrow-ref') {

      arrowDrag = {
        fromId: id,
        mode: activeTool === 'arrow-parent' ? 'parent' : 'ref',
        curX: 0, curY: 0
      };
      e.preventDefault();
      e.stopPropagation();
      el.classList.add('dragging-arrow-from');
      const move = (ev) => {
        const w = clientToWorld(ev.clientX, ev.clientY);
        arrowDrag.curX = w.x; arrowDrag.curY = w.y;
        const target = findCardUnderPoint(ev.clientX, ev.clientY);
        document.querySelectorAll('.card.drop-target').forEach(c => c.classList.remove('drop-target'));
        if (target && target.dataset.id !== arrowDrag.fromId) target.classList.add('drop-target');
        renderPreviewArrow();
      };
      const up = (ev) => {
        document.removeEventListener('mousemove', move);
        document.removeEventListener('mouseup', up);
        document.querySelectorAll('.card.drop-target').forEach(c => c.classList.remove('drop-target'));
        el.classList.remove('dragging-arrow-from');
        previewArrow.style.display = 'none';
        const target = findCardUnderPoint(ev.clientX, ev.clientY);
        if (target && target.dataset.id !== arrowDrag.fromId) {
          if (arrowDrag.mode === 'parent') reparent(target.dataset.id, arrowDrag.fromId);
          else openRefPrompt(arrowDrag.fromId, target.dataset.id);
        }
        arrowDrag = null;
      };
      document.addEventListener('mousemove', move);
      document.addEventListener('mouseup', up);
      return;
    }
    if (e.target.closest('.notes-view')) return;
    selectNode(id);
  });

  el.addEventListener('dblclick', (e) => {
    if (activeTool !== 'select') return;
    if (e.target.closest('.card-title') || e.target.closest('.notes-edit') || e.target.closest('.card-action')) return;
    e.stopPropagation();

    if (mm.nodes[id]) {
      setSubtreeCollapsed(id, false);
      mm.nodes[id].collapsed = false;
      render();
      sendMsg({ type: 'subtree-collapse', id, collapsed: false });
      scheduleSave();
    }
  });

  titleEl.addEventListener('input', () => {
    mm.nodes[id].title = titleEl.value;
    broadcastBuffered({ type: 'node-update', id, changes: { title: titleEl.value } });
    scheduleSave();
  });
  titleEl.addEventListener('focus', () => { editingNodeId = id; editingField = 'title'; });
  titleEl.addEventListener('blur', () => {
    if (editingNodeId === id && editingField === 'title') { editingNodeId = null; editingField = null; }
  });
  titleEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); titleEl.blur(); }
  });

  body.addEventListener('click', (e) => {
    if (e.target.closest('.notes-edit')) return;
    if (e.target.closest('a[href]')) e.preventDefault();
    e.stopPropagation();
    editingNodeId = id; editingField = 'notes';
    edit.style.display = 'block';
    view.style.display = 'none';
    edit.focus();
    selectNode(id);
  });
  edit.addEventListener('input', () => {
    mm.nodes[id].notes = edit.value;
    broadcastBuffered({ type: 'node-update', id, changes: { notes: edit.value } });
    scheduleSave();
  });
  edit.addEventListener('focus', () => { editingNodeId = id; editingField = 'notes'; });
  edit.addEventListener('blur', () => {
    edit.style.display = 'none';
    view.style.display = '';
    view.innerHTML = renderMarkdown(mm.nodes[id].notes);
    editingNodeId = null; editingField = null;
    render();
  });

  addBtn.addEventListener('mousedown', (e) => { e.stopPropagation(); });
  addBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    addChild(id);
  });

  if (deleteBtn) {
    deleteBtn.addEventListener('mousedown', (e) => { e.stopPropagation(); });
    deleteBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      deleteNode(id);
    });
  }

  collapseInd.addEventListener('mousedown', (e) => { e.stopPropagation(); });
  collapseInd.addEventListener('click', (e) => {
    e.stopPropagation();
    toggleCollapsed(id);
  });
}

function selectNode(id) {
  const selectionChanged = selectedId !== id;
  selectedId = id;
  document.querySelectorAll('.card').forEach(c => c.classList.toggle('selected', c.dataset.id === id));
  updateStatusMsg();
  if (presentationMode) {

    setTimeout(() => {
      if (selectedId !== id || !presentationMode) return;
      render({ skipAutoFocus: true });

      if (id && selectionChanged && editingNodeId !== id) {
        focusOnNode(id, { animate: true });
      } else {
        renderConnectionPills(id);
      }
    }, 0);
  }
}

function findCardUnderPoint(clientX, clientY) {
  const elements = document.elementsFromPoint(clientX, clientY);
  for (const el of elements) {
    if (el.classList && el.classList.contains('card')) return el;
    const card = el.closest && el.closest('.card');
    if (card) return card;
  }
  return null;
}

function clientToWorld(cx, cy) {
  const rect = workspace.getBoundingClientRect();
  const sx = cx - rect.left;
  const sy = cy - rect.top;
  return {
    x: (sx - rect.width / 2) / viewportScale + viewportX,
    y: (sy - rect.height / 2) / viewportScale + viewportY
  };
}

function rectEdgeIntersection(cx, cy, w, h, tx, ty) {

  const dx = tx - cx, dy = ty - cy;
  if (dx === 0 && dy === 0) return { x: cx, y: cy };
  const sx = dx === 0 ? Infinity : (Math.sign(dx) * (w / 2)) / dx;
  const sy = dy === 0 ? Infinity : (Math.sign(dy) * (h / 2)) / dy;
  const t = Math.min(sx, sy);
  return { x: cx + dx * t, y: cy + dy * t };
}

function nodeRect(id) {
  const pos = cachedLayout.positions[id];
  if (!pos) return null;
  const node = mm.nodes[id];
  if (!node) return null;
  const dims = cardDims(id);
  return { cx: pos.x, cy: pos.y, w: dims.w, h: dims.h };
}

function renderArrows() {

  edgesGroup.innerHTML = '';
  const visible = cachedLayout.visible;
  for (const id in mm.nodes) {
    if (!visible.has(id)) continue;
    const node = mm.nodes[id];
    if (!node.parentId) continue;
    if (!visible.has(node.parentId)) continue;
    const p = nodeRect(node.parentId);
    const c = nodeRect(id);
    if (!p || !c) continue;
    const a = rectEdgeIntersection(p.cx, p.cy, p.w, p.h, c.cx, c.cy);
    const b = rectEdgeIntersection(c.cx, c.cy, c.w, c.h, p.cx, p.cy);
    const d = `M ${a.x} ${a.y} L ${b.x} ${b.y}`;
    const hit = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    hit.setAttribute('class', 'edge-hit');
    hit.setAttribute('d', d);
    hit.dataset.fromId = node.parentId;
    hit.dataset.toId = id;
    edgesGroup.appendChild(hit);
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('class', 'edge');
    path.setAttribute('d', d);
    path.setAttribute('marker-end', 'url(#arrowhead)');
    path.dataset.fromId = node.parentId;
    path.dataset.toId = id;
    edgesGroup.appendChild(path);
  }

  refsGroup.innerHTML = '';
  for (const ref of mm.refs) {
    if (!visible.has(ref.fromId) || !visible.has(ref.toId)) continue;
    const f = nodeRect(ref.fromId), t = nodeRect(ref.toId);
    if (!f || !t) continue;
    const a = rectEdgeIntersection(f.cx, f.cy, f.w, f.h, t.cx, t.cy);
    const b = rectEdgeIntersection(t.cx, t.cy, t.w, t.h, f.cx, f.cy);
    const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
    const dx = b.x - a.x, dy = b.y - a.y;
    const len = Math.hypot(dx, dy) || 1;
    const nx = -dy / len, ny = dx / len;
    const curveOff = Math.min(80, len * 0.18);
    const ctrl = { x: mx + nx * curveOff, y: my + ny * curveOff };
    const d = `M ${a.x} ${a.y} Q ${ctrl.x} ${ctrl.y} ${b.x} ${b.y}`;
    const hit = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    hit.setAttribute('class', 'ref-hit');
    hit.setAttribute('d', d);
    hit.dataset.id = ref.id;
    hit.dataset.fromId = ref.fromId;
    hit.dataset.toId = ref.toId;
    refsGroup.appendChild(hit);
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('class', 'ref');
    path.setAttribute('d', d);
    path.setAttribute('marker-end', 'url(#refhead)');
    path.dataset.id = ref.id;
    path.dataset.fromId = ref.fromId;
    path.dataset.toId = ref.toId;
    refsGroup.appendChild(path);
    if (ref.label) {
      const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      txt.setAttribute('class', 'ref-label');
      txt.setAttribute('x', ctrl.x);
      txt.setAttribute('y', ctrl.y);
      txt.setAttribute('text-anchor', 'middle');
      txt.textContent = ref.label;
      refsGroup.appendChild(txt);
    }
  }
  arrowsLayer.classList.toggle('refs-hidden', !refsVisible);
  renderConnectionPills(presentationMode ? selectedId : null);
}

function renderConnectionPills(focusedId) {
  pillsGroup.innerHTML = '';
  if (!focusedId || !mm || !mm.nodes[focusedId]) return;
  const visible = cachedLayout.visible;
  if (!visible.has(focusedId)) return;
  const focused = nodeRect(focusedId);
  if (!focused) return;
  const SVG_NS = 'http://www.w3.org/2000/svg';
  const node = mm.nodes[focusedId];

  const entries = [];
  if (node.parentId && visible.has(node.parentId)) {
    const p = nodeRect(node.parentId);
    const pn = mm.nodes[node.parentId];
    entries.push({ targetId: node.parentId, label: (pn.title || 'Parent'), isRef: false, nx: p.cx, ny: p.cy });
  }
  for (const id in mm.nodes) {
    const n = mm.nodes[id];
    if (n.parentId !== focusedId || !visible.has(id)) continue;
    const c = nodeRect(id);
    entries.push({ targetId: id, label: (n.title || 'Untitled'), isRef: false, nx: c.cx, ny: c.cy });
  }
  if (refsVisible) {
    for (const ref of mm.refs) {
      if (ref.fromId === focusedId && visible.has(ref.toId)) {
        const t = nodeRect(ref.toId);
        const tn = mm.nodes[ref.toId];
        const lbl = ref.label
          ? `${ref.label}: ${tn.title || ''}`
          : (tn.title || '');
        entries.push({ targetId: ref.toId, label: lbl, isRef: true, refId: ref.id, nx: t.cx, ny: t.cy });
      } else if (ref.toId === focusedId && visible.has(ref.fromId)) {
        const f = nodeRect(ref.fromId);
        const fn = mm.nodes[ref.fromId];
        const lbl = ref.label
          ? `${fn.title || ''} (${ref.label})`
          : (fn.title || '');
        entries.push({ targetId: ref.fromId, label: lbl, isRef: true, refId: ref.id, nx: f.cx, ny: f.cy });
      }
    }
  }

  const invS = 1 / viewportScale;
  const MAX_LABEL = 36;
  for (const e of entries) {
    const edge = rectEdgeIntersection(focused.cx, focused.cy, focused.w, focused.h, e.nx, e.ny);
    const dx = e.nx - focused.cx, dy = e.ny - focused.cy;
    const len = Math.hypot(dx, dy) || 1;
    const ux = dx / len, uy = dy / len;
    const g = document.createElementNS(SVG_NS, 'g');
    g.setAttribute('class', 'conn-pill' + (e.isRef ? ' ref' : ''));
    g.setAttribute('transform', `translate(${edge.x} ${edge.y}) scale(${invS})`);
    g.dataset.targetId = e.targetId;
    if (e.refId) g.dataset.refId = e.refId;
    const inner = document.createElementNS(SVG_NS, 'g');
    inner.setAttribute('transform', `translate(${ux * 26} ${uy * 26})`);
    const txt = document.createElementNS(SVG_NS, 'text');
    txt.setAttribute('x', 0); txt.setAttribute('y', 0);
    let label = (e.label || '').trim();
    if (label.length > MAX_LABEL) label = label.slice(0, MAX_LABEL - 1) + '\u2026';
    txt.textContent = label;
    inner.appendChild(txt);
    g.appendChild(inner);
    pillsGroup.appendChild(g);
    let bbW = label.length * 7 + 6, bbH = 16;
    try { const bb = txt.getBBox(); bbW = bb.width; bbH = bb.height; } catch (_) {}
    const padX = 10, padY = 5;
    const w = bbW + padX * 2, h = bbH + padY * 2;
    const rect = document.createElementNS(SVG_NS, 'rect');
    rect.setAttribute('x', -w / 2);
    rect.setAttribute('y', -h / 2);
    rect.setAttribute('width', w);
    rect.setAttribute('height', h);
    rect.setAttribute('rx', 8); rect.setAttribute('ry', 8);
    inner.insertBefore(rect, txt);
  }
}

function renderPreviewArrow() {
  if (!arrowDrag) { previewArrow.style.display = 'none'; return; }
  const f = nodeRect(arrowDrag.fromId);
  if (!f) return;
  const tx = arrowDrag.curX, ty = arrowDrag.curY;
  const a = rectEdgeIntersection(f.cx, f.cy, f.w, f.h, tx, ty);
  previewArrow.setAttribute('d', `M ${a.x} ${a.y} L ${tx} ${ty}`);
  previewArrow.setAttribute('class', 'preview ' + (arrowDrag.mode === 'ref' ? 'ref' : 'edge'));
  previewArrow.setAttribute('stroke', arrowDrag.mode === 'ref' ? 'var(--accent)' : 'var(--text-secondary)');
  previewArrow.style.display = '';
}

function addChild(parentId, nodeArg) {
  const id = nodeArg ? nodeArg.id : uid();
  const node = nodeArg || { id, parentId, title: 'New idea', notes: '', collapsed: false };
  mm.nodes[id] = node;
  if (mm.nodes[parentId]) mm.nodes[parentId].collapsed = false;
  selectedId = id;
  if (!nodeArg) sendMsg({ type: 'node-add', node: deepClone(node) });
  render();
  scheduleSave();

  if (!nodeArg) {
    requestAnimationFrame(() => {
      const el = cardsLayer.querySelector(`.card[data-id="${id}"] .card-title`);
      if (el) { el.focus(); el.select(); }
    });
  }
  return id;
}

function reparent(childId, newParentId) {
  if (childId === mm.rootId) { toast("Can't re-parent the root."); return; }
  if (childId === newParentId) return;
  if (isAncestor(childId, newParentId)) { toast('Would create a cycle.'); return; }
  if (mm.nodes[childId].parentId === newParentId) return;
  mm.nodes[childId].parentId = newParentId;
  mm.nodes[newParentId].collapsed = false;
  sendMsg({ type: 'reparent', id: childId, newParentId });
  render();
  scheduleSave();
}

function deleteNode(id) {
  if (id === mm.rootId) { toast("Can't delete the root."); return; }
  const node = mm.nodes[id];
  if (!node) return;
  const newParentId = node.parentId;
  for (const cid in mm.nodes) {
    if (mm.nodes[cid].parentId === id) mm.nodes[cid].parentId = newParentId;
  }
  delete mm.nodes[id];
  mm.refs = mm.refs.filter(r => r.fromId !== id && r.toId !== id);
  if (selectedId === id) selectedId = newParentId;
  sendMsg({ type: 'node-delete', id });
  render();
  scheduleSave();
}

function toggleCollapsed(id) {
  const node = mm.nodes[id];
  if (!node || getChildren(id).length === 0) return;
  node.collapsed = !node.collapsed;
  sendMsg({ type: 'node-update', id, changes: { collapsed: node.collapsed } });
  render();
  scheduleSave();
}

function addRef(fromId, toId, label) {
  if (fromId === toId) return;
  if (!mm.nodes[fromId] || !mm.nodes[toId]) return;
  const ref = { id: uid(), fromId, toId, label: label || '' };
  mm.refs.push(ref);
  sendMsg({ type: 'ref-add', ref: deepClone(ref) });
  render();
  scheduleSave();
}

  if (!mm) return;

  mm.meta.title = titleInput.value || 'Untitled MindMap';
  try {

    saveStatus.textContent = 'Saved';

    saveStatus.textContent = 'Save failed';
    toast('Storage full! Export your map.');

}

function updateZoom() {
  world.style.transform = `translate(${-viewportX * viewportScale}px, ${-viewportY * viewportScale}px) scale(${viewportScale})`;
  zoomLabel.textContent = Math.round(viewportScale * 100) + '%';
  if (presentationMode && selectedId && cachedLayout.visible && cachedLayout.visible.has(selectedId)) {
    renderConnectionPills(selectedId);
  }
}

function fitToView() {

  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const id of cachedLayout.visible) {
    const r = nodeRect(id);
    if (!r) continue;
    minX = Math.min(minX, r.cx - r.w / 2);
    minY = Math.min(minY, r.cy - r.h / 2);
    maxX = Math.max(maxX, r.cx + r.w / 2);
    maxY = Math.max(maxY, r.cy + r.h / 2);
  }
  if (minX === Infinity) { centerOnRoot(); return; }
  const pad = 80;
  const bw = (maxX - minX) + pad * 2;
  const bh = (maxY - minY) + pad * 2;
  const rect = workspace.getBoundingClientRect();
  const scale = clamp(Math.min(rect.width / bw, rect.height / bh), MIN_SCALE, MAX_SCALE);
  viewportScale = scale;
  viewportX = (minX + maxX) / 2;
  viewportY = (minY + maxY) / 2;
  updateZoom();
}

function centerOnRoot() {
  viewportX = 0; viewportY = 0; viewportScale = 1; updateZoom();
}

function focusOnNode(id, opts) {
  const animate = !!(opts && opts.animate);
  const r = nodeRect(id);
  if (!r) return;
  const ws = workspace.getBoundingClientRect();

  const targetScale = presentationMode
    ? clamp(
        Math.min((ws.width * 0.80) / r.w, (ws.height * 0.80) / r.h),
        MIN_SCALE, MAX_SCALE
      )
    : clamp(
        Math.min((ws.width * 0.78) / r.w, (ws.height * 0.92) / r.h),
        MIN_SCALE, MAX_SCALE
      );
  const tx = r.cx, ty = r.cy, ts = targetScale;
  if (focusAnim) { cancelAnimationFrame(focusAnim.raf); focusAnim = null; }
  if (!animate) {
    viewportX = tx; viewportY = ty; viewportScale = ts;
    updateZoom();
    return;
  }
  const fromX = viewportX, fromY = viewportY, fromS = viewportScale;
  const t0 = performance.now();
  const dur = 320;
  const ease = (k) => 1 - Math.pow(1 - k, 3);
  const step = (now) => {
    const k = Math.min(1, (now - t0) / dur);
    const e = ease(k);
    viewportX = fromX + (tx - fromX) * e;
    viewportY = fromY + (ty - fromY) * e;
    viewportScale = fromS + (ts - fromS) * e;
    updateZoom();
    if (k < 1) {
      focusAnim.raf = requestAnimationFrame(step);
    } else {
      focusAnim = null;
    }
  };
  focusAnim = { raf: requestAnimationFrame(step) };
}

workspace.addEventListener('wheel', (e) => {
  e.preventDefault();
  const rect = workspace.getBoundingClientRect();
  const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
  const before = { x: (sx - rect.width / 2) / viewportScale + viewportX, y: (sy - rect.height / 2) / viewportScale + viewportY };
  const factor = e.deltaY < 0 ? 1.12 : 0.89;
  viewportScale = clamp(viewportScale * factor, MIN_SCALE, MAX_SCALE);
  const after = { x: (sx - rect.width / 2) / viewportScale + viewportX, y: (sy - rect.height / 2) / viewportScale + viewportY };
  viewportX -= after.x - before.x;
  viewportY -= after.y - before.y;
  updateZoom();
}, { passive: false });

function crc32(buf) {
  let crc = -1;
  for (let i = 0; i < buf.length; i++) {
    crc ^= buf[i];
    for (let j = 0; j < 8; j++) crc = (crc >>> 1) ^ (crc & 1 ? 0xEDB88320 : 0);
  }
  return (crc ^ -1) >>> 0;
}
function embedPngMetadata(pngBuf, key, value) {
  const png = new Uint8Array(pngBuf);
  let iendPos = -1;
  for (let i = png.length - 12; i >= 8; i--) {
    if (png[i+4] === 0x49 && png[i+5] === 0x45 && png[i+6] === 0x4E && png[i+7] === 0x44) { iendPos = i; break; }
  }
  if (iendPos < 0) return pngBuf;
  const enc = new TextEncoder();
  const keyBytes = enc.encode(key);
  const valBytes = enc.encode(value);
  const dataLen = keyBytes.length + 1 + valBytes.length;
  const chunk = new Uint8Array(12 + dataLen);
  const dv = new DataView(chunk.buffer);
  dv.setUint32(0, dataLen);
  chunk[4] = 0x74; chunk[5] = 0x45; chunk[6] = 0x58; chunk[7] = 0x74;
  chunk.set(keyBytes, 8);
  chunk[8 + keyBytes.length] = 0;
  chunk.set(valBytes, 9 + keyBytes.length);
  const crcData = chunk.slice(4, 8 + dataLen);
  dv.setUint32(8 + dataLen, crc32(crcData));
  const result = new Uint8Array(png.length + chunk.length);
  result.set(png.slice(0, iendPos));
  result.set(chunk, iendPos);
  result.set(png.slice(iendPos), iendPos + chunk.length);
  return result.buffer;
}
function extractPngMetadata(pngBuf, key) {
  const png = new Uint8Array(pngBuf);
  const enc = new TextEncoder();
  const keyBytes = enc.encode(key);
  let pos = 8;
  while (pos < png.length - 8) {
    const dv = new DataView(png.buffer, pos);
    const len = dv.getUint32(0);
    const type = String.fromCharCode(png[pos+4], png[pos+5], png[pos+6], png[pos+7]);
    if (type === 'tEXt') {
      let match = keyBytes.length < len;
      for (let i = 0; match && i < keyBytes.length; i++) if (png[pos + 8 + i] !== keyBytes[i]) match = false;
      if (match && png[pos + 8 + keyBytes.length] === 0) {
        const valStart = pos + 9 + keyBytes.length;
        const valEnd = pos + 8 + len;
        return new TextDecoder().decode(png.slice(valStart, valEnd));
      }
    }
    if (type === 'IEND') break;
    pos += 12 + len;
  }
  return null;
}

async function renderToPngBlob() {

  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const id of cachedLayout.visible) {
    const r = nodeRect(id);
    if (!r) continue;
    minX = Math.min(minX, r.cx - r.w / 2);
    minY = Math.min(minY, r.cy - r.h / 2);
    maxX = Math.max(maxX, r.cx + r.w / 2);
    maxY = Math.max(maxY, r.cy + r.h / 2);
  }
  if (minX === Infinity) return null;
  const pad = 60;
  const bw = (maxX - minX) + pad * 2;
  const bh = (maxY - minY) + pad * 2;
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  const bg = isLight ? '#f5f5f7' : '#060608';
  const cardBg = isLight ? '#ffffff' : '#0e0e13';
  const titleBg = isLight ? '#f0f0f4' : '#16161e';
  const text = isLight ? '#1a1a1e' : '#e8e8ec';
  const muted = isLight ? '#5a5a64' : '#8b8b95';
  const border = isLight ? 'rgba(0,0,0,0.22)' : 'rgba(255,255,255,0.22)';
  const accent = isLight ? '#5a8a1a' : '#c9f270';

  const parts = [];
  parts.push(`<svg xmlns="http://www.w3.org/2000/svg" width="${bw}" height="${bh}" viewBox="${minX - pad} ${minY - pad} ${bw} ${bh}">`);
  parts.push(`<rect x="${minX - pad}" y="${minY - pad}" width="${bw}" height="${bh}" fill="${bg}"/>`);
  parts.push(`<defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="${muted}"/></marker>
    <marker id="rh" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="${accent}"/></marker>
  </defs>`);

  for (const id in mm.nodes) {
    if (!cachedLayout.visible.has(id)) continue;
    const node = mm.nodes[id];
    if (!node.parentId || !cachedLayout.visible.has(node.parentId)) continue;
    const p = nodeRect(node.parentId), c = nodeRect(id);
    const a = rectEdgeIntersection(p.cx, p.cy, p.w, p.h, c.cx, c.cy);
    const b = rectEdgeIntersection(c.cx, c.cy, c.w, c.h, p.cx, p.cy);
    parts.push(`<path d="M ${a.x} ${a.y} L ${b.x} ${b.y}" stroke="${muted}" stroke-width="1.5" fill="none" marker-end="url(#ah)"/>`);
  }

  if (refsVisible) for (const ref of mm.refs) {
    if (!cachedLayout.visible.has(ref.fromId) || !cachedLayout.visible.has(ref.toId)) continue;
    const f = nodeRect(ref.fromId), t = nodeRect(ref.toId);
    const a = rectEdgeIntersection(f.cx, f.cy, f.w, f.h, t.cx, t.cy);
    const b = rectEdgeIntersection(t.cx, t.cy, t.w, t.h, f.cx, f.cy);
    const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
    const dx = b.x - a.x, dy = b.y - a.y;
    const len = Math.hypot(dx, dy) || 1;
    const nx = -dy / len, ny = dx / len;
    const off = Math.min(80, len * 0.18);
    const ctrl = { x: mx + nx * off, y: my + ny * off };
    parts.push(`<path d="M ${a.x} ${a.y} Q ${ctrl.x} ${ctrl.y} ${b.x} ${b.y}" stroke="${accent}" stroke-width="1.6" stroke-dasharray="7 5" fill="none" marker-end="url(#rh)"/>`);
    if (ref.label) parts.push(`<text x="${ctrl.x}" y="${ctrl.y}" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="14" font-style="italic" fill="${accent}">${escapeXml(ref.label)}</text>`);
  }

  for (const id of cachedLayout.visible) {
    const node = mm.nodes[id];
    const r = nodeRect(id);
    const x = r.cx - r.w / 2, y = r.cy - r.h / 2;
    const isSel = (id === selectedId);
    parts.push(`<rect x="${x}" y="${y}" width="${r.w}" height="${r.h}" rx="14" ry="14" fill="${cardBg}" stroke="${isSel ? accent : border}" stroke-width="${isSel ? 2 : 1.5}"/>`);

    parts.push(`<rect x="${x + 10}" y="${y + 10}" width="${r.w - 20}" height="22" rx="6" ry="6" fill="${titleBg}" stroke="${border}" stroke-width="1"/>`);
    parts.push(`<text x="${x + 18}" y="${y + 25}" font-family="Plus Jakarta Sans, sans-serif" font-size="12" font-weight="600" fill="${text}" text-anchor="start">${escapeXml((node.title || '').toUpperCase())}</text>`);
    if ((node.notes || '').trim()) {
      const boxX = x + 10, boxY = y + 40;
      const boxW = r.w - 20, boxH = r.h - 50;
      parts.push(`<rect x="${boxX}" y="${boxY}" width="${boxW}" height="${boxH}" rx="6" ry="6" fill="none" stroke="${border}" stroke-width="1"/>`);
      parts.push(renderNotesAsSvg(node.notes, boxX, boxY, boxW, boxH, text, muted));
    }
  }
  parts.push(`</svg>`);
  const svg = parts.join('');

  const blob = await new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(new Blob([svg], { type: 'image/svg+xml' }));
    img.onload = () => {
      const cv = document.createElement('canvas');
      cv.width = Math.round(bw);
      cv.height = Math.round(bh);
      const cx = cv.getContext('2d');
      cx.drawImage(img, 0, 0);
      URL.revokeObjectURL(url);
      cv.toBlob((b) => resolve(b), 'image/png');
    };
    img.onerror = (e) => { URL.revokeObjectURL(url); reject(e); };
    img.src = url;
  });
  return blob;
}

function escapeXml(s) {
  return String(s || '').replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]));
}
function truncate(s, n) { return s.length > n ? s.slice(0, n - 1) + '…' : s; }

$('btnExport').addEventListener('click', async () => {
  const blob = await renderToPngBlob();
  if (!blob) { toast('Nothing to export.'); return; }
  const buf = await blob.arrayBuffer();
  const payload = JSON.stringify({ version: 1, mm });
  const enhanced = embedPngMetadata(buf, PNG_KEY, payload);
  const newBlob = new Blob([enhanced], { type: 'image/png' });
  const url = URL.createObjectURL(newBlob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (mm.meta.title || 'mindmap').replace(/[^a-z0-9_-]+/gi, '_') + '.png';
  a.click();
  URL.revokeObjectURL(url);
  toast('Exported PNG.');
});

      render(); centerOnRoot(); scheduleSave();
      toast('Imported.');
    } catch (err) { alert('Failed to parse embedded data: ' + err.message); }
  };
  reader.readAsArrayBuffer(file);
  fileInput.value = '';
});

function setStatus(text, state) {
  statusText.textContent = text;
  statusDot.className = 'dot dot-' + state;
}
function updateP2PStatus() {
  const count = isHost ? connections.length + 1 : userCount;
  setStatus('Connected (' + count + (count === 1 ? ' user)' : ' users)'), 'connected');
}
function showConnectionBanner(text) { const b = $('connectionBanner'); b.textContent = text; b.classList.add('visible'); }
function hideConnectionBanner() { $('connectionBanner').classList.remove('visible'); }

function sendToConn(conn, msg) {
  const str = JSON.stringify(msg);
  if (str.length <= CHUNK_SIZE) { conn.send(msg); return; }
  const id = uid();
  const total = Math.ceil(str.length / CHUNK_SIZE);
  for (let i = 0; i < total; i++) {
    conn.send({ type: '__chunk', id, idx: i, total, data: str.substring(i * CHUNK_SIZE, (i + 1) * CHUNK_SIZE) });
  }
}
function reassembleChunk(chunk) {
  const key = chunk.id;
  if (!pendingChunks[key]) pendingChunks[key] = { parts: new Array(chunk.total), received: 0 };
  const entry = pendingChunks[key];
  entry.parts[chunk.idx] = chunk.data;
  entry.received++;
  if (entry.received === chunk.total) {
    delete pendingChunks[key];
    try { return JSON.parse(entry.parts.join('')); } catch (e) { return null; }
  }
  return null;
}
function broadcast(msg) {
  if (isHost) { for (const e of connections) if (e.conn.open) sendToConn(e.conn, msg); }
  else if (hostConn && hostConn.open) sendToConn(hostConn, msg);
}
function broadcastExcept(msg, except) {
  for (const e of connections) if (e.conn !== except && e.conn.open) sendToConn(e.conn, msg);
}
function sendMsg(msg) { if (isApplyingRemote) return; broadcast(msg); }
function broadcastBuffered(msg) {
  if (isApplyingRemote) return;
  msgBuffer.push(msg);
  if (!msgFlushTimer) msgFlushTimer = setTimeout(flushMessages, 50);
}
function flushMessages() {
  msgFlushTimer = null;
  if (msgBuffer.length === 0) return;
  if (msgBuffer.length === 1) broadcast(msgBuffer[0]);
  else broadcast({ type: 'batch', messages: msgBuffer });
  msgBuffer = [];
}
function broadcastUserCount() {
  const count = connections.length + 1;
  for (const e of connections) if (e.conn.open) sendToConn(e.conn, { type: 'user-count', count });
  updateP2PStatus();
}

function handleMessage(msg, fromConn) {
  if (!msg || !msg.type) return;
  if (msg.type === '__chunk') { const a = reassembleChunk(msg); if (a) handleMessage(a, fromConn); return; }
  if (msg.type === 'batch') { for (const m of msg.messages) handleMessage(m, fromConn); return; }

  if (msg.type === 'sync-state') {
    isApplyingRemote = true;
    const incoming = msg.mm;
    if (!incoming || !incoming.rootId || !incoming.nodes) { isApplyingRemote = false; return; }
    mm = incoming;
    if (!Array.isArray(mm.refs)) mm.refs = [];
    titleInput.value = mm.meta.title || 'Untitled MindMap';
    selectedId = null;
    render();
    isApplyingRemote = false;
    return;
  }
  if (msg.type === 'request-resync') {
    if (isHost && fromConn) sendToConn(fromConn, { type: 'sync-state', mm: deepClone(mm) });
    return;
  }
  if (msg.type === 'user-count') { userCount = msg.count; updateP2PStatus(); return; }
  if (msg.type === 'error') { toast(msg.message); return; }

  isApplyingRemote = true;
  try {
    if (msg.type === 'node-add') {
      if (msg.node && !mm.nodes[msg.node.id] && mm.nodes[msg.node.parentId]) {
        mm.nodes[msg.node.id] = msg.node;
        render();
      }
    } else if (msg.type === 'node-update') {
      const n = mm.nodes[msg.id];
      if (n) {
        if (editingNodeId === msg.id) {

          const ch = Object.assign({}, msg.changes);
          if (editingField === 'title') delete ch.title;
          if (editingField === 'notes') delete ch.notes;
          Object.assign(n, ch);
        } else {
          Object.assign(n, msg.changes);
        }
        render();
      }
    } else if (msg.type === 'node-delete') {
      if (mm.nodes[msg.id] && msg.id !== mm.rootId) {
        const newParentId = mm.nodes[msg.id].parentId;
        for (const cid in mm.nodes) {
          if (mm.nodes[cid].parentId === msg.id) mm.nodes[cid].parentId = newParentId;
        }
        delete mm.nodes[msg.id];
        mm.refs = mm.refs.filter(r => r.fromId !== msg.id && r.toId !== msg.id);
        if (selectedId === msg.id) selectedId = newParentId;
        render();
      }
    } else if (msg.type === 'reparent') {
      const n = mm.nodes[msg.id];
      if (n && mm.nodes[msg.newParentId] && msg.id !== mm.rootId && !isAncestor(msg.id, msg.newParentId)) {
        n.parentId = msg.newParentId;
        render();
      }
    } else if (msg.type === 'ref-add') {
      if (msg.ref && mm.nodes[msg.ref.fromId] && mm.nodes[msg.ref.toId] && !mm.refs.find(r => r.id === msg.ref.id)) {
        mm.refs.push(msg.ref);
        render();
      }
    } else if (msg.type === 'ref-delete') {
      mm.refs = mm.refs.filter(r => r.id !== msg.id);
      render();
    } else if (msg.type === 'meta-update') {
      mm.meta.title = msg.title;
      titleInput.value = msg.title;
    } else if (msg.type === 'subtree-collapse') {
      if (mm.nodes[msg.id]) { setSubtreeCollapsed(msg.id, msg.collapsed); render(); }
    }
    scheduleSave();
  } finally {
    isApplyingRemote = false;
    if (isHost && fromConn) broadcastExcept(msg, fromConn);
  }
}

function startHosting() {
  isHost = true;
  if (typeof Peer === 'undefined') { setStatus('Offline (no P2P)', 'disconnected'); return; }
  setStatus('Initializing…', 'waiting');
  const peer = new Peer();
  peer.on('open', (id) => {
    myId = id;
    const link = window.location.origin + window.location.pathname + '#room=' + id;
    setStatus('Solo (sharable)', 'waiting');
    copyLinkBtn.classList.remove('hidden');
    copyLinkBtn.onclick = () => {
      navigator.clipboard.writeText(link).then(() => toast('Invite link copied!'));
    };
  });
  peer.on('connection', (c) => {
    if (connections.length >= MAX_USERS - 1) {
      c.on('open', () => { sendToConn(c, { type: 'error', message: 'Room is full' }); setTimeout(() => c.close(), 500); });
      return;
    }
    const entry = { conn: c };
    connections.push(entry);
    c.on('open', () => {
      sendToConn(c, { type: 'user-count', count: connections.length + 1 });
      sendToConn(c, { type: 'sync-state', mm: deepClone(mm) });
      updateP2PStatus(); broadcastUserCount();
    });
    c.on('data', (msg) => handleMessage(msg, c));
    c.on('close', () => {
      connections = connections.filter(e => e.conn !== c);
      broadcastUserCount();
      if (connections.length === 0) setStatus('Solo (sharable)', 'waiting');
    });
  });
  peer.on('error', (err) => setStatus('Error: ' + err.type, 'disconnected'));
}

function connectAsGuest(roomId) {
  isHost = false;
  if (typeof Peer === 'undefined') { setStatus('Offline (no P2P)', 'disconnected'); return; }
  setStatus('Connecting…', 'waiting');
  const peer = new Peer();
  guestPeer = peer;
  peer.on('open', () => {
    const c = peer.connect(roomId, { reliable: true, serialization: 'json' });
    hostConn = c;
    c.on('open', () => {
      reconnectAttempts = 0; hideConnectionBanner();
      setStatus('Connected', 'connected'); copyLinkBtn.classList.add('hidden');
      if (window.location.protocol !== 'file:') history.replaceState(null, '', window.location.pathname + '#room=' + roomId);
      setTimeout(() => { if (hostConn && hostConn.open) hostConn.send({ type: 'request-resync' }); }, 1500);
    });
    c.on('data', (msg) => {
      if (msg.type === 'error') { setStatus(msg.message, 'disconnected'); c.close(); return; }
      handleMessage(msg, null);
    });
    c.on('close', () => { setStatus('Disconnected', 'disconnected'); hostConn = null; attemptReconnect(); });
  });
  peer.on('error', (err) => {
    if (err.type === 'peer-unavailable') setStatus('Room not found', 'disconnected');
    else { setStatus('Error: ' + err.type, 'disconnected'); attemptReconnect(); }
  });
}

function attemptReconnect() {
  if (!guestRoomId || reconnectAttempts >= MAX_RECONNECT) { showConnectionBanner('Disconnected. Could not reconnect.'); return; }
  reconnectAttempts++;
  const delay = Math.min(1000 * Math.pow(2, reconnectAttempts - 1), 10000);
  showConnectionBanner('Reconnecting… (attempt ' + reconnectAttempts + '/' + MAX_RECONNECT + ')');
  setStatus('Reconnecting…', 'reconnecting');
  setTimeout(() => {
    if (guestPeer) { try { guestPeer.destroy(); } catch (e) {} guestPeer = null; }
    connectAsGuest(guestRoomId);
  }, delay);
}

function init() {
  if (!load()) {
    mm = createMindMap();
  }
  titleInput.value = mm.meta.title || 'Untitled MindMap';
  selectedId = mm.rootId;
  try { presentationMode = localStorage.getItem(PRESENT_KEY) === '1'; } catch (_) {}
  try { const l = localStorage.getItem(LAYOUT_KEY); if (l === 'tree' || l === 'star') layoutMode = l; } catch (_) {}
  applyPresentationUI();
  applyLayoutUI();
  render();
  if (presentationMode && selectedId) {
    focusOnNode(selectedId, { animate: false });
  } else {
    requestAnimationFrame(() => fitToView());
  }

  const hash = window.location.hash;
  if (hash.startsWith('#room=')) {
    guestRoomId = hash.substring(6);
    if (guestRoomId) { connectAsGuest(guestRoomId); return; }
  }
  startHosting();
}

window.addEventListener('resize', () => {
  if (presentationMode && selectedId && cachedLayout.visible && cachedLayout.visible.has(selectedId)) {
    render();
    focusOnNode(selectedId, { animate: false });
  } else {
    updateZoom();
  }
});
init();

})();
</script>
</body>
</html>
